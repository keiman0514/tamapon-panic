        this.knockoutSetTransitionTimer = 0;
        this.knockoutTransitionType = "";
        this.knockoutClearCelebrationTimer = 0;
        this.shakeTimer = 0;
        this.shakePower = 0;
        this.effects = [];
        this.playStoryEndingBgm(false);
        this.sound.levelUp();
        this.updateUI();
      }

      previewFinalStory() {
        if (this.state !== "title") return;
        const previous = {
          difficulty: this.selectedDifficulty,
          playMode: this.selectedPlayMode,
          cpuLevel: this.selectedCpuLevel,
          storyDifficulty: this.storyDifficulty
        };
        const finalRound = KNOCKOUT_ROUNDS[KNOCKOUT_ROUNDS.length - 1];
        this.reset(finalRound.difficulty, false, "knockout", finalRound.cpuLevel);
        this.storyDifficulty = previous.storyDifficulty;
        this.clearPreviewReturn = previous;
        this.knockoutRoundIndex = KNOCKOUT_ROUNDS.length - 1;
        this.knockoutPlayerWins = KNOCKOUT_MATCH_WINS;
        this.knockoutCpuWins = 0;
        this.battleWinner = "player";
        this.startStoryStageClear();
      }

      previewKnockoutClear() {
        this.previewFinalStory();
      }

      finishBattleLoss() {
        this.currentPiece = null;
        if (this.cpu) this.cpu.state = "gameover";
        if (isCpuPlayMode(this.selectedPlayMode) && !this.battleWinner) this.battleWinner = "cpu";
        this.state = "gameover";
        this.message = "GAME OVER";
        this.messageTimer = 0;
        this.dangerActive = false;
        this.dangerAlarmTimer = 0;
        this.overLogoTimer = OVER_LOGO_DROP_MS;
        this.gameOverInputGuardTimer = GAME_OVER_INPUT_GUARD_MS;
        this.startLogoTimer = 0;
        this.knockoutSetTransitionTimer = 0;
        this.knockoutTransitionType = "";
        this.shakeTimer = GAME_OVER_PANIC_SHAKE_MS;
        this.shakePower = GAME_OVER_PANIC_SHAKE_PX;
        this.sound.stopBgm();
        this.sound.gameOver();
        this.sound.voice(isCpuPlayMode(this.selectedPlayMode) ? "lose" : "ov");
        this.effects.push({
          type: "clearShock",
          x: Math.floor(COLS / 2),
          y: 3.8,
          age: 0,
          duration: 620,
          radius: 46,
          chain: 4
        });
        this.updateUI();
      }

      finishBattleWin() {
        this.battleWinner = "player";
        this.currentPiece = null;
        if (this.cpu) this.cpu.state = "gameover";
        this.state = "gameover";
        this.message = "YOU WIN!";
        this.messageTimer = 0;
        this.dangerActive = false;
        this.dangerAlarmTimer = 0;
        this.overLogoTimer = OVER_LOGO_DROP_MS;
        this.gameOverInputGuardTimer = GAME_OVER_INPUT_GUARD_MS;
        this.startLogoTimer = 0;
        this.knockoutSetTransitionTimer = 0;
        this.knockoutTransitionType = "";
        this.shakeTimer = 500;
        this.shakePower = 3.5;
        this.sound.stopBgm();
        this.sound.levelUp();
        if (isCpuPlayMode(this.selectedPlayMode)) this.sound.voice("win");
        this.effects.push({
          type: "clearShock",
          x: Math.floor(COLS / 2),
          y: 3.8,
          age: 0,
          duration: 700,
          radius: 58,
          chain: 5
        });
        this.updateUI();
      }

      canConfirmGameOver() {
        return this.state === "gameover" && this.overLogoTimer <= 0 && this.gameOverInputGuardTimer <= 0;
      }

      cycleContinueChoice(dir) {
        if (this.state !== "continueConfirm") return;
        this.continueChoiceIndex = (this.continueChoiceIndex + dir + CONTINUE_CHOICES.length) % CONTINUE_CHOICES.length;
        this.sound.menuMove();
      }

      confirmContinueChoice() {
        if (this.state !== "continueConfirm") return;
        this.sound.menuConfirm();
        if (CONTINUE_CHOICES[this.continueChoiceIndex] === "はい") {
          this.continueCurrentKnockoutRound();
          return;
        }
        this.declineContinue();
      }

      continueCurrentKnockoutRound() {
        if (this.state !== "continueConfirm") return;
        this.knockoutPlayerWins = 0;
        this.knockoutCpuWins = 0;
        this.continueChoiceIndex = 0;
        this.continueTimer = 0;
        this.startNextKnockoutSet();
        this.playStoryPreClearBgm(false);
      }

      declineContinue() {
        if (this.state !== "continueConfirm") return;
        this.continueChoiceIndex = 0;
        this.continueTimer = 0;
        this.quitToTitle();
      }

      confirmGameOver() {
        if (!this.canConfirmGameOver()) return;
        this.sound.stopBgm();
        if (this.clearPreviewReturn) {
          const previous = this.clearPreviewReturn;
          this.clearPreviewReturn = null;
          this.resetKnockoutProgress();
          this.reset(previous.difficulty, false, previous.playMode, previous.cpuLevel);
          this.storyDifficulty = previous.storyDifficulty || previous.difficulty;
          this.state = "title";
          this.resetTitleDemo();
          this.message = "";
          this.messageTimer = 0;
          this.updateUI();
          return;
        }
        if (this.selectedPlayMode === "knockout") {
          this.resetKnockoutProgress();
          const openingRound = this.currentKnockoutRound();
          this.selectedDifficulty = this.storyDifficulty;
          this.selectedCpuLevel = openingRound.cpuLevel;
          this.cpuLevelIndex = Math.max(0, CPU_STRENGTHS.findIndex(level => level.key === this.selectedCpuLevel));
          this.config = DIFFICULTIES[this.selectedDifficulty];
          this.highScore = loadHighScore(this.selectedDifficulty, "knockout", this.selectedCpuLevel);
        }
        this.state = "modeSelect";
        this.message = "";
        this.messageTimer = 0;
        this.currentPiece = null;
        if (this.cpu) this.cpu.state = "gameover";
        this.updateUI();
      }

      getCells(piece = this.currentPiece) {
        if (!piece) return [];
        return SHAPES[piece.shape][piece.rotation].map((offset, i) => ({
          x: piece.x + offset.x,
          y: piece.y + offset.y,
          tileType: piece.tiles[i]
        }));
      }

      isInside(x, y) {
        return x >= 0 && x < COLS && y < ROWS;
      }

      isValidPiece(piece) {
        return isValidPieceOnGrid(piece, this.grid);
      }

      move(dx, dy) {
        if (this.isBattleAttackAnimationActive()) return false;
        if (this.state !== "playing" || !this.currentPiece) return false;
        if (this.isGroundLockExpired()) return false;
        const next = { ...this.currentPiece, x: this.currentPiece.x + dx, y: this.currentPiece.y + dy };
        if (!this.isValidPiece(next)) return false;
        this.currentPiece = next;
        if (dx !== 0) {
          if (!this.demoActive) this.sound.move();
          this.lockTimer = 0;
        }
        return true;
      }

      rotate(dir = 1) {
        if (this.isBattleAttackAnimationActive()) return false;
        if (this.state !== "playing" || !this.currentPiece) return false;
        if (this.isGroundLockExpired()) return false;
        const count = SHAPES[this.currentPiece.shape].length;
        const nextRot = (this.currentPiece.rotation + dir + count) % count;
        const tests = [
          { x: 0, y: 0 },
          { x: -1, y: 0 },
          { x: 1, y: 0 },
          { x: 0, y: -1 },
          { x: 0, y: 1 },
          { x: -2, y: 0 },
          { x: 2, y: 0 }
        ];
        for (const test of tests) {
          const next = {
            ...this.currentPiece,
            rotation: nextRot,
            x: this.currentPiece.x + test.x,
            y: this.currentPiece.y + test.y
          };
          if (this.isValidPiece(next)) {
            this.currentPiece = next;
            this.lockTimer = 0;
            if (!this.demoActive) this.sound.rotate();
            this.effects.push({ type: "spark", x: next.x, y: next.y, age: 0, duration: 130 });
            return true;
          }
        }
        return false;
      }

      rotateToward(targetRotation) {
        if (this.state !== "playing" || !this.currentPiece) return false;
        if (this.currentPiece.rotation === targetRotation) return true;
        const count = SHAPES[this.currentPiece.shape].length;
        const forwardDistance = (targetRotation - this.currentPiece.rotation + count) % count;
        const backwardDistance = (this.currentPiece.rotation - targetRotation + count) % count;
        return this.rotate(forwardDistance <= backwardDistance ? 1 : -1);
      }

      hasGroundContact() {
        if (!this.currentPiece) return false;
        const next = { ...this.currentPiece, y: this.currentPiece.y + 1 };
        return !this.isValidPiece(next);
      }

      isGroundLockExpired() {
        return this.groundedLockTimer >= LOCK_FORCE_MS && this.hasGroundContact();
      }

      stackHeight() {
        for (let y = 0; y < ROWS; y++) {
          if (this.grid[y].some(Boolean)) return ROWS - y;
        }
        return 0;
      }

      updateDangerAlarm(dt) {
        const isDanger = this.stackHeight() >= DANGER_STACK_HEIGHT;
        this.dangerActive = isDanger && this.state !== "gameover";
        if (!this.dangerActive) {
          this.dangerAlarmTimer = 0;
          return;
        }
        this.dangerAlarmTimer -= dt;
        if (this.dangerAlarmTimer <= 0) {
          this.sound.warning();
          this.dangerAlarmTimer = DANGER_ALARM_INTERVAL_MS;
          this.shakeTimer = Math.max(this.shakeTimer, 90);
          this.shakePower = Math.max(this.shakePower, 1.8);
        }
      }

      hardDropStep(dt) {
        const interval = this.softDrop ? SOFT_DROP_MS : this.dropInterval();
        this.dropTimer += dt;
        while (this.dropTimer >= interval) {
          this.dropTimer -= interval;
          if (!this.move(0, 1)) break;
        }
      }

      dropInterval() {
        return dropIntervalForLevel(this.level);
      }

      setSoftDrop(active) {
        const next = active && this.state === "playing" && !this.isBattleAttackAnimationActive();
        if (this.softDrop === next) return;
        this.softDrop = next;
        this.dropTimer = 0;
        if (next) this.move(0, 1);
      }

      resetSoftDropInputAfterLock() {
        this.keys.delete("ArrowDown");
        this.softDropInputLocked = true;
        this.setSoftDrop(false);
      }

      cycleDifficulty(dir) {
        if (this.state !== "title" && this.state !== "modeSelect" && this.state !== "gameover") return;
        const keys = Object.keys(DIFFICULTIES);
        const current = keys.indexOf(this.selectedDifficulty);
        const next = keys[(current + dir + keys.length) % keys.length];
        this.setDifficulty(next);
      }

      pressHorizontal(dir) {
        this.lastHorizontalDir = dir;
        if (this.horizontalDir !== dir) {
          this.horizontalDir = dir;
          this.horizontalDelayTimer = HORIZONTAL_REPEAT_START_MS;
          this.horizontalRepeatTimer = 0;
        } else if (this.horizontalDelayTimer > HORIZONTAL_REPEAT_START_MS * 0.5) {
          this.horizontalDelayTimer = HORIZONTAL_REPEAT_START_MS * 0.5;
        }
        this.move(dir, 0);
      }

      releaseHorizontal(dir) {
        if (this.horizontalDir !== dir) return;
        const oppositeCode = dir < 0 ? "ArrowRight" : "ArrowLeft";
        if (this.keys.has(oppositeCode)) {
          this.horizontalDir = -dir;
          this.horizontalDelayTimer = HORIZONTAL_REPEAT_START_MS;
          this.horizontalRepeatTimer = 0;
        } else {
          this.horizontalDir = 0;
          this.horizontalDelayTimer = 0;
          this.horizontalRepeatTimer = 0;
        }
      }

      updateHorizontalHold(dt) {
        if (this.state !== "playing") return;
        const left = this.keys.has("ArrowLeft");
        const right = this.keys.has("ArrowRight");
        const nextDir = left && right ? this.lastHorizontalDir : right ? 1 : left ? -1 : 0;
        if (nextDir !== this.horizontalDir) {
          this.horizontalDir = nextDir;
          this.horizontalDelayTimer = nextDir ? HORIZONTAL_REPEAT_START_MS : 0;
          this.horizontalRepeatTimer = 0;
          if (nextDir) {
            this.lastHorizontalDir = nextDir;
            this.move(nextDir, 0);
          }
        }
        if (!this.horizontalDir) return;
        const previousDelay = this.horizontalDelayTimer;
        this.horizontalDelayTimer = Math.max(0, this.horizontalDelayTimer - dt);
        if (previousDelay > 0 && this.horizontalDelayTimer === 0) {
          this.move(this.horizontalDir, 0);
          this.horizontalRepeatTimer = 0;
          return;
        }
        if (this.horizontalDelayTimer > 0) return;
        this.horizontalRepeatTimer += dt;
        while (this.horizontalRepeatTimer >= HORIZONTAL_REPEAT_MS) {
          this.horizontalRepeatTimer -= HORIZONTAL_REPEAT_MS;
          if (!this.move(this.horizontalDir, 0)) break;
        }
      }

      planDemoMove() {
        if (!this.currentPiece) return null;
        const ai = this.demoAi || cpuStrengthConfig(DEMO_CPU_LEVEL);
        const placements = [];
        let best = null;
        for (let rotation = 0; rotation < SHAPES[this.currentPiece.shape].length; rotation++) {
          for (let x = -2; x < COLS + 2; x++) {
            const trial = { ...this.currentPiece, rotation, x, y: 1 };
            if (!this.isValidPiece(trial)) continue;
            while (this.isValidPiece({ ...trial, y: trial.y + 1 })) trial.y += 1;
            const score = this.scoreDemoPlacement(trial) + Math.random() * ai.randomness;
            placements.push({ rotation, x, score, id: this.currentPiece.id });
            if (!best || score > best.score) best = { rotation, x, score, id: this.currentPiece.id };
          }
        }
        if (placements.length && Math.random() < ai.mistakeChance) {
          const loose = placements
            .sort((a, b) => a.score - b.score)
            .slice(0, Math.max(1, Math.ceil(placements.length * 0.32)));
          return loose[Math.floor(Math.random() * loose.length)];
        }
        return best || { rotation: this.currentPiece.rotation, x: this.currentPiece.x, score: 0, id: this.currentPiece.id };
      }

      scoreDemoPlacement(piece) {
        const ai = this.demoAi || cpuStrengthConfig(DEMO_CPU_LEVEL);
        const result = evaluateAiPlacement(this.grid, piece, ai);
        if (result.score <= -9999) return result.score;
        const followUp = bestFollowUpScore(result.grid, this.pieceQueue[0], ai);
        return result.score + followUp * (ai.lookaheadWeight || 0);
      }

      updateDemoAi(dt) {
        if (!this.demoActive || this.state !== "playing" || !this.currentPiece) return;
        const ai = this.demoAi || cpuStrengthConfig(DEMO_CPU_LEVEL);
        this.demoAiTimer -= dt;
        if (!this.demoAiPlan || this.demoAiPlan.id !== this.currentPiece.id) {
          this.demoAiPlan = this.planDemoMove();
        }
        if (!this.demoAiPlan) return;
        if (this.demoAiTimer <= 0) {
          this.demoAiTimer = ai.actionMs;
          if (this.currentPiece.rotation !== this.demoAiPlan.rotation) this.rotateToward(this.demoAiPlan.rotation);
          else if (this.currentPiece.x < this.demoAiPlan.x) this.move(1, 0);
          else if (this.currentPiece.x > this.demoAiPlan.x) this.move(-1, 0);
        }
        const aligned = this.demoAiPlan
          && this.currentPiece.rotation === this.demoAiPlan.rotation
          && this.currentPiece.x === this.demoAiPlan.x;
        this.softDrop = !!aligned;
      }

      lockPiece() {
        if (!this.currentPiece) return;
        for (const cell of this.getCells()) {
          if (cell.y >= 0 && cell.y < ROWS && cell.x >= 0 && cell.x < COLS) {
            this.grid[cell.y][cell.x] = { tileType: cell.tileType, landedAt: performance.now() };
          }
        }
        this.currentPiece = null;
        this.resetSoftDropInputAfterLock();
        this.sound.land();
        this.snapTimer = 120;
        this.resolveBoard();
      }

      async resolveBoard() {
        const resolveGeneration = ++this.resolveGeneration;
        this.state = "resolving";
        this.processing = true;
        let chain = 0;
        const settledAfterLock = this.applyGravity("lock");
        if (settledAfterLock) {
          this.playGravityDropSound();
          await wait(this.lastGravityDuration + GRAVITY_SETTLE_WAIT_MS);
          if (resolveGeneration !== this.resolveGeneration) return;
          if (this.state !== "resolving") {
            this.processing = false;
            return;
          }
        }
        while (true) {
          const groups = this.findClearGroups();
          if (groups.length === 0) break;
          chain += chainStepValue(groups, this.grid);
          const cells = flattenGroups(groups);
          this.chain = chain;
          this.clearCells = cells;
          this.addClearEffects(cells, chain);
          this.queueBattleChainEnergy("player", cells, chain);
          this.sound.clear(chain);
          this.addScore(cells.length, chain);
          this.updateUI();
          await wait(CLEAR_FLASH_MS);
          if (resolveGeneration !== this.resolveGeneration) return;
          if (this.state !== "resolving") {
            this.processing = false;
            return;
          }
          for (const cell of cells) this.grid[cell.y][cell.x] = null;
          this.clearCells = [];
          const moved = this.applyGravity("clear");
          if (moved) {
            this.playGravityDropSound();
            await wait(this.lastGravityDuration + GRAVITY_SETTLE_WAIT_MS);
            if (resolveGeneration !== this.resolveGeneration) return;
            if (this.state !== "resolving") {
              this.processing = false;
              return;
            }
          }
        }
        if (chain > 0) this.addBattleCharge("player", chain);
        if (this.state !== "resolving") {
          this.processing = false;
          return;
        }
        this.chain = 0;
        this.processing = false;
        if (resolveGeneration !== this.resolveGeneration) return;
        this.state = "playing";
        this.spawnPiece();
      }

      findClearGroups() {
        const visited = Array.from({ length: ROWS }, () => Array(COLS).fill(false));
        const groups = [];
        for (let y = 0; y < ROWS; y++) {
          for (let x = 0; x < COLS; x++) {
            const tile = this.grid[y][x];
            if (!tile || visited[y][x]) continue;
            const stack = [{ x, y }];
            const group = [];
            visited[y][x] = true;
            while (stack.length) {
              const cell = stack.pop();
              group.push(cell);
              for (const dir of DIRS4) {
                const nx = cell.x + dir[0];
                const ny = cell.y + dir[1];
                if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS || visited[ny][nx]) continue;
                if (this.grid[ny][nx]?.tileType === tile.tileType) {
                  visited[ny][nx] = true;
                  stack.push({ x: nx, y: ny });
                }
              }
            }
            if (group.length >= 4) groups.push(group);
          }
        }
        return groups;
      }

      applyGravity(mode = "clear") {
        return applyGravityToBoard(this, mode);
      }

      playGravityDropSound() {
        const delay = Math.max(20, this.lastGravityDuration - 55);
        window.setTimeout(() => {
          if (this.state === "resolving") this.sound.drop();
        }, delay);
      }

      addScore(cleared, chain) {
        const gained = cleared * 100 * chain;
        const beforeLevel = this.level;
        this.score += gained;
        if (!this.demoActive) this.updateHighScore();
        this.level = Math.floor(this.score / LEVEL_SCORE_STEP) + 1;
        if (this.level > beforeLevel) {
          this.message = "LEVEL UP!";
          this.messageTimer = LEVEL_UP_BANNER_MS;
          this.sound.levelUp();
          this.sound.updateBgmTempo(this.level);
          if (this.selectedPlayMode !== "knockout") setBackgroundForLevel(this.level);
        }
      }

      updateHighScore() {
        if (this.score <= this.highScore) return;
        this.highScore = this.score;
        this.newRecord = true;
        this.recordFlashTimer = HIGH_SCORE_FLASH_MS;
        saveHighScore(this.selectedDifficulty, this.selectedPlayMode, this.selectedCpuLevel, this.highScore);
      }

      addBattleCharge(source, chain) {
        if (!this.isCpuBattleActive()) return;
        const rows = this.attackRowsForSource(source, chain);
        if (rows <= 0) return;
        this.attachBattleChargePayload(source, rows, chain);
        if (source === "player" && chain >= 3) this.sound.voice("iku");
        if (source === "player") {
          this.sound.levelUp();
        } else {
          this.sound.warning();
        }
        this.updateUI();
      }

      queueBattleChainEnergy(source, cells, chain) {
        const beamLevel = attackEnergyLevelForChain(chain);
        if (!this.isCpuBattleActive() || !this.cpu || !cells?.length || beamLevel <= 0) return;
        const originX = cells.reduce((sum, cell) => sum + cell.x, 0) / cells.length;
        const originY = cells.reduce((sum, cell) => sum + cell.y, 0) / cells.length;
        this.addAttackTransferEffect(source, 0, chain, { originX, originY, visualRows: beamLevel, beamLevel });
      }

      attachBattleChargePayload(source, rows, chain) {
        if (chain < 2) {
          this.deliverBattleCharge({ source, rows, payloadRows: rows, chain });
          return;
        }
        const match = [...this.battleAttackTransfers].reverse().find(transfer => (
          transfer.source === source && !transfer.payloadRows
        ));
        if (!match) {
          this.deliverBattleCharge({ source, rows, payloadRows: rows, chain });
          return;
        }
        const beamLevel = Math.max(match.beamLevel || 1, attackEnergyLevelForChain(chain) || 1);
        match.payloadRows = rows;
        match.rows = Math.max(match.rows || 0, rows);
        match.beamLevel = Math.min(ATTACK_ENERGY_MAX_BEAMS, beamLevel);
        match.visualRows = Math.max(match.visualRows || 1, match.beamLevel);
        match.chain = Math.max(match.chain || 1, chain);
        if (!match.delivered && match.age >= match.sendDuration) {
          match.delivered = true;
          this.deliverBattleCharge(match);
        }
      }

      addAttackTransferEffect(source, rows, chain, options = {}) {
        if (!this.cpu) return;
        const beamLevel = Math.max(1, Math.min(ATTACK_ENERGY_MAX_BEAMS, options.beamLevel || attackEnergyLevelForChain(chain) || options.visualRows || rows || 1));
        const sendDuration = ATTACK_SEND_MS + (beamLevel - 1) * ATTACK_SEND_CHAIN_STEP_MS;
        this.battleAttackTransfers.push({
          source,
          rows,
          payloadRows: options.payloadRows || rows || 0,
          visualRows: options.visualRows || rows || beamLevel,
          beamLevel,
          originX: options.originX,
          originY: options.originY,
          chain,
          age: 0,
          sendDuration,
          impactDuration: ATTACK_SEND_IMPACT_MS,
          delivered: false
        });
      }

      attackRowsForSource(source, chain) {
        if (chain === 1) {
          if (source === "player") {
            this.playerSingleClearCount += 1;
            if (this.playerSingleClearCount >= SINGLE_CLEAR_ATTACK_THRESHOLD) {
              this.playerSingleClearCount -= SINGLE_CLEAR_ATTACK_THRESHOLD;
              return 1;
            }
          } else {
            this.cpuSingleClearCount += 1;
            if (this.cpuSingleClearCount >= SINGLE_CLEAR_ATTACK_THRESHOLD) {
              this.cpuSingleClearCount -= SINGLE_CLEAR_ATTACK_THRESHOLD;
              return 1;
            }
          }
          return 0;
        }
        if (chain === 2) {
          if (source === "player") {
            this.playerTwoChainCount += 1;
            if (this.playerTwoChainCount >= TWO_CHAIN_ATTACK_THRESHOLD) {
              this.playerTwoChainCount -= TWO_CHAIN_ATTACK_THRESHOLD;
              return 2;
            }
          } else {
            this.cpuTwoChainCount += 1;
            if (this.cpuTwoChainCount >= TWO_CHAIN_ATTACK_THRESHOLD) {
              this.cpuTwoChainCount -= TWO_CHAIN_ATTACK_THRESHOLD;
              return 2;
            }
          }
          return 0;
        }
        return attackRowsForChain(chain);
      }

      addClearEffects(cells, chain = 1) {
        const now = performance.now();
        const cx = cells.reduce((sum, cell) => sum + cell.x, 0) / cells.length;
        const cy = cells.reduce((sum, cell) => sum + cell.y, 0) / cells.length;
        const chainBoost = Math.min(2, 1 + (chain - 1) * 0.18);
        const burstLimit = this.demoActive ? Math.min(30, CLEAR_BURST_MAX_PARTICLES) : CLEAR_BURST_MAX_PARTICLES;
        const basePop = this.demoActive ? Math.min(5, CLEAR_POP_COUNT) : CLEAR_POP_COUNT;
        const particlesPerCell = Math.max(3, Math.min(basePop + Math.min(chain, 4), Math.floor(burstLimit / Math.max(1, cells.length))));
        this.shakeTimer = Math.max(this.shakeTimer, SCREEN_SHAKE_MS + chain * 18);
        this.shakePower = Math.min(8, SCREEN_SHAKE_PX * chainBoost);
        this.effects.push({
          type: "clearRing",
          x: cx,
          y: cy,
          age: 0,
          duration: CLEAR_RING_MS,
          radius: 22 + Math.min(5, cells.length) * 4,
          chain
        });
        this.effects.push({
          type: "clearShock",
          x: cx,
          y: cy,
          age: 0,
          duration: 300,
          radius: 18 + Math.min(6, cells.length) * 6,
          chain
        });
        this.effects.push({
          type: "clearFlash",
          x: cx,
          y: cy,
          age: 0,
          duration: 170,
          chain
        });
        if (chain > 1) {
          this.effects.push({
            type: "chainText",
            x: cx,
            y: Math.max(1.2, cy - 1.2),
            age: 0,
            duration: CHAIN_TEXT_MS,
            chain
          });
        }
        for (const cell of cells) {
          this.effects.push({
            type: "clearPulse",
            x: cell.x,
            y: cell.y,
            age: 0,
            duration: 260,
            hue: 42 + Math.random() * 40,
            chain
          });
          this.effects.push({
            type: "clear",
            x: cell.x,
            y: cell.y,
            age: 0,
            duration: CLEAR_FLASH_MS,
            born: now
          });
          for (let i = 0; i < particlesPerCell; i++) {
            const angle = Math.random() * Math.PI * 2;
            const speed = (18 + Math.random() * 28) * chainBoost;
            const type = CLEAR_PARTICLE_TYPES[i % CLEAR_PARTICLE_TYPES.length];
            this.effects.push({
              type,
              x: cell.x,
              y: cell.y,
              vx: Math.cos(angle) * speed,
              vy: Math.sin(angle) * speed - 11 * chainBoost,
              size: 3.2 + Math.random() * (4.8 + chain * 0.4),
              hue: 42 + Math.random() * 58,
              food: CLEAR_FOOD_TYPES[Math.floor(Math.random() * CLEAR_FOOD_TYPES.length)],
              spin: (Math.random() - 0.5) * 5.4,
              age: 0,
              duration: CLEAR_FLASH_MS + 150 + Math.random() * 90,
              born: now
            });
          }
        }
      }

      togglePause(playSound = true) {
        if (this.state === "playing" || this.state === "storyStage") {
          const wasPlaying = this.state === "playing";
          this.pauseReturnState = this.state;
          this.state = "paused";
          this.message = "PAUSED";
          this.messageTimer = 0;
          this.pauseChoiceIndex = 0;
          if (wasPlaying) {
            this.setSoftDrop(false);
            this.horizontalDir = 0;
            this.horizontalDelayTimer = 0;
            this.horizontalRepeatTimer = 0;
            this.lastHorizontalDir = 0;
            this.keys.delete("ArrowLeft");
            this.keys.delete("ArrowRight");
            this.keys.delete("ArrowDown");
          }
          if (playSound) this.sound.pauseCue();
          this.sound.pauseBgm();
          this.updateUI();
        } else if (this.state === "paused") {
          this.resumeFromPause();
        }
      }

      resumeFromPause() {
        if (this.state !== "paused") return;
        this.state = this.pauseReturnState || "playing";
        this.message = "";
        this.messageTimer = 0;
        this.sound.resumeCue();
        this.sound.resumeBgm();
        this.updateUI();
      }

      cyclePauseChoice(dir) {
        if (this.state !== "paused") return;
        this.pauseChoiceIndex = (this.pauseChoiceIndex + dir + PAUSE_CHOICES.length) % PAUSE_CHOICES.length;
        this.sound.menuMove();
      }

      confirmPauseChoice() {
        if (this.state !== "paused") return;
        if (PAUSE_CHOICES[this.pauseChoiceIndex] === "タイトル画面に戻る") {
          this.quitToTitle();
          return;
        }
        this.resumeFromPause();
      }

      requestQuitConfirm() {
        if (this.demoActive || (this.state !== "playing" && this.state !== "paused")) return;
        this.quitReturnState = this.state;
        this.quitConfirmIndex = 1;
        this.state = "quitConfirm";
        this.message = "";
        this.messageTimer = 0;
        this.setSoftDrop(false);
        this.horizontalDir = 0;
        this.horizontalDelayTimer = 0;
        this.horizontalRepeatTimer = 0;
        this.lastHorizontalDir = 0;
        this.keys.delete("ArrowLeft");
        this.keys.delete("ArrowRight");
        this.keys.delete("ArrowDown");
        this.sound.pauseBgm();
        this.updateUI();
      }

      cycleQuitConfirm(dir) {
        if (this.state !== "quitConfirm") return;
        this.quitConfirmIndex = (this.quitConfirmIndex + dir + QUIT_CHOICES.length) % QUIT_CHOICES.length;
      }

      cancelQuitConfirm() {
        if (this.state !== "quitConfirm") return;
        this.state = this.quitReturnState === "paused" ? "paused" : "playing";
        if (this.state === "playing") this.sound.resumeBgm();
        this.updateUI();
      }

      confirmQuitChoice() {
        if (this.state !== "quitConfirm") return;
        if (QUIT_CHOICES[this.quitConfirmIndex] === "はい") {
          this.quitToTitle();
          return;
        }
        this.cancelQuitConfirm();
      }

      quitToTitle() {
        const difficulty = this.selectedDifficulty;
        const playMode = this.selectedPlayMode;
        const cpuLevel = this.selectedCpuLevel;
        const storyDifficulty = this.storyDifficulty;
        this.sound.stopBgm();
        if (playMode === "knockout") {
          this.resetKnockoutProgress();
          const openingRound = this.currentKnockoutRound();
          this.reset(storyDifficulty, false, playMode, openingRound.cpuLevel);
          this.storyDifficulty = storyDifficulty;
        } else {
          this.reset(difficulty, false, playMode, cpuLevel);
        }
        this.state = "title";
        this.resetTitleDemo();
        this.message = "";
        this.messageTimer = 0;
        this.updateUI();
      }

      toggleBgmMute() {
        this.sound.ensure();
        const on = this.sound.toggleBgmMute();
        if (on && (
          this.state === "playing"
          || this.state === "storyStage"
          || this.state === "storyEnding"
          || this.state === "storyEndingTransition"
        )) this.playCurrentBgm(false);
        this.updateUI();
      }

      unlockSoundFromInput() {
        this.sound.unlock();
        this.updateUI();
      }

      update(now) {
        const dt = Math.min(50, now - this.lastTime);
        this.lastTime = now;
        this.updateEffects(dt);
        const shouldUpdateCpu = this.cpu
          && this.state !== "quitConfirm"
          && this.state !== "continueConfirm"
          && (this.state === "playing" || this.state === "resolving" || this.state === "riseWarning" || this.cpu.riseWarningTimer > 0);
        if (shouldUpdateCpu) this.cpu.update(now, dt);
        if (this.storyOpeningInputGuardTimer > 0) {
          this.storyOpeningInputGuardTimer = Math.max(0, this.storyOpeningInputGuardTimer - dt);
        }
        if (this.storyEndingInputGuardTimer > 0) {
          this.storyEndingInputGuardTimer = Math.max(0, this.storyEndingInputGuardTimer - dt);
        }
        if (this.storyStageInputGuardTimer > 0) {
          this.storyStageInputGuardTimer = Math.max(0, this.storyStageInputGuardTimer - dt);
        }
        this.pollGamepads();
        this.updateTitleDemo(dt);
        if (this.knockoutClearCelebrationTimer > 0) {
          this.knockoutClearCelebrationTimer = Math.max(0, this.knockoutClearCelebrationTimer - dt);
        }
        if (this.state === "storyOpening") {
          this.storyOpeningTimer = Math.min(STORY_OPENING_SCROLL_MS, this.storyOpeningTimer + dt);
          if (this.storyOpeningTimer >= STORY_OPENING_SCROLL_MS) this.finishStoryOpening();
          return;
        }
        if (this.state === "storyOpeningTransition") {
          this.storyOpeningTransitionTimer = Math.max(0, this.storyOpeningTransitionTimer - dt);
          if (this.storyOpeningTransitionTimer === 0) this.finishStoryOpeningTransition();
          return;
        }
        if (this.state === "storyEnding") {
          this.storyEndingTimer = Math.min(STORY_ENDING_SCROLL_MS, this.storyEndingTimer + dt);
          if (this.storyEndingTimer >= STORY_ENDING_SCROLL_MS) this.finishStoryEnding();
          return;
        }
        if (this.state === "storyEndingTransition") {
          this.storyEndingTransitionTimer = Math.max(0, this.storyEndingTransitionTimer - dt);
          if (this.storyEndingTransitionTimer === 0) this.finishStoryEndingTransition();
          return;
        }
        if (this.state === "storyStage") {
          this.storyStageTimer += dt;
          const dialogue = this.storyDialogueForMode();
          if (dialogue.length) {
            this.storyDialogTimer += dt;
            if (this.storyDialogTimer >= STORY_DIALOG_AUTO_MS) this.advanceStoryStage(true);
          }
          if (this.storyStageMode === "introFade" || this.storyStageMode === "clearFade" || this.storyStageMode === "endingFade") {
            this.storyStageFadeTimer = Math.max(0, this.storyStageFadeTimer - dt);
            if (this.storyStageFadeTimer === 0) this.finishStoryStageFade();
          }
          return;
        }

        if (this.state === "continueConfirm") {
          this.continueTimer = Math.max(0, this.continueTimer - dt);
          if (this.continueTimer === 0) this.declineContinue();
          return;
        }

        if (this.messageTimer > 0) {
          this.messageTimer = Math.max(0, this.messageTimer - dt);
          if (this.messageTimer === 0 && this.message !== "GAME OVER") {
            this.message = "";
            this.updateUI();
          }
        }
        if (this.knockoutSetTransitionTimer > 0) {
          this.knockoutSetTransitionTimer = Math.max(0, this.knockoutSetTransitionTimer - dt);
          if (this.knockoutSetTransitionTimer === 0) this.continueKnockoutTransition();
          return;
        }
        if (this.snapTimer > 0) this.snapTimer = Math.max(0, this.snapTimer - dt);
        if (this.riseWarningTimer > 0) {
          this.riseWarningTimer = Math.max(0, this.riseWarningTimer - dt);
          if (this.riseWarningTimer === 0 && this.state === "riseWarning") {
            const overflow = this.applyPendingRise();
            if (overflow) this.triggerBattleEnd("cpu");
            else {
              this.state = "playing";
              this.spawnPiece();
            }
          }
          return;
        }
        if (this.riseBounceTimer > 0) this.riseBounceTimer = Math.max(0, this.riseBounceTimer - dt);
        if (this.recordFlashTimer > 0) this.recordFlashTimer = Math.max(0, this.recordFlashTimer - dt);
        if (this.shakeTimer > 0) this.shakeTimer = Math.max(0, this.shakeTimer - dt);
        if (this.startLogoTimer > 0) this.startLogoTimer = Math.max(0, this.startLogoTimer - dt);
        if (this.overLogoTimer > 0) this.overLogoTimer = Math.max(0, this.overLogoTimer - dt);
        if (this.gameOverInputGuardTimer > 0) this.gameOverInputGuardTimer = Math.max(0, this.gameOverInputGuardTimer - dt);
        if (!this.demoActive && (this.state === "playing" || this.state === "resolving")) this.updateDangerAlarm(dt);
        if (this.demoActive) {
          this.demoTimer = Math.max(0, this.demoTimer - dt);
          if (this.demoTimer === 0) {
            this.returnToTitleFromDemo();
            return;
          }
        }

        if (this.isBattleAttackAnimationActive()) return;
        if (this.state !== "playing") return;
        if (this.demoActive) this.updateDemoAi(dt);
        else this.updateHorizontalHold(dt);
        this.hardDropStep(dt);
        if (this.hasGroundContact()) {
          this.lockTimer += dt;
          this.groundedLockTimer += dt;
          if (this.lockTimer >= LOCK_DELAY_MS || this.groundedLockTimer >= LOCK_FORCE_MS) this.lockPiece();
        } else {
          this.lockTimer = 0;
          this.groundedLockTimer = 0;
        }
      }

      updateTitleDemo(dt) {
        if (this.state !== "title") return;
        this.titleDemoTimer += dt;
        if (!this.titleDemoActive && this.titleDemoTimer >= TITLE_DEMO_DELAY_MS) {
          this.titleDemoActive = true;
          this.titleDemoPageTimer = 0;
          this.titleDemoPage = 0;
        }
        if (!this.titleDemoActive) return;
        this.titleDemoPageTimer += dt;
        while (this.titleDemoPageTimer >= TITLE_DEMO_PAGE_MS) {
          this.titleDemoPageTimer -= TITLE_DEMO_PAGE_MS;
          if (this.titleDemoPage >= TITLE_DEMO_PAGES.length - 1) {
            this.startDemoPlay();
            return;
          }
          this.titleDemoPage += 1;
        }
      }

      updateEffects(dt) {
        advanceEffects(this.effects, dt);
        this.updateBattleAttackTransfers(dt);
      }

      updateUI() {
        appEl?.classList.toggle(
          "story-scene",
          this.state === "storyOpening"
            || this.state === "storyOpeningTransition"
            || this.state === "storyEnding"
            || this.state === "storyEndingTransition"
            || this.state === "storyStage"
        );
        appEl?.classList.toggle("story-scroll", this.state === "storyOpening" || this.state === "storyEnding");
        const uiSnapshot = [
          this.score,
          this.level,
          this.chain,
          this.config.label,
          this.highScore,
          this.sound.bgmMuted ? 1 : 0,
          this.selectedDifficulty,
          this.storyDifficulty,
          this.selectedPlayMode,
          this.selectedCpuLevel,
          this.knockoutRoundIndex,
          this.knockoutPlayerWins,
          this.knockoutCpuWins,
          this.knockoutCleared ? 1 : 0
        ].join("|");
        if (uiSnapshot !== this.uiSnapshot) {
          const knockoutRound = this.currentKnockoutRound();
          this.uiSnapshot = uiSnapshot;
          scoreEl.textContent = String(this.score);
          levelEl.textContent = String(this.level);
          chainEl.textContent = String(this.chain);
          difficultyLabelEl.textContent = this.config.label;
          highScoreEl.textContent = String(this.highScore);
          bgmLabelEl.textContent = "";
          bgmLabelEl.classList.toggle("muted", this.sound.bgmMuted);
          bgmLabelEl.setAttribute("aria-label", this.sound.bgmMuted ? "BGM off" : "BGM on");
          statusLineEl.textContent = this.selectedPlayMode === "knockout"
            ? `${knockoutRoundText(knockoutRound, this.storyDifficulty)}  ${this.knockoutPlayerWins}-${this.knockoutCpuWins}`
            : "";
          difficultyButtons.forEach(button => {
            button.classList.toggle("active", button.dataset.difficulty === this.selectedDifficulty);
          });
        }
        this.renderNextCanvases();
      }

      renderNextCanvases() {
        const count = this.config.nextCount;
        const signature = this.pieceQueue.slice(0, count).map(piece => (
          piece ? `${piece.id}:${piece.shape}:${piece.rotation}:${piece.tiles.join(",")}` : "none"
        )).join("|");
        if (signature === this.nextSignature) return;
        this.nextSignature = signature;
        nextListEl.dataset.count = String(count);
        nextListEl.replaceChildren();
        for (let i = 0; i < count; i++) {
          const c = document.createElement("canvas");
          c.width = count === 2 ? 145 : 290;
          c.height = 88;
          c.className = "next-canvas";
          nextListEl.appendChild(c);
          drawMiniPiece(c.getContext("2d"), this.pieceQueue[i], i + 1);
        }
      }

      pollGamepads() {
        const pads = navigator.getGamepads
          ? [...navigator.getGamepads()].filter(pad => pad && pad.connected !== false)
          : [];
        if (!pads.length) {
          this.resetGamepadState();
          return;
        }
        const pressed = (pad, index) => Boolean(pad.buttons?.[index]?.pressed);
        const axis = (pad, index) => {
          const value = Number(pad.axes?.[index] || 0);
          return Number.isFinite(value) ? value : 0;
        };
        const axisNegative = (pad, index) => axis(pad, index) < -GAMEPAD_DEADZONE;
        const axisPositive = (pad, index) => axis(pad, index) > GAMEPAD_DEADZONE;
        let left = false;
        let right = false;
        let up = false;
        let down = false;
        let face0 = false;
        let face1 = false;
        let face2 = false;
        let face3 = false;
        let menu = false;
        for (const pad of pads) {
          left ||= pressed(pad, 14) || axisNegative(pad, 0) || axisNegative(pad, 2);
          right ||= pressed(pad, 15) || axisPositive(pad, 0) || axisPositive(pad, 2);
          up ||= pressed(pad, 12) || axisNegative(pad, 1) || axisNegative(pad, 3);
          down ||= pressed(pad, 13) || axisPositive(pad, 1) || axisPositive(pad, 3);
          face0 ||= pressed(pad, 0);
          face1 ||= pressed(pad, 1);
          face2 ||= pressed(pad, 2);
          face3 ||= pressed(pad, 3);
          menu ||= pressed(pad, 8) || pressed(pad, 9) || pressed(pad, 10) || pressed(pad, 11) || pressed(pad, 16) || pressed(pad, 17);
        }
        if (!down) this.softDropInputLocked = false;
        const anyInput = left || right || up || down || face0 || face1 || face2 || face3 || menu;
        if (anyInput && !this.prevButtons.gpAnyInput) this.unlockSoundFromInput();
        if (this.demoActive) {
          this.setSoftDrop(false);
          if (anyInput && !this.prevButtons.gpAnyInput) this.returnToTitleFromDemo();
          this.prevButtons.gpAnyInput = anyInput;
          this.prevButtons.gpLeft = left;
          this.prevButtons.gpRight = right;
          this.prevButtons.gpUp = up;
          this.prevButtons.gpDown = down;
          this.prevButtons.gpStartFace = face0;
          this.prevButtons.gpBackFace = face1;
          this.prevButtons.gpRotateForward = face0 || face1;
          this.prevButtons.gpRotateBack = face2 || face3;
          this.prevButtons.gpMenu = menu;
          return;
        }
        if (this.state === "storyOpening" || this.state === "storyOpeningTransition") {
          this.setSoftDrop(false);
          if (anyInput && !this.prevButtons.gpAnyInput && this.storyOpeningInputGuardTimer <= 0) this.skipStoryOpening();
          this.prevButtons.gpAnyInput = anyInput;
          this.prevButtons.gpLeft = left;
          this.prevButtons.gpRight = right;
          this.prevButtons.gpUp = up;
          this.prevButtons.gpDown = down;
          this.prevButtons.gpStartFace = face0;
          this.prevButtons.gpBackFace = face1;
          this.prevButtons.gpRotateForward = face0 || face1;
          this.prevButtons.gpRotateBack = face2 || face3;
          this.prevButtons.gpMenu = menu;
          return;
        }
        if (this.state === "storyEnding" || this.state === "storyEndingTransition") {
          this.setSoftDrop(false);
          if (anyInput && !this.prevButtons.gpAnyInput && this.storyEndingInputGuardTimer <= 0) this.skipStoryEnding();
          this.prevButtons.gpAnyInput = anyInput;
          this.prevButtons.gpLeft = left;
          this.prevButtons.gpRight = right;
          this.prevButtons.gpUp = up;
          this.prevButtons.gpDown = down;
          this.prevButtons.gpStartFace = face0;
          this.prevButtons.gpBackFace = face1;
          this.prevButtons.gpRotateForward = face0 || face1;
          this.prevButtons.gpRotateBack = face2 || face3;
          this.prevButtons.gpMenu = menu;
          return;
        }
        if (this.state === "storyStage") {
          this.setSoftDrop(false);
          if (menu && !this.prevButtons.gpMenu) this.togglePause();
          else if (anyInput && !this.prevButtons.gpAnyInput) this.advanceStoryStage();
          this.prevButtons.gpAnyInput = anyInput;
          this.prevButtons.gpLeft = left;
          this.prevButtons.gpRight = right;
          this.prevButtons.gpUp = up;
          this.prevButtons.gpDown = down;
          this.prevButtons.gpStartFace = face0;
          this.prevButtons.gpBackFace = face1;
          this.prevButtons.gpRotateForward = face0 || face1;
          this.prevButtons.gpRotateBack = face2 || face3;
          this.prevButtons.gpMenu = menu;
          return;
        }
        if (this.state === "title") {
          this.setSoftDrop(false);
          if (this.titleDemoActive) {
            if (anyInput) this.dismissTitleDemo();
            this.prevButtons.gpAnyInput = anyInput;
            this.prevButtons.gpLeft = left;
            this.prevButtons.gpRight = right;
            this.prevButtons.gpUp = up;
            this.prevButtons.gpDown = down;
            this.prevButtons.gpStartFace = face0;
            this.prevButtons.gpBackFace = face1;
            this.prevButtons.gpRotateForward = face0 || face1;
            this.prevButtons.gpRotateBack = face2 || face3;
            this.prevButtons.gpMenu = menu;
            return;
          }
          this.edgeButton("gpLeft", left, () => this.cycleDifficulty(-1));
          this.edgeButton("gpRight", right, () => this.cycleDifficulty(1));
          this.edgeButton("gpStartFace", face0, () => this.primaryAction());
          this.edgeButton("gpBackFace", face1, () => this.backFromDifficultyToModeSelect());
          this.edgeButton("gpMenu", menu, () => this.primaryAction());
          return;
        }
        if (this.state === "quitConfirm") {
          this.setSoftDrop(false);
          this.edgeButton("gpLeft", left || up, () => this.cycleQuitConfirm(-1));
          this.edgeButton("gpRight", right || down, () => this.cycleQuitConfirm(1));
          this.edgeButton("gpStartFace", face0 || menu, () => this.confirmQuitChoice());
          this.edgeButton("gpBackFace", face1, () => this.cancelQuitConfirm());
          return;
        }
        if (this.state === "paused") {
          this.setSoftDrop(false);
          this.edgeButton("gpLeft", left || up, () => this.cyclePauseChoice(-1));
          this.edgeButton("gpRight", right || down, () => this.cyclePauseChoice(1));
          this.edgeButton("gpStartFace", face0, () => this.confirmPauseChoice());
          this.edgeButton("gpBackFace", face1, () => this.resumeFromPause());
          this.edgeButton("gpMenu", menu, () => this.togglePause());
          return;
        }
        if (this.state === "continueConfirm") {
          this.setSoftDrop(false);
          this.edgeButton("gpLeft", left || up, () => this.cycleContinueChoice(-1));
          this.edgeButton("gpRight", right || down, () => this.cycleContinueChoice(1));
          this.edgeButton("gpStartFace", face0 || menu, () => this.confirmContinueChoice());
          this.edgeButton("gpBackFace", face1, () => this.declineContinue());
          return;
        }
        if (this.state === "gameover") {
          this.setSoftDrop(false);
          const confirm = face0 || face1 || menu;
          if (!this.canConfirmGameOver()) {
            this.prevButtons.gpGameOverConfirm = confirm;
            this.prevButtons.gpStartFace = face0;
            this.prevButtons.gpMenu = menu;
            this.prevButtons.gpLeft = left;
            this.prevButtons.gpRight = right;
            return;
          }
          this.edgeButton("gpGameOverConfirm", confirm, () => this.confirmGameOver());
          return;
        }
        if (this.state === "modeSelect") {
          this.setSoftDrop(false);
          this.edgeButton("gpUp", up, () => this.cyclePlayMode(-1));
          this.edgeButton("gpDown", down, () => this.cyclePlayMode(1));
          this.edgeButton("gpStartFace", face0, () => this.primaryAction());
          this.edgeButton("gpBackFace", face1, () => this.backToDifficultySelect());
          this.edgeButton("gpMenu", menu, () => this.primaryAction());
          return;
        }
        if (this.state === "cpuLevelSelect") {
          this.setSoftDrop(false);
          this.edgeButton("gpUp", up, () => this.cycleCpuLevel(-1));
          this.edgeButton("gpDown", down, () => this.cycleCpuLevel(1));
          this.edgeButton("gpStartFace", face0, () => this.start("cpu", this.selectedCpuLevel));
          this.edgeButton("gpBackFace", face1, () => this.backToModeSelect());
          this.edgeButton("gpMenu", menu, () => this.start("cpu", this.selectedCpuLevel));
          return;
        }
        this.setSoftDrop(down && !this.softDropInputLocked);
        this.edgeButton("gpLeft", left, () => this.pressHorizontal(-1), () => this.releaseHorizontal(-1));
        this.edgeButton("gpRight", right, () => this.pressHorizontal(1), () => this.releaseHorizontal(1));
        this.edgeButton("gpRotateForward", face0 || face1, () => this.rotate(1));
        this.edgeButton("gpRotateBack", face2, () => this.rotate(-1));
        this.edgeButton("gpQuit", face3, () => this.requestQuitConfirm());
        this.edgeButton("gpMenu", menu, () => this.togglePause());
      }

      resetGamepadState() {
        if (!this.keys.has("ArrowDown")) {
          this.softDropInputLocked = false;
          this.setSoftDrop(false);
        }
        if (!this.keys.has("ArrowLeft") && !this.keys.has("ArrowRight")) {
          this.horizontalDir = 0;
          this.horizontalDelayTimer = 0;
          this.horizontalRepeatTimer = 0;
        }
        for (const name of Object.keys(this.prevButtons)) {
          if (name.startsWith("gp")) this.prevButtons[name] = false;
        }
      }

      edgeButton(name, pressed, onPress, onRelease = null) {
        if (pressed && !this.prevButtons[name]) onPress();
        if (!pressed && this.prevButtons[name] && onRelease) onRelease();
        this.prevButtons[name] = pressed;
      }
    }

    const TILE_SPRITE_SIZE = 72;
    const tileSpriteCache = new Map();
    const frameSpriteCache = new Map();
    let game = null;
    let frameImageReady = false;
    const frameImage = new Image();
    const guideImage = new Image();
    const characterImages = new Map();
    const logoImages = new Map();
    const storyImages = new Map();
    const dialogWrapCache = new Map();
    const backgroundImages = [];

    function loadGameAssets() {
      frameImage.onload = () => {
        frameImageReady = true;
        frameSpriteCache.clear();
      };
      frameImage.src = assetUrl(FRAME_ASSET_SRC);
      guideImage.onload = () => requestAnimationFrame(() => {
        if (game) drawBoard();
      });
      guideImage.src = assetUrl(GUIDE_CHARACTER_SRC);
      for (const [key, src] of Object.entries(LOGO_ASSETS)) {
        const image = new Image();
        image.onload = () => requestAnimationFrame(() => {
          if (game) drawBoard();
        });
        image.src = assetUrl(src);
        logoImages.set(key, image);
      }
      for (const src of [...LEVEL_BACKGROUND_SOURCES, SECRET_BACKGROUND_SRC]) {
        const image = new Image();
        image.src = assetUrl(src);
        backgroundImages.push(image);
      }
      for (let i = 1; i <= STORY_STAGES.length; i++) {
        for (const suffix of ["a", "b"]) {
          const image = new Image();
          image.onload = () => requestAnimationFrame(() => {
            if (game) drawBoard();
          });
          image.src = assetUrl(`${i}${suffix}.png`);
          storyImages.set(`${i}${suffix}`, image);
        }
        const background = new Image();
        background.onload = () => requestAnimationFrame(() => {
          if (game) drawBoard();
        });
        background.src = assetUrl(`h${i}.png`);
        storyImages.set(`h${i}`, background);
      }
      const ending = new Image();
      ending.onload = () => requestAnimationFrame(() => {
        if (game) drawBoard();
      });
      ending.src = assetUrl("h10.png");
      storyImages.set("h10", ending);
      for (const [type, info] of Object.entries(TILE_TYPES)) {
        const image = new Image();
        image.onload = () => {
          tileSpriteCache.delete(type);
          requestAnimationFrame(() => {
            if (!game) return;
            game.nextSignature = "";
            game.updateUI();
          });
        };
        image.src = assetUrl(info.asset);
        characterImages.set(type, image);
      }
    }

    function setBackgroundImage(src, instant = false) {
      if (!src || src === currentBackgroundSrc) return;
      const nextLayerIndex = instant ? activeBackgroundLayer : 1 - activeBackgroundLayer;
      const nextLayer = bgLayers[nextLayerIndex];
      const currentLayer = bgLayers[activeBackgroundLayer];
      if (!nextLayer || !currentLayer) return;
      nextLayer.style.backgroundImage = `url("${src}")`;
      if (instant) {
        nextLayer.classList.add("active");
        bgLayers[1 - nextLayerIndex]?.classList.remove("active");
      } else {
        nextLayer.classList.remove("active");
        nextLayer.offsetHeight;
        requestAnimationFrame(() => {
          nextLayer.classList.add("active");
          currentLayer.classList.remove("active");
        });
        activeBackgroundLayer = nextLayerIndex;
      }
      currentBackgroundSrc = src;
    }

    function setBackgroundForLevel(level, instant = false) {
      setBackgroundImage(backgroundForLevel(level), instant);
    }

    function setBackgroundForStoryStage(roundIndex = 0, instant = false) {
      const stageIndex = Math.max(1, Math.min(STORY_STAGES.length, roundIndex + 1));
      setBackgroundImage(`h${stageIndex}.png`, instant);
    }

    function setEndingStoryBackground(instant = false) {
      setBackgroundImage("h10.png", instant);
    }

    loadGameAssets();
    game = new Game();

    function shuffle(items) {
      const arr = [...items];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function dropIntervalForLevel(level, multiplier = 1, minOffset = 0) {
      const safeLevel = Math.max(1, level || 1);
      const earlyLevel = Math.min(safeLevel, DROP_SPEED_SHIFT_LEVEL - 1);
      let interval = BASE_DROP_MS * Math.pow(DROP_ACCEL_PER_LEVEL, earlyLevel - 1);
      if (safeLevel >= DROP_SPEED_SHIFT_LEVEL) {
        interval *= Math.pow(DROP_ACCEL_AFTER_LEVEL_80, safeLevel - DROP_SPEED_SHIFT_LEVEL + 1);
      }
      if (safeLevel > DROP_PANIC_SPEED_LEVEL) {
        interval *= Math.pow(DROP_ACCEL_AFTER_LEVEL_100, safeLevel - DROP_PANIC_SPEED_LEVEL);
      }
      const minInterval = safeLevel >= DROP_PANIC_SPEED_LEVEL
        ? DROP_MIN_AFTER_LEVEL_100_MS
        : safeLevel >= DROP_SPEED_SHIFT_LEVEL
          ? DROP_MIN_AFTER_LEVEL_80_MS
          : MIN_DROP_MS;
      return Math.max(minInterval + minOffset, Math.round(interval * multiplier));
    }

    function createGarbageRow(grid, config, now = performance.now()) {
      const tiles = config.tiles;
      const row = [];
      for (let x = 0; x < COLS; x++) {
        const leftType = row[x - 1]?.tileType || null;
        const aboveType = grid[ROWS - 2]?.[x]?.tileType || null;
        const aboveLeftType = grid[ROWS - 2]?.[x - 1]?.tileType || null;
        const aboveRightType = grid[ROWS - 2]?.[x + 1]?.tileType || null;
        let bestPenalty = Infinity;
        const options = [];
        const start = Math.floor(Math.random() * tiles.length);
        for (let i = 0; i < tiles.length; i++) {
          const type = tiles[(start + i) % tiles.length];
          let penalty = 0;
          if (type === leftType) penalty += 100;
          if (type === aboveType) penalty += 120;
          if (type === aboveLeftType) penalty += 16;
          if (type === aboveRightType) penalty += 16;
          if (penalty < bestPenalty) {
            bestPenalty = penalty;
            options.length = 0;
            options.push(type);
          } else if (penalty === bestPenalty) {
            options.push(type);
          }
        }
        const tileType = options[Math.floor(Math.random() * options.length)] || tiles[0];
        row.push({ tileType, landedAt: now });
      }
      return row;
    }

    function wait(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function getPieceCells(piece) {
      if (!piece) return [];
      return SHAPES[piece.shape][piece.rotation].map((offset, i) => ({
        x: piece.x + offset.x,
        y: piece.y + offset.y,
        tileType: piece.tiles[i]
      }));
    }

    function cloneGrid(grid) {
      return grid.map(row => row.map(tile => tile ? { tileType: tile.tileType } : null));
    }

    function isValidPieceOnGrid(piece, grid) {
      if (!piece) return false;
      const offsets = SHAPES[piece.shape][piece.rotation];
      for (let i = 0; i < offsets.length; i++) {
        const x = piece.x + offsets[i].x;
        const y = piece.y + offsets[i].y;
        if (x < 0 || x >= COLS || y >= ROWS) return false;
        if (y >= 0 && grid[y][x]) return false;
      }
      return true;
    }

    function settlePieceOnGrid(piece, grid) {
      const trial = { ...piece };
      if (!isValidPieceOnGrid(trial, grid)) return null;
      while (true) {
        trial.y += 1;
        if (!isValidPieceOnGrid(trial, grid)) {
          trial.y -= 1;
          break;
        }
      }
      return trial;
    }

    function findClearGroupsInGrid(grid) {
      const visited = Array.from({ length: ROWS }, () => Array(COLS).fill(false));
      const groups = [];
      for (let y = 0; y < ROWS; y++) {
        for (let x = 0; x < COLS; x++) {
          const tile = grid[y][x];
          if (!tile || visited[y][x]) continue;
          const stack = [{ x, y }];
          const group = [];
          visited[y][x] = true;
          while (stack.length) {
            const cell = stack.pop();
            group.push(cell);
            for (const dir of DIRS4) {
              const nx = cell.x + dir[0];
              const ny = cell.y + dir[1];
              if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS || visited[ny][nx]) continue;
              if (grid[ny][nx]?.tileType === tile.tileType) {
                visited[ny][nx] = true;
                stack.push({ x: nx, y: ny });
              }
            }
          }
          if (group.length >= 4) groups.push(group);
        }
      }
      return groups;
    }

    function applyGravityToGrid(grid) {
      for (let x = 0; x < COLS; x++) {
        let writeY = ROWS - 1;
        for (let y = ROWS - 1; y >= 0; y--) {
          const tile = grid[y][x];
          if (!tile) continue;
          grid[writeY][x] = tile;
          if (writeY !== y) grid[y][x] = null;
          writeY -= 1;
        }
        for (let y = writeY; y >= 0; y--) {
          grid[y][x] = null;
        }
      }
    }

    function simulateChainResult(grid) {
      const resultGrid = cloneGrid(grid);
      let maxChain = 0;
      let totalCleared = 0;
      const chainClears = [];
      while (true) {
        const groups = findClearGroupsInGrid(resultGrid);
        if (!groups.length) break;
        maxChain += chainStepValue(groups, resultGrid);
        let clearedThisChain = 0;
        for (const group of groups) {
          clearedThisChain += group.length;
          for (const cell of group) resultGrid[cell.y][cell.x] = null;
        }
        totalCleared += clearedThisChain;
        chainClears.push(clearedThisChain);
        applyGravityToGrid(resultGrid);
      }
      return { grid: resultGrid, maxChain, totalCleared, chainClears };
    }

    function evaluateAiPlacement(grid, piece, ai) {
      const testGrid = cloneGrid(grid);
      const cells = getPieceCells(piece);
      for (const cell of cells) {
        if (cell.y < 0 || cell.y >= ROWS || cell.x < 0 || cell.x >= COLS || testGrid[cell.y][cell.x]) {
          return { score: -9999, grid: testGrid, maxChain: 0, totalCleared: 0 };
        }
        testGrid[cell.y][cell.x] = { tileType: cell.tileType };
      }

      const beforePotential = potentialGroupScore(testGrid);
      const simulation = simulateChainResult(testGrid);
      const afterPotential = potentialGroupScore(simulation.grid);
      let adjacency = 0;
      for (const cell of cells) {
        for (const dir of DIRS4) {
          const nx = cell.x + dir[0];
          const ny = cell.y + dir[1];
          if (testGrid[ny]?.[nx]?.tileType === cell.tileType) adjacency += 7;
        }
      }
      const heightPenalty = stackHeightOf(simulation.grid) * (ai.heightPenalty || 0);
      const centerBonus = 6 - Math.abs(piece.x - (COLS - 1) / 2);
      const centerWeight = ai.centerWeight ?? 1;
      const chainBonus = simulation.maxChain > 1
        ? Math.pow(simulation.maxChain, 2.75) * (ai.chainWeight || 0) + simulation.totalCleared * (ai.chainClearWeight || 0)
        : 0;
      const singleClearPenalty = simulation.maxChain === 1
        ? (ai.singleClearPenalty || 0) * Math.max(1, simulation.totalCleared / 4)
        : 0;
      const score = simulation.totalCleared * (ai.clearWeight || 0)
        + chainBonus
        + adjacency * (ai.adjacencyWeight || 0)
        + beforePotential * (ai.setupWeight || 0)
        + afterPotential * (ai.potentialWeight || 0)
        + centerBonus * centerWeight
        - heightPenalty
        - singleClearPenalty;
      return { ...simulation, score };
    }

    function bestFollowUpScore(grid, nextPiece, ai) {
      if (!nextPiece || !(ai.lookaheadWeight > 0)) return 0;
      let best = -Infinity;
      for (let rotation = 0; rotation < SHAPES[nextPiece.shape].length; rotation++) {
        for (let x = -2; x < COLS + 2; x++) {
          const settled = settlePieceOnGrid({ ...nextPiece, rotation, x, y: 1 }, grid);
          if (!settled) continue;
          best = Math.max(best, evaluateAiPlacement(grid, settled, ai).score);
        }
      }
      return Number.isFinite(best) ? best : 0;
    }

    function countClearableCells(grid) {
      return findClearGroupsInGrid(grid).reduce((sum, group) => sum + group.length, 0);
    }

    function stackHeightOf(grid) {
      for (let y = 0; y < ROWS; y++) {
        if (grid[y].some(Boolean)) return ROWS - y;
      }
      return 0;
    }

    function potentialGroupScore(grid) {
      const visited = Array.from({ length: ROWS }, () => Array(COLS).fill(false));
      let score = 0;
      for (let y = 0; y < ROWS; y++) {
        for (let x = 0; x < COLS; x++) {
          const tile = grid[y][x];
          if (!tile || visited[y][x]) continue;
          const stack = [{ x, y }];
          const group = [];
          visited[y][x] = true;
          while (stack.length) {
            const cell = stack.pop();
            group.push(cell);
            for (const dir of DIRS4) {
              const nx = cell.x + dir[0];
              const ny = cell.y + dir[1];
              if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS || visited[ny][nx]) continue;
              if (grid[ny][nx]?.tileType === tile.tileType) {
                visited[ny][nx] = true;
                stack.push({ x: nx, y: ny });
              }
            }
          }
          if (group.length >= 2) score += group.length * group.length * (group.length >= 4 ? 1.8 : 1);
        }
      }
      return score;
    }

    function attackRowsForChain(chain) {
      if (chain < ATTACK_CHAIN_MIN) return 0;
      if (chain === 3) return 3;
      if (chain === 4) return 4;
      if (chain === 5) return 6;
      return 7;
    }

    function attackEnergyLevelForChain(chain) {
      if (chain < 2 || chain > ATTACK_ENERGY_MAX_BEAMS + 1) return 0;
      return chain - 1;
    }

    function cpuStrengthConfig(key) {
      return [...CPU_STRENGTHS, ...KNOCKOUT_CPU_STRENGTHS].find(level => level.key === key) || CPU_STRENGTHS[1];
    }

    function clampNumber(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function storyCpuDifficultyConfig(base, difficultyKey = "normal", roundIndex = 0) {
      const profile = STORY_CPU_DIFFICULTY_PROFILES[difficultyKey] || STORY_CPU_DIFFICULTY_PROFILES.normal;
      const late = clampNumber((roundIndex - 5) / 3, 0, 1);
      const rushDropChance = (base.rushDropChance || 0) * profile.rushDropChance + (profile.lateRushAdd || 0) * late;
      const actionMs = Math.max(profile.minActionMs || 20, Math.round((base.actionMs || 70) * profile.actionMs));
      const dropMultiplier = Math.max(profile.minDropMultiplier || 0.28, (base.dropMultiplier || 1) * profile.dropMultiplier);
      return {
        ...base,
        storyDifficulty: difficultyKey,
        actionMs,
        dropMultiplier,
        mistakeChance: clampNumber((base.mistakeChance || 0) * profile.mistakeScale + profile.mistakeAdd, 0, 0.98),
        mistakePoolRatio: clampNumber((base.mistakePoolRatio ?? 0.42) + profile.mistakePoolRatioAdd, 0.1, 0.8),
        stallChance: clampNumber((base.stallChance || 0) + profile.stallAdd, 0, 0.72),
        randomness: Math.max(0, (base.randomness || 0) * profile.randomness),
        chainAvoidChance: clampNumber((base.chainAvoidChance || 0) + profile.chainAvoidAdd, 0, 0.98),
        chainAvoidAbove: clampNumber((base.chainAvoidAbove || 3) + profile.chainAvoidAboveAdd, 2, 5),
        clearWeight: (base.clearWeight || 0) * profile.clearWeight,
        adjacencyWeight: (base.adjacencyWeight || 0) * profile.adjacencyWeight,
        potentialWeight: (base.potentialWeight || 0) * profile.potentialWeight,
        setupWeight: (base.setupWeight || 0) * profile.setupWeight,
        chainWeight: (base.chainWeight || 0) * profile.chainWeight,
        chainClearWeight: (base.chainClearWeight || 0) * profile.chainClearWeight,
        singleClearPenalty: (base.singleClearPenalty || 0) * profile.singleClearPenalty,
        lookaheadWeight: (base.lookaheadWeight || 0) * profile.lookaheadWeight,
        heightPenalty: (base.heightPenalty || 0) * profile.heightPenalty,
        rushDropChance: clampNumber(rushDropChance, 0, 3),
        rushDropMs: Math.max(120, Math.round((base.rushDropMs || 260) * profile.rushDropMs)),
        rushDropMultiplier: clampNumber((base.rushDropMultiplier || 0.55) * profile.rushDropMultiplier, 0.24, 1)
      };
    }

    function isSelectableCpuLevel(key) {
      return CPU_STRENGTHS.some(level => level.key === key);
    }

    function isCpuPlayMode(playMode) {
      return playMode === "cpu" || playMode === "knockout";
    }

    function difficultyLabelJa(key) {
      if (key === "easy") return "イージー";
      if (key === "normal") return "ノーマル";
      if (key === "hard") return "ハード";
      return DIFFICULTIES[key]?.label || key;
    }

    function knockoutRoundText(round, storyDifficulty = "normal") {
      return `${round.round}回戦 盤面${difficultyLabelJa(round.difficulty)} / 強さ${difficultyLabelJa(storyDifficulty)}`;
    }

    function highScoreKey(difficultyKey, playMode, cpuLevel = "normal") {
      const suffix = isCpuPlayMode(playMode) ? cpuLevel : "solo";
      return `${HIGH_SCORE_STORAGE_PREFIX}.${difficultyKey}.${playMode}.${suffix}`;
    }

    function loadHighScore(difficultyKey, playMode, cpuLevel = "normal") {
      try {
        const raw = localStorage.getItem(highScoreKey(difficultyKey, playMode, cpuLevel));
        const score = Number.parseInt(raw || "0", 10);
        return Number.isFinite(score) && score > 0 ? score : 0;
      } catch {
        return 0;
      }
    }

    function saveHighScore(difficultyKey, playMode, cpuLevel, score) {
      try {
        localStorage.setItem(highScoreKey(difficultyKey, playMode, cpuLevel), String(score));
      } catch {
        // Storage can be unavailable in some private contexts; the game should keep running.
      }
    }

    function useMobileGameplayLayout() {
      return typeof isTouchDevice === "function" && isTouchDevice();
    }

    function getSoloLayout() {
      if (useMobileGameplayLayout()) {
        const scale = MOBILE_GAME_CELL / CELL;
        return { x: MOBILE_SOLO_X, y: MOBILE_BOARD_Y, cell: MOBILE_GAME_CELL, scale, name: "solo-mobile" };
      }
      return { x: BOARD_X, y: BOARD_Y, cell: CELL, scale: 1, name: "solo" };
    }

    function getBattleLayouts() {
      if (useMobileGameplayLayout()) {
        const scale = MOBILE_GAME_CELL / CELL;
        return {
          player: { x: MOBILE_BATTLE_PLAYER_X, y: MOBILE_BOARD_Y, cell: MOBILE_GAME_CELL, scale, name: "player-mobile" },
          cpu: { x: MOBILE_BATTLE_CPU_X, y: MOBILE_BOARD_Y, cell: MOBILE_GAME_CELL, scale, name: "cpu-mobile" }
        };
      }
      const scale = BATTLE_CELL / CELL;
      return {
        player: { x: BATTLE_PLAYER_X, y: BATTLE_BOARD_Y, cell: BATTLE_CELL, scale, name: "player" },
        cpu: { x: BATTLE_CPU_X, y: BATTLE_BOARD_Y, cell: BATTLE_CELL, scale, name: "cpu" }
      };
    }

    function cellToPixelInLayout(layout, x, y) {
      return {
        x: layout.x + x * layout.cell + layout.cell / 2,
        y: layout.y + y * layout.cell + layout.cell / 2
      };
    }

    function roundedRect(ctx, x, y, w, h, r) {
      const rr = Math.min(r, w / 2, h / 2);
      ctx.beginPath();
      ctx.moveTo(x + rr, y);
      ctx.arcTo(x + w, y, x + w, y + h, rr);
      ctx.arcTo(x + w, y + h, x, y + h, rr);
      ctx.arcTo(x, y + h, x, y, rr);
      ctx.arcTo(x, y, x + w, y, rr);
      ctx.closePath();
    }

    function drawTinyHeart(ctx, x, y, size, color, alpha = 1, rotation = 0) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(rotation);
      ctx.globalAlpha *= alpha;
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(0, size * 0.42);
      ctx.bezierCurveTo(-size * 0.58, size * 0.05, -size * 0.5, -size * 0.42, -size * 0.16, -size * 0.36);
      ctx.bezierCurveTo(-size * 0.02, -size * 0.62, size * 0.34, -size * 0.56, size * 0.36, -size * 0.22);
      ctx.bezierCurveTo(size * 0.38, size * 0.06, size * 0.16, size * 0.24, 0, size * 0.42);
      ctx.fill();
      ctx.restore();
    }

    function drawFieldFoodMark(ctx, kind, x, y, size, color, alpha = 0.08, rotation = 0) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(rotation);
      ctx.globalAlpha *= alpha;
      ctx.fillStyle = color;
      ctx.strokeStyle = color;
      ctx.lineWidth = Math.max(1, size * 0.08);
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      if (kind === "carrot") {
        ctx.beginPath();
        ctx.moveTo(0, size * 0.42);
        ctx.quadraticCurveTo(-size * 0.36, -size * 0.08, -size * 0.1, -size * 0.38);
        ctx.quadraticCurveTo(size * 0.22, -size * 0.15, 0, size * 0.42);
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(-size * 0.08, -size * 0.34);
        ctx.lineTo(-size * 0.26, -size * 0.58);
        ctx.moveTo(size * 0.03, -size * 0.34);
        ctx.lineTo(size * 0.2, -size * 0.58);
        ctx.stroke();
      } else if (kind === "fish") {
        fillEllipse(ctx, -size * 0.04, 0, size * 0.34, size * 0.18, color);
        ctx.beginPath();
        ctx.moveTo(size * 0.26, 0);
        ctx.lineTo(size * 0.54, -size * 0.2);
        ctx.lineTo(size * 0.54, size * 0.2);
        ctx.closePath();
        ctx.fill();
        fillEllipse(ctx, -size * 0.22, -size * 0.03, size * 0.035, size * 0.035, "rgba(255,255,255,0.7)");
      } else if (kind === "bone") {
        ctx.beginPath();
        ctx.moveTo(-size * 0.28, -size * 0.18);
        ctx.lineTo(size * 0.28, size * 0.18);
        ctx.stroke();
        fillEllipse(ctx, -size * 0.38, -size * 0.24, size * 0.12, size * 0.1, color, -0.4);
        fillEllipse(ctx, -size * 0.24, -size * 0.36, size * 0.11, size * 0.1, color, 0.7);
        fillEllipse(ctx, size * 0.38, size * 0.24, size * 0.12, size * 0.1, color, -0.4);
        fillEllipse(ctx, size * 0.24, size * 0.36, size * 0.11, size * 0.1, color, 0.7);
      } else {
        ctx.beginPath();
        ctx.moveTo(-size * 0.42, size * 0.18);
        ctx.quadraticCurveTo(-size * 0.08, -size * 0.46, size * 0.42, -size * 0.08);
        ctx.quadraticCurveTo(size * 0.04, size * 0.3, -size * 0.42, size * 0.18);
        ctx.fill();
        ctx.globalAlpha *= 0.65;
        ctx.beginPath();
        ctx.moveTo(-size * 0.28, size * 0.12);
        ctx.quadraticCurveTo(-size * 0.03, -size * 0.08, size * 0.26, -size * 0.1);
        ctx.stroke();
      }
      ctx.restore();
    }

    function getFrameAssetRect(layout = getSoloLayout()) {
      const scaleX = (COLS * layout.cell) / FRAME_GRID_SRC_W;
      const scaleY = (ROWS * layout.cell) / FRAME_GRID_SRC_H;
      return {
        x: layout.x - FRAME_GRID_SRC_X * scaleX,
        y: layout.y - FRAME_GRID_SRC_Y * scaleY,
        w: FRAME_ASSET_W * scaleX,
        h: FRAME_ASSET_H * scaleY
      };
    }

    function drawCuteFrame(ctx, layout = getSoloLayout()) {
      const frame = getFrameAssetRect(layout);
      ctx.save();
      ctx.shadowColor = "rgba(95, 54, 22, 0.3)";
      ctx.shadowBlur = 18 * layout.scale;
      ctx.shadowOffsetY = 10 * layout.scale;
      if (frameImageReady) {
        ctx.drawImage(frameImage, frame.x, frame.y, frame.w, frame.h);
      } else {
        ctx.fillStyle = "#ffe9a8";
        roundedRect(ctx, layout.x - 10 * layout.scale, layout.y - 10 * layout.scale, COLS * layout.cell + 20 * layout.scale, ROWS * layout.cell + 20 * layout.scale, 14 * layout.scale);
        ctx.fill();
        ctx.strokeStyle = "rgba(122, 83, 35, 0.35)";
        ctx.lineWidth = 2 * layout.scale;
        roundedRect(ctx, layout.x - 10 * layout.scale, layout.y - 10 * layout.scale, COLS * layout.cell + 20 * layout.scale, ROWS * layout.cell + 20 * layout.scale, 14 * layout.scale);
        ctx.stroke();
      }
      ctx.restore();
    }

    function getFrameSprite(layout = getSoloLayout()) {
      const key = `${layout.name}:${layout.x}:${layout.y}:${layout.cell}:${frameImageReady ? 1 : 0}`;
      const cached = frameSpriteCache.get(key);
      if (cached) return cached;
      const frame = getFrameAssetRect(layout);
      const pad = Math.ceil(34 * layout.scale);
      const sprite = document.createElement("canvas");
      sprite.width = Math.ceil(frame.w + pad * 2);
      sprite.height = Math.ceil(frame.h + pad * 2);
      const sctx = sprite.getContext("2d");
      sctx.translate(-frame.x + pad, -frame.y + pad);
      drawCuteFrame(sctx, layout);
      const record = { image: sprite, x: frame.x - pad, y: frame.y - pad };
      frameSpriteCache.set(key, record);
      return record;
    }

    function frameShakeOffset(board, layout, now = performance.now()) {
      if (!board) return { x: 0, y: 0 };
      let amp = 0;
      if (board.riseWarningTimer > 0) {
        const p = 1 - Math.min(1, board.riseWarningTimer / RISE_WARNING_MS);
        const rows = Math.min(10, board.riseWarningRows || 1);
        const build = 0.62 + p * 0.48;
        const pulse = 0.72 + Math.sin(p * Math.PI * 14) * 0.28;
        const tremor = 0.86 + Math.sin(now * 0.043) * 0.14;
        amp = RISE_WARNING_SHAKE_PX * layout.scale * (1 + rows * 0.07) * build * pulse * tremor;
      } else if (board.riseBounceTimer > 0) {
        const p = Math.min(1, board.riseBounceTimer / RISE_BOUNCE_MS);
        const rows = Math.min(10, board.riseBounceRows || 1);
        const pulse = 0.75 + Math.sin(p * Math.PI * 5) * 0.25;
        amp = (4.6 + rows * 0.18) * layout.scale * p * pulse;
      }
      if (amp <= 0) return { x: 0, y: 0 };
      return {
        x: Math.sin(now * 0.16) * amp + Math.sin(now * 0.41) * amp * 0.34,
        y: Math.cos(now * 0.19) * amp * 0.62 + Math.sin(now * 0.37) * amp * 0.2
      };
    }

    function drawFrame(ctx, layout = getSoloLayout(), board = null, now = performance.now()) {
      const frame = getFrameSprite(layout);
      const shake = frameShakeOffset(board, layout, now);
      ctx.save();
      ctx.translate(shake.x, shake.y);
      ctx.drawImage(frame.image, frame.x, frame.y);
      ctx.restore();
    }

    function landingProgress(landedAt, now = performance.now()) {
      if (!landedAt) return 0;
      const elapsed = now - landedAt;
      if (elapsed < 0 || elapsed > LANDING_BOUNCE_MS) return 0;
      return elapsed / LANDING_BOUNCE_MS;
    }

    function gravityRenderY(tile, targetY, now = performance.now()) {
      if (tile.fallFromY === undefined || !tile.fallStartedAt || !tile.fallDuration) return targetY;
      const elapsed = now - tile.fallStartedAt;
      const t = Math.min(1, Math.max(0, elapsed / tile.fallDuration));
      if (t >= 1) {
        delete tile.fallFromY;
        delete tile.fallStartedAt;
        delete tile.fallDuration;
        delete tile.fallMode;
        return targetY;
      }
      const eased = tile.fallMode === "clear"
        ? Math.pow(t, 1.55)
        : 1 - Math.pow(1 - t, 3);
      return tile.fallFromY + (targetY - tile.fallFromY) * eased;
    }

    function ellipsePath(ctx, cx, cy, rx, ry, rotation = 0) {
      ctx.beginPath();
      ctx.ellipse(cx, cy, rx, ry, rotation, 0, Math.PI * 2);
    }

    function fillEllipse(ctx, cx, cy, rx, ry, color, rotation = 0) {
      ellipsePath(ctx, cx, cy, rx, ry, rotation);
      ctx.fillStyle = color;
      ctx.fill();
    }

    function drawFallbackCharacter(ctx, info) {
      const body = ctx.createRadialGradient(-12, -14, 6, 0, 0, 35);
      body.addColorStop(0, info.light);
      body.addColorStop(0.45, info.mid);
      body.addColorStop(1, info.base);
      fillEllipse(ctx, 0, 0, 24, 23, body);
      fillEllipse(ctx, -8, -3, 3.2, 4.2, info.ink);
      fillEllipse(ctx, 8, -3, 3.2, 4.2, info.ink);
      fillEllipse(ctx, 0, 5, 4.2, 2.8, info.dark);
      ctx.strokeStyle = info.ink;
      ctx.lineWidth = 1.8;
      ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(-6, 10);
      ctx.quadraticCurveTo(0, 15, 6, 10);
      ctx.stroke();
    }

    function getLoadedCharacterImage(tileType) {
      const image = characterImages.get(tileType);
      return image && image.complete && image.naturalWidth > 0 ? image : null;
    }

    function drawCharacterAsset(ctx, image, info) {
      const maxW = TILE_SPRITE_SIZE * 0.62;
      const maxH = TILE_SPRITE_SIZE * 0.68;
      const ratio = image.naturalWidth / image.naturalHeight;
      let dw = maxW;
      let dh = dw / ratio;
      if (dh > maxH) {
        dh = maxH;
        dw = dh * ratio;
      }
      ctx.save();
      const halo = ctx.createRadialGradient(0, 5, 5, 0, 5, TILE_SPRITE_SIZE * 0.45);
      halo.addColorStop(0, "rgba(255, 255, 255, 0.62)");
      halo.addColorStop(0.42, `${info.light}55`);
      halo.addColorStop(1, "rgba(255, 255, 255, 0)");
      ctx.fillStyle = halo;
      fillEllipse(ctx, 0, 7, TILE_SPRITE_SIZE * 0.36, TILE_SPRITE_SIZE * 0.32, halo);
      ctx.shadowColor = "rgba(72, 42, 18, 0.32)";
      ctx.shadowBlur = 5;
      ctx.shadowOffsetY = 4;
      ctx.drawImage(image, -dw / 2, -dh / 2 + 1, dw, dh);
      ctx.shadowColor = "transparent";
      ctx.globalCompositeOperation = "screen";
