      fillEllipse(ctx, -TILE_SPRITE_SIZE * 0.14, -TILE_SPRITE_SIZE * 0.22, TILE_SPRITE_SIZE * 0.13, TILE_SPRITE_SIZE * 0.05, "rgba(255,255,255,0.28)", -0.2);
      ctx.restore();
    }

    function getTileSprite(tileType) {
      if (tileSpriteCache.has(tileType)) return tileSpriteCache.get(tileType);
      const sprite = document.createElement("canvas");
      sprite.width = TILE_SPRITE_SIZE;
      sprite.height = TILE_SPRITE_SIZE;
      const sctx = sprite.getContext("2d");
      sctx.translate(TILE_SPRITE_SIZE / 2, TILE_SPRITE_SIZE / 2);
      const image = getLoadedCharacterImage(tileType);
      if (image) {
        drawCharacterAsset(sctx, image, TILE_TYPES[tileType]);
      } else {
        drawFallbackCharacter(sctx, TILE_TYPES[tileType]);
      }
      tileSpriteCache.set(tileType, sprite);
      return sprite;
    }

    function drawTile(ctx, tileType, cx, cy, scale = 1, options = {}) {
      const alpha = options.alpha ?? 1;
      const glow = options.glow ?? 0;
      const floating = options.floating ?? false;
      const landing = options.landing ?? 0;
      const pop = options.pop ?? 0;
      const bounceWave = landing > 0 ? Math.sin(landing * Math.PI) : 0;
      const wobble = landing > 0 ? Math.sin(landing * Math.PI * 2.4) * (1 - landing) : 0;
      const squash = Math.max(0, bounceWave) * LANDING_SQUASH;
      const popWave = pop > 0 ? Math.sin(Math.PI * Math.min(1, pop)) : 0;
      const sx = scale * (1 + squash * 0.8 - wobble * 0.025 + popWave * 0.18);
      const sy = scale * (1 - squash + wobble * 0.02 + popWave * 0.12);
      const w = TILE_W;
      const h = TILE_H;
      const lift = floating ? TILE_FLOAT_LIFT_PX * scale : 0;
      const y = cy - lift + bounceWave * 2.4 * scale;
      ctx.save();
      ctx.translate(cx, y);
      ctx.scale(sx, sy);
      ctx.globalAlpha = alpha;
      ctx.shadowColor = `rgba(0, 0, 0, ${TILE_SHADOW_ALPHA * alpha})`;
      ctx.shadowBlur = floating ? 15 : 9;
      ctx.shadowOffsetY = floating ? 7 : 4;
      const sprite = getTileSprite(tileType);
      ctx.drawImage(sprite, -TILE_SPRITE_SIZE / 2, -TILE_SPRITE_SIZE / 2, TILE_SPRITE_SIZE, TILE_SPRITE_SIZE);
      ctx.shadowColor = "transparent";

      if (pop > 0.18) {
        ctx.globalCompositeOperation = "screen";
        ctx.strokeStyle = `rgba(255, 255, 255, ${0.44 * (1 - pop)})`;
        ctx.lineWidth = 2;
        ellipsePath(ctx, 0, 0, w * (0.45 + pop * 0.25), h * (0.42 + pop * 0.22));
        ctx.stroke();
      }

      if (glow > 0) {
        ctx.globalCompositeOperation = "screen";
        fillEllipse(ctx, 0, 0, w * 0.56, h * 0.52, `rgba(255, 250, 210, ${0.12 * glow})`);
      }
      ctx.restore();
    }

    function drawBoard() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const now = performance.now();
      if (game.state === "storyOpening"
        || game.state === "storyOpeningTransition"
        || game.state === "storyEnding"
        || game.state === "storyEndingTransition"
        || game.state === "storyStage") {
        drawOverlayText();
        return;
      }
      const shakeT = game.shakeTimer > 0 ? Math.min(1, game.shakeTimer / (SCREEN_SHAKE_MS + 80)) : 0;
      const shake = game.shakeTimer > 0 ? game.shakePower * shakeT * shakeT : 0;
      const shakeX = shake ? Math.sin(now * 0.075) * shake : 0;
      const shakeY = shake ? Math.cos(now * 0.092) * shake * 0.72 : 0;
      ctx.save();
      ctx.translate(shakeX, shakeY);
      if (game.isCpuBattleActive() || isCpuPlayMode(game.selectedPlayMode)) {
        drawBattleBoards(now);
      } else {
        drawSoloBoard(now);
      }
      drawOverlayText();
      ctx.restore();
    }

    function drawSoloBoard(now) {
      const layout = getSoloLayout();
      drawFrame(ctx, layout, game, now);
      drawBoardContents(game, layout, now);
      drawEffects(game.effects, game, layout);
    }

    function drawBattleBoards(now) {
      const layouts = getBattleLayouts();
      drawFrame(ctx, layouts.player, game, now);
      drawFrame(ctx, layouts.cpu, game.cpu, now);
      drawBattleHeader("PLAYER", layouts.player, game.pendingRise);
      drawBattleHeader("CPU", layouts.cpu, game.cpu?.pendingRise || 0);
      drawKnockoutBattleInfo(layouts);
      drawBoardContents(game, layouts.player, now);
      drawEffects(game.effects, game, layouts.player);
      if (game.cpu) {
        drawBoardContents(game.cpu, layouts.cpu, now);
        drawEffects(game.cpu.effects, game.cpu, layouts.cpu);
      }
      drawBattleAttackTransfers(layouts, now);
    }

    function drawBattleHeader(label, layout, pending) {
      const x = layout.x + COLS * layout.cell / 2;
      const y = layout.y - 54 * layout.scale;
      const w = COLS * layout.cell * 0.72;
      const h = 28 * layout.scale;
      ctx.save();
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.font = `900 ${18 * layout.scale}px ui-sans-serif, system-ui`;
      ctx.lineWidth = 4 * layout.scale;
      ctx.strokeStyle = "rgba(255,255,255,0.82)";
      ctx.fillStyle = "#7b4a22";
      ctx.strokeText(label, x, y - 18 * layout.scale);
      ctx.fillText(label, x, y - 18 * layout.scale);
      roundedRect(ctx, x - w / 2, y, w, h, h / 2);
      const grad = ctx.createLinearGradient(x - w / 2, y, x + w / 2, y);
      grad.addColorStop(0, "rgba(255, 149, 199, 0.78)");
      grad.addColorStop(0.5, "rgba(255, 227, 111, 0.78)");
      grad.addColorStop(1, "rgba(118, 224, 139, 0.78)");
      ctx.fillStyle = grad;
      ctx.fill();
      ctx.strokeStyle = "rgba(124, 78, 37, 0.55)";
      ctx.lineWidth = 1.4 * layout.scale;
      roundedRect(ctx, x - w / 2, y, w, h, h / 2);
      ctx.stroke();
      if (pending > 0) {
        ctx.fillStyle = "#ff5f76";
        ctx.shadowColor = "rgba(255,95,118,0.45)";
        ctx.shadowBlur = 8 * layout.scale;
        ctx.font = `900 ${16 * layout.scale}px ui-sans-serif, system-ui`;
        ctx.fillText(`NEXT +${pending}`, x, y + 42 * layout.scale);
      }
      ctx.restore();
    }

    function drawKnockoutBattleInfo(layouts) {
      if (game.selectedPlayMode !== "knockout") return;
      const round = game.currentKnockoutRound();
      const s = layouts.player.scale;
      const playerEdge = layouts.player.x + COLS * layouts.player.cell;
      const cpuEdge = layouts.cpu.x;
      const x = (playerEdge + cpuEdge) / 2;
      const y = layouts.player.y + 46 * s;
      const w = Math.min(198 * s, cpuEdge - playerEdge - 18 * s);
      const h = 100 * s;
      ctx.save();
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.shadowColor = "rgba(85, 40, 118, 0.2)";
      ctx.shadowBlur = 12 * s;
      roundedRect(ctx, x - w / 2, y - h / 2, w, h, 16 * s);
      const bg = ctx.createLinearGradient(x - w / 2, y - h / 2, x + w / 2, y + h / 2);
      bg.addColorStop(0, "rgba(255, 249, 218, 0.86)");
      bg.addColorStop(0.52, "rgba(255, 224, 238, 0.9)");
      bg.addColorStop(1, "rgba(220, 244, 255, 0.84)");
      ctx.fillStyle = bg;
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.strokeStyle = "rgba(123, 74, 34, 0.32)";
      ctx.lineWidth = 2 * s;
      roundedRect(ctx, x - w / 2, y - h / 2, w, h, 16 * s);
      ctx.stroke();

      ctx.fillStyle = "rgba(176, 72, 88, 0.9)";
      ctx.font = `900 ${13 * s}px ui-sans-serif, system-ui`;
      ctx.fillText("ストーリーモード", x, y - 32 * s);
      ctx.fillStyle = "#7b4a22";
      ctx.font = `900 ${24 * s}px ui-sans-serif, system-ui`;
      ctx.fillText(`${round.round}/${KNOCKOUT_ROUNDS.length} 回戦`, x, y - 10 * s);
      ctx.fillStyle = "rgba(99, 54, 28, 0.88)";
      ctx.font = `900 ${13 * s}px ui-sans-serif, system-ui`;
      ctx.fillText(`盤面 ${difficultyLabelJa(round.difficulty)} / 強さ ${difficultyLabelJa(game.storyDifficulty)}`, x, y + 13 * s);

      const dotsY = y + 36 * s;
      drawKnockoutWinDots(x - 36 * s, dotsY, game.knockoutPlayerWins, "#ff6f8f", s);
      drawKnockoutWinDots(x + 36 * s, dotsY, game.knockoutCpuWins, "#79a9ff", s);
      ctx.fillStyle = "rgba(123, 74, 34, 0.84)";
      ctx.font = `900 ${13 * s}px ui-sans-serif, system-ui`;
      ctx.fillText(`${game.knockoutPlayerWins}-${game.knockoutCpuWins}`, x, dotsY);
      ctx.restore();
    }

    function drawKnockoutWinDots(x, y, wins, color, scale = 1) {
      const gap = 13 * scale;
      for (let i = 0; i < KNOCKOUT_MATCH_WINS; i++) {
        ctx.beginPath();
        ctx.arc(x + (i - 0.5) * gap, y, 4.4 * scale, 0, Math.PI * 2);
        ctx.fillStyle = i < wins ? color : "rgba(255, 255, 255, 0.62)";
        ctx.fill();
        ctx.strokeStyle = "rgba(123, 74, 34, 0.28)";
        ctx.lineWidth = 1.2 * scale;
        ctx.stroke();
      }
    }

    function attackCurvePoint(start, control, end, t) {
      const a = (1 - t) * (1 - t);
      const b = 2 * (1 - t) * t;
      const c = t * t;
      return {
        x: start.x * a + control.x * b + end.x * c,
        y: start.y * a + control.y * b + end.y * c
      };
    }

    function drawAttackCurveSegment(ctx, start, control, end, fromT, toT) {
      const steps = 18;
      ctx.beginPath();
      for (let i = 0; i <= steps; i++) {
        const t = fromT + (toT - fromT) * (i / steps);
        const p = attackCurvePoint(start, control, end, t);
        if (i === 0) ctx.moveTo(p.x, p.y);
        else ctx.lineTo(p.x, p.y);
      }
    }

    function drawBattleAttackTransfers(layouts, now) {
      const transfers = game.battleAttackTransfers || [];
      if (!transfers.length || !layouts.cpu) return;
      for (const transfer of transfers) {
        const fromLayout = transfer.source === "player" ? layouts.player : layouts.cpu;
        const toLayout = transfer.source === "player" ? layouts.cpu : layouts.player;
        const dir = transfer.source === "player" ? 1 : -1;
        const s = fromLayout.scale;
        const hasPayload = (transfer.payloadRows || 0) > 0;
        if (!hasPayload && transfer.age >= transfer.sendDuration + transfer.impactDuration) continue;
        const visualChain = Math.max(1, Math.min(ATTACK_ENERGY_MAX_BEAMS, transfer.beamLevel || transfer.visualRows || attackEnergyLevelForChain(transfer.chain || 1) || 1));
        const rows = Math.max(1, transfer.payloadRows || transfer.visualRows || transfer.rows || visualChain);
        const sendT = Math.max(0, Math.min(1, transfer.age / transfer.sendDuration));
        const hasOrigin = Number.isFinite(transfer.originX) && Number.isFinite(transfer.originY);
        const origin = hasOrigin
          ? cellToPixelInLayout(fromLayout, transfer.originX, transfer.originY)
          : null;
        const start = origin || {
          x: fromLayout.x + (dir > 0 ? COLS * fromLayout.cell - 18 * s : 18 * s),
          y: fromLayout.y + ROWS * fromLayout.cell - (82 + visualChain * 3) * s
        };
        const end = {
          x: toLayout.x + (dir > 0 ? 0.7 * toLayout.cell : (COLS - 0.7) * toLayout.cell),
          y: toLayout.y + ROWS * toLayout.cell - (34 + visualChain * 2) * s
        };
        const distance = Math.hypot(end.x - start.x, end.y - start.y);
        const control = {
          x: (start.x + end.x) / 2,
          y: Math.min(start.y, end.y) - (48 + visualChain * 8 + Math.min(70, distance * 0.08)) * s
        };
        const warm = transfer.source === "player";
        const mainColor = warm ? "255, 224, 96" : "158, 218, 255";
        const accentColor = warm ? "255, 100, 160" : "186, 134, 255";
        const warningColor = warm ? "255, 95, 130" : "176, 126, 255";

        ctx.save();
        ctx.globalCompositeOperation = "screen";
        ctx.lineCap = "round";
        ctx.lineJoin = "round";

        const targetCharge = Math.min(1, sendT * 1.25);
        const chargePulse = 0.72 + Math.sin(now * 0.012 + visualChain) * 0.28;
        ctx.globalAlpha = targetCharge * chargePulse * (0.16 + visualChain * 0.035);
        ctx.shadowColor = `rgba(${warningColor}, 0.75)`;
        ctx.shadowBlur = (14 + visualChain * 2.6) * s;
        fillEllipse(ctx, end.x, end.y, (32 + visualChain * 7 + rows * 2) * s, (13 + visualChain * 2.2) * s, `rgba(${warningColor}, 0.65)`, -0.06 * dir);
        if (visualChain >= 3 && sendT > 0.34 && transfer.age < transfer.sendDuration) {
          ctx.globalAlpha = targetCharge * (0.34 + chargePulse * 0.18);
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.font = `900 ${(17 + visualChain * 1.4) * s}px ui-sans-serif, system-ui`;
          ctx.lineWidth = 4 * s;
          ctx.strokeStyle = `rgba(80, 20, 40, ${0.44 * targetCharge})`;
          ctx.strokeText("!!", end.x, end.y - (34 + visualChain * 2) * s);
          ctx.fillStyle = `rgba(255, 246, 172, ${0.9 * targetCharge})`;
          ctx.fillText("!!", end.x, end.y - (34 + visualChain * 2) * s);
        }

        const headT = 1 - Math.pow(1 - sendT, 2.45);
        const trail = Math.min(0.98, 0.74 + visualChain * 0.046 + Math.min(4, rows) * 0.018);
        const tailT = Math.max(0, headT - trail * (0.98 + sendT * 0.12));
        const width = (4.8 + visualChain * 2.25 + Math.min(5, rows) * 0.58) * s;
        const baseAlpha = (0.44 + visualChain * 0.095) * Math.min(1, sendT * 2.1);
        const head = attackCurvePoint(start, control, end, headT);

        if (headT > 0.02 && tailT < headT) {
          if (headT > 0.12) {
            ctx.globalAlpha = baseAlpha * (0.18 + visualChain * 0.018);
            ctx.shadowColor = `rgba(${mainColor}, 0.56)`;
            ctx.shadowBlur = (10 + visualChain * 2.4) * s;
            ctx.strokeStyle = `rgba(${mainColor}, ${0.28 + visualChain * 0.035})`;
            ctx.lineWidth = width * 0.58;
            drawAttackCurveSegment(ctx, start, control, end, 0, headT);
            ctx.stroke();
          }

          ctx.globalAlpha = baseAlpha * 0.72;
          ctx.shadowColor = `rgba(${accentColor}, 0.82)`;
          ctx.shadowBlur = (14 + visualChain * 3.6) * s;
          ctx.strokeStyle = `rgba(${accentColor}, ${0.42 + visualChain * 0.055})`;
          ctx.lineWidth = width * (2.05 + visualChain * 0.09);
          drawAttackCurveSegment(ctx, start, control, end, tailT, headT);
          ctx.stroke();

          ctx.globalAlpha = Math.min(1, baseAlpha + 0.18);
          ctx.shadowColor = `rgba(${mainColor}, 0.9)`;
          ctx.shadowBlur = (18 + visualChain * 4.2) * s;
          ctx.strokeStyle = `rgba(${mainColor}, ${0.72 + visualChain * 0.04})`;
          ctx.lineWidth = width;
          drawAttackCurveSegment(ctx, start, control, end, tailT, headT);
          ctx.stroke();

          ctx.globalAlpha = Math.min(0.96, 0.62 + visualChain * 0.075);
          ctx.shadowBlur = 12 * s;
          ctx.strokeStyle = "rgba(255, 255, 255, 0.9)";
          ctx.lineWidth = Math.max(1.8 * s, width * 0.26);
          drawAttackCurveSegment(ctx, start, control, end, Math.max(tailT, headT - trail * 0.36), headT);
          ctx.stroke();
        }

        const particleCount = Math.min(20, 6 + visualChain * 3 + Math.min(4, rows));
        for (let i = 0; i < particleCount; i++) {
          const drift = (now * 0.0004 + i * 0.151 + visualChain * 0.043) % 1;
          const particleTrail = (i / particleCount) * trail * (0.72 + Math.sin(i + visualChain) * 0.12);
          const pt = Math.max(0, Math.min(1, headT - particleTrail + Math.sin(drift * Math.PI * 2) * 0.02));
          if (pt > headT + 0.03 || pt < tailT - 0.08) continue;
          const p = attackCurvePoint(start, control, end, pt);
          const twinkle = 0.55 + Math.sin(now * 0.014 + i * 1.9 + visualChain) * 0.45;
          const side = Math.sin(now * 0.006 + i * 2.4 + visualChain * 0.7) * (8 + visualChain * 2.2) * s;
          const size = (2.1 + (i % 3) * 0.82 + visualChain * 0.34) * s;
          ctx.globalAlpha = Math.max(0, (0.2 + twinkle * 0.5 + visualChain * 0.055) * (1 - Math.max(0, headT - pt) / Math.max(0.16, trail)));
          fillEllipse(
            ctx,
            p.x + Math.sin(pt * Math.PI * 3 + i + visualChain) * side,
            p.y + Math.cos(pt * Math.PI * 2 + i * 1.3) * side * 0.36,
            size * (1.2 + twinkle * 0.4),
            size * 0.68,
            (i + visualChain) % 2 ? `rgba(${accentColor}, 0.95)` : `rgba(${mainColor}, 0.96)`,
            dir * 0.18
          );
        }

        if (sendT < 0.24) {
          const sourcePulse = Math.sin((sendT / 0.24) * Math.PI);
          ctx.globalAlpha = sourcePulse * (0.24 + visualChain * 0.075);
          const burst = (22 + visualChain * 7 + sourcePulse * 18) * s;
          const grad = ctx.createRadialGradient(start.x, start.y, 4 * s, start.x, start.y, burst);
          grad.addColorStop(0, `rgba(255,255,255,${0.72 * sourcePulse})`);
          grad.addColorStop(0.42, `rgba(${mainColor},${0.38 * sourcePulse})`);
          grad.addColorStop(1, "rgba(255,255,255,0)");
          ctx.fillStyle = grad;
          ctx.beginPath();
          ctx.arc(start.x, start.y, burst, 0, Math.PI * 2);
          ctx.fill();
        }

        if (transfer.age < transfer.sendDuration) {
          ctx.globalAlpha = Math.min(1, 0.66 + visualChain * 0.06);
          ctx.shadowColor = `rgba(${mainColor}, 0.96)`;
          ctx.shadowBlur = (16 + visualChain * 3) * s;
          fillEllipse(ctx, head.x, head.y, width * 1.4, width * 0.9, `rgba(${mainColor}, 0.94)`, dir * 0.16);
          ctx.globalAlpha = 0.62 + visualChain * 0.045;
          fillEllipse(ctx, head.x - dir * width * 0.18, head.y, width * 0.52, width * 0.34, "rgba(255,255,255,0.96)", dir * 0.16);
        }

        if (transfer.age >= transfer.sendDuration) {
          const impactT = Math.min(1, (transfer.age - transfer.sendDuration) / transfer.impactDuration);
          const alpha = Math.max(0, 1 - impactT);
          const ring = (20 + impactT * (62 + visualChain * 9 + rows * 2)) * s;
          ctx.globalAlpha = alpha;
          ctx.shadowColor = `rgba(${mainColor}, 0.85)`;
          ctx.shadowBlur = (16 + visualChain * 3) * s;
          ctx.strokeStyle = `rgba(${mainColor}, ${0.8 * alpha})`;
          ctx.lineWidth = (3 + visualChain * 0.55) * s;
          ctx.beginPath();
          ctx.arc(end.x, end.y, ring, 0, Math.PI * 2);
          ctx.stroke();
          ctx.fillStyle = `rgba(${accentColor}, ${0.24 * alpha})`;
          fillEllipse(ctx, end.x, end.y, ring * 0.96, ring * 0.44, ctx.fillStyle, -0.08 * dir);
        }
        ctx.restore();
      }
    }

    function getLandingGuidePiece(board) {
      if (!board?.currentPiece) return null;
      const piece = board.currentPiece;
      const cacheKey = `${piece.id}:${piece.x}:${piece.y}:${piece.rotation}`;
      if (board.landingGuideCache?.key === cacheKey) return board.landingGuideCache.piece;
      let guide = { ...board.currentPiece };
      while (board.isValidPiece({ ...guide, y: guide.y + 1 })) {
        guide = { ...guide, y: guide.y + 1 };
      }
      board.landingGuideCache = { key: cacheKey, piece: guide };
      return guide;
    }

    function drawLandingGuide(board, layout, now) {
      if (board !== game || game.demoActive || board.state !== "playing" || !board.currentPiece) return;
      const guide = getLandingGuidePiece(board);
      if (!guide) return;
      const cells = board.getCells(guide).filter(cell => cell.y >= 0);
      if (!cells.length) return;
      const contact = board.hasGroundContact();
      const pulse = 0.72 + Math.sin(now * 0.008) * 0.14;
      const s = layout.scale;
      ctx.save();
      ctx.globalCompositeOperation = "source-over";
      for (const cell of cells) {
        const pos = cellToPixelInLayout(layout, cell.x, cell.y);
        ctx.globalAlpha = (contact ? 0.18 : 0.28) * pulse;
        ctx.fillStyle = "rgba(58, 42, 67, 0.72)";
        fillEllipse(ctx, pos.x, pos.y + 11 * s, 16 * s, 7 * s, ctx.fillStyle);
        ctx.globalAlpha = contact ? 0.22 : 0.34;
        ctx.strokeStyle = "rgba(255, 246, 184, 0.9)";
        ctx.lineWidth = 2.4 * s;
        ctx.setLineDash([5 * s, 5 * s]);
        roundedRect(ctx, pos.x - 16 * s, pos.y - 16 * s, 32 * s, 32 * s, 10 * s);
        ctx.stroke();
        ctx.setLineDash([]);
        drawTile(ctx, cell.tileType, pos.x, pos.y, layout.scale, {
          alpha: contact ? 0.18 : 0.24,
          glow: 0.22
        });
      }
      ctx.restore();
    }

    function riseBounceOffset(board, layout) {
      if (!board.riseBounceTimer || board.riseBounceTimer <= 0) return 0;
      const progress = 1 - Math.min(1, board.riseBounceTimer / RISE_BOUNCE_MS);
      const amp = RISE_BOUNCE_PX * layout.scale * (1 + Math.min(10, board.riseBounceRows || 1) * 0.055) * (1 - progress);
      const recoil = Math.sin(progress * Math.PI) * 4.6 * layout.scale;
      return -Math.cos(progress * Math.PI * 2.8) * amp - recoil;
    }

    function drawBoardContents(board, layout, now) {
      ctx.save();
      const snap = board.snapTimer > 0 ? Math.sin(board.snapTimer / 120 * Math.PI * 5) * 1.5 * layout.scale : 0;
      const riseOffset = riseBounceOffset(board, layout);
      const riseBounceT = board.riseBounceTimer > 0 ? 1 - Math.min(1, board.riseBounceTimer / RISE_BOUNCE_MS) : 0;
      const risePop = riseBounceT > 0
        ? Math.max(0, Math.sin(riseBounceT * Math.PI * 1.18)) * Math.pow(1 - riseBounceT, 0.7)
        : 0;
      ctx.translate(0, snap + riseOffset);
      let clearEffects = null;
      for (const effect of board.effects) {
        if (effect.type !== "clear") continue;
        if (!clearEffects) clearEffects = new Map();
        clearEffects.set(`${effect.x},${effect.y}`, effect);
      }
      for (let y = 0; y < ROWS; y++) {
        for (let x = 0; x < COLS; x++) {
          const tile = board.grid[y][x];
          if (!tile) continue;
          const pos = cellToPixelInLayout(layout, x, y);
          const clearEffect = clearEffects?.get(`${x},${y}`);
          let glow = 0;
          let alpha = 1;
          let pop = 0;
          let jitterX = 0;
          let jitterY = 0;
          if (clearEffect) {
            const t = clearEffect.age / clearEffect.duration;
            pop = t;
            glow = Math.sin(Math.PI * Math.min(1, t)) * (1.35 + board.chain * 0.2);
            alpha = t > CLEAR_FADE_START ? 1 - (t - CLEAR_FADE_START) / (1 - CLEAR_FADE_START) : 1;
            if (t > 0.16 && t < 0.72) {
              const amp = (1 - t) * (1.15 + board.chain * 0.12) * layout.scale;
              jitterX = Math.sin(now * 0.085 + x * 2.7 + y) * amp;
              jitterY = Math.cos(now * 0.095 + y * 2.3 + x) * amp;
            }
          }
          if (risePop > 0) {
            const rowWeight = 0.48 + (y / Math.max(1, ROWS - 1)) * 0.52;
            const wobble = risePop * rowWeight * layout.scale;
            glow += risePop * (0.16 + rowWeight * 0.34);
            pop = Math.max(pop, risePop * rowWeight * 0.72);
            jitterX += Math.sin(now * 0.105 + x * 1.9 + y * 0.7) * wobble * 1.8;
            jitterY += Math.cos(now * 0.115 + y * 1.6 + x) * wobble * 1.1;
          }
          const renderY = gravityRenderY(tile, y, now);
          const renderPos = renderY === y ? pos : cellToPixelInLayout(layout, x, renderY);
          const isFalling = renderY !== y;
          drawTile(ctx, tile.tileType, renderPos.x + jitterX, renderPos.y + jitterY, layout.scale, {
            glow,
            alpha,
            pop,
            floating: isFalling,
            landing: isFalling ? 0 : landingProgress(tile.landedAt, now)
          });
        }
      }
      ctx.restore();

      if (board.currentPiece) {
        if (board.state === "gameover") return;
        drawLandingGuide(board, layout, now);
        const contact = board.hasGroundContact();
        const pulse = (contact ? 0.16 + 0.16 * Math.sin(now / 55) : 0) + TILE_ACTIVE_GLOW;
        for (const cell of board.getCells()) {
          if (cell.y < 0) continue;
          const pos = cellToPixelInLayout(layout, cell.x, cell.y);
          drawTile(ctx, cell.tileType, pos.x, pos.y, layout.scale, { glow: pulse, floating: true });
        }
      }
    }

    function drawRiseSmokePuffs(ctx, layout, t, rows, options = {}) {
      const s = layout.scale;
      const bottom = layout.y + ROWS * layout.cell;
      const count = Math.min(14, 6 + Math.min(8, rows));
      const lift = options.lift ?? 1;
      const alphaBoost = options.alpha ?? 1;
      const spread = options.spread ?? 1;
      ctx.save();
      ctx.globalCompositeOperation = "source-over";
      for (let i = 0; i < count; i++) {
        const seed = (i * 37) % 101;
        const phase = (t * (0.82 + (i % 3) * 0.08) + i / count * 0.74) % 1;
        const rise = (16 + phase * (66 + rows * 2.1)) * lift * s;
        const xBase = layout.x + ((seed + Math.sin(i * 1.7) * 9) / 100) * COLS * layout.cell;
        const x = xBase + Math.sin(t * Math.PI * 2.2 + i * 1.3) * 11 * spread * s;
        const y = bottom - rise + Math.cos(i * 1.9) * 4 * s;
        const puffAlpha = Math.max(0, Math.sin(phase * Math.PI) * (1 - phase * 0.28)) * alphaBoost;
        const rx = (12 + (i % 4) * 3.4 + rows * 0.34) * (0.65 + phase * 1.18) * s;
        const ry = (5.5 + (i % 3) * 2.1) * (0.7 + phase * 0.98) * s;
        fillEllipse(ctx, x, y, rx, ry, `rgba(65, 49, 45, ${0.085 * puffAlpha})`, Math.sin(i) * 0.24);
        fillEllipse(ctx, x - 4 * s, y - 2 * s, rx * 0.72, ry * 0.72, `rgba(255, 224, 190, ${0.085 * puffAlpha})`, -0.16);
      }
      ctx.restore();
    }

    function drawRiseRumbleMarks(ctx, layout, t, rows) {
      const s = layout.scale;
      const centerX = layout.x + COLS * layout.cell / 2;
      const bottom = layout.y + ROWS * layout.cell;
      const build = Math.min(1, t / 0.34);
      const nearImpact = Math.max(0, (t - 0.62) / 0.38);
      ctx.save();
      ctx.globalCompositeOperation = "screen";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.font = `900 ${Math.min(29, 20 + rows * 1.05) * s}px ui-sans-serif, system-ui`;
      for (let i = 0; i < 3; i++) {
        const phase = (t * 1.24 + i * 0.17) % 1;
        const wobble = Math.sin(t * Math.PI * 11 + i * 2.1);
        const x = centerX + (i - 1) * 50 * s + wobble * 4 * s;
        const y = bottom - (88 + i * 22 + Math.sin(t * Math.PI * 7 + i) * 4) * s;
        const alpha = (0.16 + build * 0.28 + nearImpact * 0.22) * (0.68 + Math.sin(phase * Math.PI) * 0.32);
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate((-0.15 + i * 0.14) + wobble * 0.035);
        ctx.lineWidth = 4.4 * s;
        ctx.strokeStyle = `rgba(72, 19, 38, ${0.58 * alpha})`;
        ctx.strokeText("ゴ", 0, 0);
        ctx.fillStyle = `rgba(255, 238, 160, ${alpha})`;
        ctx.shadowColor = `rgba(255, 63, 102, ${0.72 * alpha})`;
        ctx.shadowBlur = 13 * s;
        ctx.fillText("ゴ", 0, 0);
        ctx.restore();
      }
      for (let i = 0; i < 3; i++) {
        const y = bottom - (34 + i * 18 + Math.sin(t * Math.PI * 7 + i) * 3) * s;
        const x = layout.x + 16 * s + i * 24 * s;
        ctx.globalAlpha = (0.16 + nearImpact * 0.2) * build;
        ctx.fillStyle = "rgba(255, 116, 86, 0.6)";
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(-0.18);
        roundedRect(ctx, 0, 0, COLS * layout.cell - (32 + i * 16) * s, 5 * s, 3 * s);
        ctx.fill();
        ctx.restore();
      }
      ctx.restore();
    }

    function drawRiseImpactBlast(ctx, layout, t, rows) {
      const s = layout.scale;
      const bottom = layout.y + ROWS * layout.cell;
      const alpha = Math.max(0, 1 - t);
      ctx.save();
      ctx.globalCompositeOperation = "screen";
      const flash = ctx.createLinearGradient(layout.x, bottom - 112 * s, layout.x, bottom + 24 * s);
      flash.addColorStop(0, "rgba(255, 76, 106, 0)");
      flash.addColorStop(0.62, `rgba(255, 83, 112, ${0.22 * alpha})`);
      flash.addColorStop(1, `rgba(255, 236, 150, ${0.38 * alpha})`);
      ctx.fillStyle = flash;
      ctx.fillRect(layout.x - 4 * s, bottom - 116 * s, COLS * layout.cell + 8 * s, 140 * s);
      for (let i = 0; i < 3; i++) {
        const bandT = Math.min(1, t * 1.4 + i * 0.12);
        const y = bottom - (16 + i * 14 + bandT * 46) * s;
        ctx.globalAlpha = alpha * (0.18 - i * 0.038);
        fillEllipse(ctx, layout.x + COLS * layout.cell / 2, y, (COLS * layout.cell * (0.44 + bandT * 0.22)), (9 + i * 2.6) * s, "rgba(255, 232, 172, 1)");
      }
      ctx.restore();
      drawRiseSmokePuffs(ctx, layout, Math.min(1, t * 0.88), rows, { alpha: 1.08 * alpha, lift: 1.16, spread: 1.08 });
    }

    function drawEffects(effects = game.effects, board = game, layout = getSoloLayout()) {
      const s = layout.scale;
      for (const effect of effects) {
        const t = effect.age / effect.duration;
        const pos = cellToPixelInLayout(layout, effect.x, effect.y);
        if (effect.type === "clearFlash") {
          ctx.save();
          ctx.globalCompositeOperation = "screen";
          ctx.globalAlpha = Math.max(0, 0.24 * (1 - t));
          const grad = ctx.createRadialGradient(pos.x, pos.y, 10 * s, pos.x, pos.y, (190 + effect.chain * 18) * s);
          grad.addColorStop(0, "rgba(255, 248, 190, 0.8)");
          grad.addColorStop(0.5, "rgba(255, 180, 105, 0.22)");
          grad.addColorStop(1, "rgba(255, 255, 255, 0)");
          ctx.fillStyle = grad;
          ctx.fillRect(layout.x - 16 * s, layout.y - 16 * s, COLS * layout.cell + 32 * s, ROWS * layout.cell + 32 * s);
          ctx.restore();
          continue;
        }
        if (effect.type === "clearShock") {
          ctx.save();
          ctx.globalCompositeOperation = "screen";
          const alpha = Math.max(0, 1 - t);
          const radius = (effect.radius + 112 * t) * s;
          const grad = ctx.createRadialGradient(pos.x, pos.y, radius * 0.08, pos.x, pos.y, radius);
          grad.addColorStop(0, `rgba(255, 255, 255, ${0.28 * alpha})`);
          grad.addColorStop(0.36, `rgba(255, 219, 96, ${0.2 * alpha})`);
          grad.addColorStop(1, "rgba(255, 255, 255, 0)");
          ctx.fillStyle = grad;
          ctx.beginPath();
          ctx.arc(pos.x, pos.y, radius, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = `rgba(255, 255, 255, ${0.58 * alpha})`;
          ctx.lineWidth = (2.2 + effect.chain * 0.25) * s;
          ctx.beginPath();
          ctx.arc(pos.x, pos.y, radius * 0.62, 0, Math.PI * 2);
          ctx.stroke();
          ctx.restore();
          continue;
        }
        if (effect.type === "clearPulse") {
          ctx.save();
          ctx.globalCompositeOperation = "screen";
          const alpha = Math.max(0, 1 - t);
          const scale = 0.55 + t * 0.82;
          ctx.fillStyle = `hsla(${effect.hue}, 100%, 74%, ${0.26 * alpha})`;
          fillEllipse(ctx, pos.x, pos.y, TILE_W * scale * s, TILE_H * scale * s, ctx.fillStyle);
          ctx.strokeStyle = `rgba(255, 255, 255, ${0.5 * alpha})`;
          ctx.lineWidth = 1.6 * s;
          ellipsePath(ctx, pos.x, pos.y, TILE_W * scale * 0.74 * s, TILE_H * scale * 0.74 * s);
          ctx.stroke();
          ctx.restore();
          continue;
        }
        if (effect.type === "spark") {
          ctx.save();
          ctx.globalAlpha = 1 - t;
          ctx.strokeStyle = "#f6d77b";
          ctx.lineWidth = 2 * s;
          ctx.beginPath();
          ctx.arc(pos.x, pos.y, (22 + 8 * t) * s, 0, Math.PI * 2);
          ctx.stroke();
          ctx.restore();
          continue;
        }
        if (effect.type === "clearRing") {
          ctx.save();
          ctx.globalCompositeOperation = "screen";
          const alpha = Math.max(0, 1 - t);
          ctx.globalAlpha = alpha;
          ctx.strokeStyle = `rgba(255, 235, 135, ${0.8 * alpha})`;
          ctx.lineWidth = (3.2 + effect.chain * 0.35) * s;
          ctx.beginPath();
          ctx.arc(pos.x, pos.y, (effect.radius + 76 * t) * s, 0, Math.PI * 2);
          ctx.stroke();
          ctx.strokeStyle = `rgba(255, 255, 255, ${0.42 * alpha})`;
          ctx.lineWidth = 1.4 * s;
          ctx.beginPath();
          ctx.arc(pos.x, pos.y, (effect.radius * 0.62 + 42 * t) * s, 0, Math.PI * 2);
          ctx.stroke();
          ctx.restore();
          continue;
        }
        if (effect.type === "chainText") {
          ctx.save();
          const rise = 32 * t * s;
          const scale = 0.72 + Math.sin(Math.min(1, t) * Math.PI) * 0.42;
          ctx.globalAlpha = Math.max(0, 1 - Math.max(0, t - 0.68) / 0.32);
          ctx.translate(pos.x, pos.y - rise);
          ctx.scale(scale, scale);
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.font = `900 ${34 * s}px ui-sans-serif, system-ui`;
          ctx.lineWidth = 7 * s;
          ctx.strokeStyle = "rgba(16, 22, 32, 0.72)";
          ctx.strokeText(`${effect.chain} CHAIN!`, 0, 0);
          ctx.fillStyle = "#ffe36f";
          ctx.shadowColor = "rgba(255, 218, 91, 0.75)";
          ctx.shadowBlur = 16;
          ctx.fillText(`${effect.chain} CHAIN!`, 0, 0);
          ctx.restore();
          continue;
        }
        if (effect.type === "popBubble" || effect.type === "popStar" || effect.type === "popDot" || effect.type === "popHeart" || effect.type === "popFood") {
          ctx.save();
          ctx.globalAlpha = Math.max(0, 1 - t);
          const sx = pos.x + effect.vx * t * s;
          const sy = pos.y + effect.vy * t * s + 20 * t * t * s;
          if (effect.type === "popBubble") {
            ctx.strokeStyle = `hsla(${effect.hue}, 100%, 78%, 0.85)`;
            ctx.fillStyle = "rgba(255, 255, 255, 0.2)";
            ctx.lineWidth = 1.4 * s;
            ctx.beginPath();
            ctx.arc(sx, sy, effect.size * (0.8 + t) * s, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
          } else if (effect.type === "popDot") {
            ctx.fillStyle = `hsla(${effect.hue}, 100%, 66%, 0.92)`;
            ctx.beginPath();
            ctx.arc(sx, sy, effect.size * (1 - t * 0.35) * s, 0, Math.PI * 2);
            ctx.fill();
          } else if (effect.type === "popHeart") {
            drawTinyHeart(ctx, sx, sy, effect.size * 2.1 * (1 - t * 0.2) * s, `hsla(${effect.hue + 318}, 95%, 70%, 0.94)`, 1, effect.spin * t);
          } else if (effect.type === "popFood") {
            drawFieldFoodMark(ctx, effect.food || "leaf", sx, sy, effect.size * 2.9 * s, `hsla(${effect.hue}, 92%, 58%, 0.9)`, 1, effect.spin * t);
          } else {
            ctx.fillStyle = `hsla(${effect.hue}, 100%, 68%, 0.92)`;
            ctx.beginPath();
            for (let i = 0; i < 8; i++) {
              const r = (i % 2 === 0 ? effect.size * 1.25 : effect.size * 0.45) * s;
              const a = -Math.PI / 2 + (Math.PI * 2 * i) / 8;
              const px = sx + Math.cos(a) * r;
              const py = sy + Math.sin(a) * r;
              if (i === 0) ctx.moveTo(px, py);
              else ctx.lineTo(px, py);
            }
            ctx.closePath();
            ctx.fill();
          }
          ctx.restore();
          continue;
        }
        if (effect.type === "riseImpact") {
          drawRiseImpactBlast(ctx, layout, t, effect.rows || 1);
          continue;
        }
        if (effect.type === "riseCharge") {
          ctx.save();
          const build = Math.min(1, t / 0.34);
          const nearImpact = Math.max(0, (t - 0.66) / 0.34);
          const pulse = 0.58 + Math.sin(t * Math.PI * 12) * 0.32;
          ctx.globalCompositeOperation = "screen";
          ctx.globalAlpha = (0.34 + pulse * 0.24 + nearImpact * 0.2) * (0.72 + build * 0.28);
          const baseY = layout.y + ROWS * layout.cell - (40 + Math.min(10, effect.rows) * 4) * s;
          const bottom = layout.y + ROWS * layout.cell;
          const grad = ctx.createLinearGradient(layout.x, baseY - 56 * s, layout.x, bottom + 24 * s);
          grad.addColorStop(0, "rgba(255, 90, 120, 0)");
          grad.addColorStop(0.48, "rgba(255, 75, 112, 0.34)");
          grad.addColorStop(0.78, "rgba(255, 126, 90, 0.48)");
          grad.addColorStop(1, "rgba(255, 224, 124, 0.62)");
          ctx.fillStyle = grad;
          roundedRect(ctx, layout.x + 4 * s, baseY - 26 * s, COLS * layout.cell - 8 * s, 78 * s, 20 * s);
          ctx.fill();
          for (let i = 0; i < 3; i++) {
            const bandY = bottom - (20 + i * 22 + nearImpact * 20) * s;
            ctx.globalAlpha = (0.12 + nearImpact * 0.12) * (1 - i * 0.16);
            ctx.fillStyle = i === 0 ? "rgba(255, 241, 165, 0.85)" : "rgba(255, 82, 116, 0.62)";
            roundedRect(ctx, layout.x + (14 + i * 10) * s, bandY, COLS * layout.cell - (28 + i * 20) * s, (8 - i) * s, 5 * s);
            ctx.fill();
          }
          ctx.restore();
          drawRiseSmokePuffs(ctx, layout, t, effect.rows || 1, { alpha: 0.82 + nearImpact * 0.34, lift: 0.9 + nearImpact * 0.26, spread: 1 });
          drawRiseRumbleMarks(ctx, layout, t, effect.rows || 1);
          ctx.save();
          ctx.globalAlpha = 0.9;
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillStyle = "#fff2a6";
          ctx.shadowColor = "rgba(255, 83, 112, 0.75)";
          ctx.shadowBlur = 12 * s;
          ctx.font = `900 ${15 * s}px ui-sans-serif, system-ui`;
          ctx.fillText(`${effect.rows} ROW COMING!`, layout.x + COLS * layout.cell / 2, baseY + 14 * s);
          ctx.restore();
          continue;
        }
        if (effect.type === "riseWarning" || effect.type === "attackNotice") {
          ctx.save();
          const alpha = Math.max(0, 1 - t);
          ctx.globalAlpha = alpha;
          ctx.globalCompositeOperation = "screen";
          const y = effect.type === "riseWarning"
            ? layout.y + ROWS * layout.cell - (18 + effect.rows * 5) * s
            : layout.y + 45 * s;
          ctx.fillStyle = effect.type === "riseWarning" ? "rgba(255, 97, 112, 0.22)" : "rgba(255, 232, 120, 0.32)";
          roundedRect(ctx, layout.x + 6 * s, y, COLS * layout.cell - 12 * s, 22 * s, 11 * s);
          ctx.fill();
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillStyle = "#fff2a6";
          ctx.shadowColor = "rgba(255, 116, 132, 0.65)";
          ctx.shadowBlur = 10 * s;
          ctx.font = `900 ${15 * s}px ui-sans-serif, system-ui`;
          ctx.fillText(effect.type === "riseWarning" ? `${effect.rows} ROW UP!` : `${effect.rows} ROW ATTACK!`, layout.x + COLS * layout.cell / 2, y + 11 * s);
          ctx.restore();
          continue;
        }
      }
    }

    function drawLevelUpBanner(text) {
      const x = BOARD_X + COLS * CELL / 2;
      const y = BOARD_Y - 26;
      const progress = 1 - Math.min(1, game.messageTimer / LEVEL_UP_BANNER_MS);
      const fade = game.messageTimer < 160 ? game.messageTimer / 160 : 1;
      const lift = Math.sin(progress * Math.PI) * -4;
      ctx.save();
      ctx.globalAlpha = Math.max(0, fade);
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.shadowColor = "rgba(255, 220, 124, 0.42)";
      ctx.shadowBlur = 12;
      const panel = ctx.createLinearGradient(x - 94, y - 17 + lift, x + 94, y + 17 + lift);
      panel.addColorStop(0, "rgba(255, 205, 84, 0.18)");
      panel.addColorStop(0.55, "rgba(255, 241, 174, 0.32)");
      panel.addColorStop(1, "rgba(255, 205, 84, 0.18)");
      ctx.fillStyle = panel;
      roundedRect(ctx, x - 94, y - 17 + lift, 188, 34, 17);
      ctx.fill();
      ctx.strokeStyle = "rgba(255, 232, 154, 0.55)";
      ctx.lineWidth = 1;
      ctx.stroke();
      ctx.shadowBlur = 0;
      ctx.fillStyle = "#ffe99b";
      ctx.font = "900 16px ui-sans-serif, system-ui";
      ctx.fillText(`${text} Lv.${game.level}`, x, y + lift);
      ctx.restore();
    }

    function drawHighScoreBanner() {
      if (game.recordFlashTimer <= 0) return;
      const x = BOARD_X + COLS * CELL / 2;
      const y = BOARD_Y + 28;
      const progress = 1 - Math.min(1, game.recordFlashTimer / HIGH_SCORE_FLASH_MS);
      const alpha = game.recordFlashTimer < 180 ? game.recordFlashTimer / 180 : 1;
      const pop = 1 + Math.sin(Math.min(1, progress * 1.4) * Math.PI) * 0.08;
      ctx.save();
      ctx.globalAlpha = Math.max(0, alpha);
      ctx.translate(x, y);
      ctx.scale(pop, pop);
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.shadowColor = "rgba(255, 133, 190, 0.58)";
      ctx.shadowBlur = 13;
      const panel = ctx.createLinearGradient(-98, -18, 98, 18);
      panel.addColorStop(0, "rgba(255, 128, 182, 0.2)");
      panel.addColorStop(0.55, "rgba(255, 239, 140, 0.34)");
      panel.addColorStop(1, "rgba(255, 128, 182, 0.2)");
      ctx.fillStyle = panel;
      roundedRect(ctx, -98, -18, 196, 36, 18);
      ctx.fill();
      ctx.strokeStyle = "rgba(255, 255, 255, 0.66)";
      ctx.lineWidth = 1.4;
      ctx.stroke();
      ctx.fillStyle = "#fff2a6";
      ctx.font = "900 17px ui-sans-serif, system-ui";
      ctx.fillText("NEW RECORD!", 0, 0);
      ctx.restore();
    }

    function easeOutCubic(t) {
      return 1 - Math.pow(1 - t, 3);
    }

    function easeOutBack(t) {
      const c1 = 1.7;
      const c3 = c1 + 1;
      return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
    }

    function easeOutBounce(t) {
      const n1 = 7.5625;
      const d1 = 2.75;
      if (t < 1 / d1) return n1 * t * t;
      if (t < 2 / d1) {
        t -= 1.5 / d1;
        return n1 * t * t + 0.75;
      }
      if (t < 2.5 / d1) {
        t -= 2.25 / d1;
        return n1 * t * t + 0.9375;
      }
      t -= 2.625 / d1;
      return n1 * t * t + 0.984375;
    }

    function getLogoImage(key) {
      const image = logoImages.get(key);
      return image && image.complete && image.naturalWidth > 0 ? image : null;
    }

    function drawLogoImage(key, cx, cy, maxW, maxH, options = {}) {
      const image = getLogoImage(key);
      if (!image) return null;
      const ratio = image.naturalWidth / image.naturalHeight;
      let w = maxW;
      let h = w / ratio;
      if (h > maxH) {
        h = maxH;
        w = h * ratio;
      }
      const alpha = options.alpha ?? 1;
      const scale = options.scale ?? 1;
      ctx.save();
      ctx.translate(cx, cy + (options.offsetY || 0));
      ctx.scale(scale, scale);
      ctx.globalAlpha = alpha;
      ctx.shadowColor = options.shadowColor || "rgba(65, 30, 102, 0.34)";
      ctx.shadowBlur = options.shadowBlur ?? 18;
      ctx.shadowOffsetY = options.shadowOffsetY ?? 6;
      ctx.drawImage(image, -w / 2, -h / 2, w, h);
      ctx.restore();
      return { w: w * scale, h: h * scale };
    }

    function getStoryImage(key) {
      const image = storyImages.get(key);
      return image && image.complete && image.naturalWidth > 0 ? image : null;
    }

    function drawCoverImage(image, x, y, w, h, alpha = 1) {
      if (!image) {
        const fallback = ctx.createLinearGradient(x, y, x + w, y + h);
        fallback.addColorStop(0, "#1b1d2c");
        fallback.addColorStop(0.55, "#3b2740");
        fallback.addColorStop(1, "#815235");
        ctx.fillStyle = fallback;
        ctx.fillRect(x, y, w, h);
        return;
      }
      const imageRatio = image.naturalWidth / image.naturalHeight;
      const boxRatio = w / h;
      let sw = image.naturalWidth;
      let sh = image.naturalHeight;
      let sx = 0;
      let sy = 0;
      if (imageRatio > boxRatio) {
        sw = image.naturalHeight * boxRatio;
        sx = (image.naturalWidth - sw) / 2;
      } else {
        sh = image.naturalWidth / boxRatio;
        sy = (image.naturalHeight - sh) / 2;
      }
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.drawImage(image, sx, sy, sw, sh, x, y, w, h);
      ctx.restore();
    }

    function drawContainImage(image, cx, bottomY, maxW, maxH, options = {}) {
      if (!image) return null;
      const ratio = image.naturalWidth / image.naturalHeight;
      let w = maxW;
      let h = w / ratio;
      if (h > maxH) {
        h = maxH;
        w = h * ratio;
      }
      ctx.save();
      ctx.globalAlpha = options.alpha ?? 1;
      ctx.translate(cx + (options.offsetX || 0), bottomY - h / 2 + (options.offsetY || 0));
      ctx.scale(options.scale ?? 1, options.scale ?? 1);
      ctx.shadowColor = options.shadowColor || "rgba(0, 0, 0, 0.38)";
      ctx.shadowBlur = options.shadowBlur ?? 22;
      ctx.shadowOffsetY = options.shadowOffsetY ?? 10;
      ctx.drawImage(image, -w / 2, -h / 2, w, h);
      ctx.restore();
      return { w, h };
    }

    function drawKnockoutClearConfetti(now) {
      if (!game.knockoutCleared || game.knockoutClearCelebrationTimer <= 0) return;
      const elapsed = KNOCKOUT_CLEAR_CONFETTI_MS - game.knockoutClearCelebrationTimer;
      const fadeIn = Math.min(1, elapsed / 420);
      const fadeOut = Math.min(1, game.knockoutClearCelebrationTimer / 900);
      const alpha = fadeIn * fadeOut;
      const colors = ["#ff5fa2", "#ffcf4d", "#5de8ff", "#79f26f", "#a277ff", "#ffffff"];
      ctx.save();
      ctx.globalCompositeOperation = "source-over";
      for (let i = 0; i < 140; i++) {
        const seed = i * 91.73;
        const lane = ((i * 67) % 997) / 997;
        const speed = 0.045 + (i % 8) * 0.008;
        const x = lane * canvas.width + Math.sin(now * 0.0024 + seed) * (18 + (i % 5) * 6);
        const y = ((elapsed * speed + seed * 2.7) % (canvas.height + 170)) - 110;
        const spin = now * (0.004 + (i % 4) * 0.0015) + seed;
        const w = 6 + (i % 4) * 2.8;
        const h = i % 3 === 0 ? 12 : 5.5;
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(spin);
        ctx.globalAlpha = alpha * (0.54 + (i % 5) * 0.08);
        ctx.fillStyle = colors[i % colors.length];
        roundedRect(ctx, -w / 2, -h / 2, w, h, 2);
        ctx.fill();
        ctx.restore();
      }
      for (let i = 0; i < 18; i++) {
        const seed = i * 57.19;
        const x = ((i * 131) % 1000) / 1000 * canvas.width;
        const y = ((elapsed * 0.036 + seed * 4.2) % (canvas.height + 220)) - 120;
        ctx.save();
        ctx.globalAlpha = alpha * 0.45;
        ctx.strokeStyle = colors[(i + 2) % colors.length];
        ctx.lineWidth = 2.2;
        ctx.beginPath();
        for (let j = 0; j < 5; j++) {
          const px = x + Math.sin(now * 0.003 + seed + j * 0.9) * 16;
          const py = y + j * 10;
          if (j === 0) ctx.moveTo(px, py);
          else ctx.lineTo(px, py);
        }
        ctx.stroke();
        ctx.restore();
      }
      ctx.restore();
    }

    function wrapDialogLines(lines, maxWidth, font, maxLines = 5) {
      const cacheKey = `${font}|${maxWidth}|${maxLines}|${lines.join("\n")}`;
      const cached = dialogWrapCache.get(cacheKey);
      if (cached) return cached;
      ctx.save();
      ctx.font = font;
      const wrapped = [];
      for (const line of lines) {
        let current = "";
        for (const char of [...line]) {
          const next = current + char;
          if (current && ctx.measureText(next).width > maxWidth) {
            wrapped.push(current);
            current = char;
          } else {
            current = next;
          }
        }
        if (current) wrapped.push(current);
      }
      ctx.restore();
      const result = wrapped.slice(0, maxLines);
      if (dialogWrapCache.size > 180) dialogWrapCache.clear();
      dialogWrapCache.set(cacheKey, result);
      return result;
    }

    function setFittedUiFont(text, maxWidth, baseSize, minSize, weight = 900) {
      let size = baseSize;
      do {
        ctx.font = `${weight} ${size}px ui-sans-serif, system-ui`;
        if (ctx.measureText(text).width <= maxWidth || size <= minSize) break;
        size -= 1;
      } while (size > minSize);
      return size;
    }

    function drawCenteredFittedText(text, x, y, maxWidth, baseSize, minSize, fillStyle, weight = 900) {
      ctx.fillStyle = fillStyle;
      setFittedUiFont(text, maxWidth, baseSize, minSize, weight);
      ctx.fillText(text, x, y);
    }

    function splitSystemDecorations(lines) {
      const result = [];
      for (const line of lines) {
        const match = line.match(/^(.+[！!])\s+(.+)$/u);
        if (match && [...match[2]].length <= 6) {
          result.push(match[1], match[2]);
        } else {
          result.push(line);
        }
      }
      return result;
    }

    function drawStoryScroll(lines, scrollTimer, scrollMs, isTransition, transitionTimer, transitionDuration, backdropKey) {
      const mobile = isTouchDevice();

        ? 1 - Math.min(1, transitionTimer / Math.max(1, transitionDuration))

      const lineHeight = mobile ? 52 : 34;
      const fontSize = mobile ? 40 : 26;
      const minFontSize = mobile ? 30 : 20;
      const textMaxWidth = canvas.width - (mobile ? 88 : 120);
      const textHeight = lines.length * lineHeight;
      const startY = canvas.height + 92;
      const endY = -textHeight - 72;
      const y = startY + (endY - startY) * scrollProgress;
      ctx.save();
      ctx.fillStyle = "#000000";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

          const edgeFade = Math.min(1, Math.max(0, (lineY - 24) / 90), Math.max(0, (canvas.height - 34 - lineY) / 90));

        ctx.textAlign = "center";

        glow.addColorStop(0.42, `rgba(255, 200, 92, ${0.12 * Math.sin(transitionProgress * Math.PI)})`);
        glow.addColorStop(1, "rgba(0, 0, 0, 0)");
        ctx.fillStyle = glow;

    function drawMiniPiece(miniCtx, piece, index) {
      const width = miniCtx.canvas.width;
      const height = miniCtx.canvas.height;
      const compact = width < 200;
      miniCtx.clearRect(0, 0, width, height);
      if (index > 1) {
        miniCtx.fillStyle = "#7c4e25";

        miniCtx.textAlign = "left";
        miniCtx.fillText(`NEXT ${index}`, compact ? 5 : 12, 16);
      }
      if (!piece) return;
      const offsets = SHAPES[piece.shape][piece.rotation];
      const xs = offsets.map(o => o.x);
      const ys = offsets.map(o => o.y);
      const minX = Math.min(...xs);
      const maxX = Math.max(...xs);
      const minY = Math.min(...ys);
      const maxY = Math.max(...ys);
      const spanX = maxX - minX;
      const spanY = maxY - minY;
      const availableW = width - (compact ? 12 : 24);
      const availableH = height - (index > 1 ? 24 : 16);
      const maxScaleX = availableW / (TILE_SPRITE_SIZE * (1 + spanX * 0.72));
      const maxScaleY = availableH / (TILE_SPRITE_SIZE * (1 + spanY * 0.72));
      const scale = Math.max(0.34, Math.min(compact ? 0.44 : 0.52, maxScaleX, maxScaleY));
      const gap = TILE_SPRITE_SIZE * scale * 0.72;
      const baseX = width / 2 - ((minX + maxX) * gap) / 2;
      const baseY = height * (index > 1 ? 0.58 : 0.5) - ((minY + maxY) * gap) / 2;
      offsets.forEach((o, i) => {
        drawTile(miniCtx, piece.tiles[i], baseX + o.x * gap, baseY + o.y * gap, scale);
      });

    let mobileFullscreenTried = false;
    let mobileFullscreenNoticeTimer = 0;

    function isTouchDevice() {
      return window.matchMedia?.("(hover: none) and (pointer: coarse)").matches;
    }

    function lockMobileLandscape() {
      const lock = screen.orientation?.lock;
      if (!lock) return;
      try {
        const result = lock.call(screen.orientation, "landscape");
        if (result?.catch) result.catch(() => {});
      } catch {
        // iPhone browsers generally do not allow programmatic orientation locks.

    function updateFullscreenButton() {
      if (!fullscreenButton) return;
      const isFullscreen = Boolean(document.fullscreenElement || document.webkitFullscreenElement);
      fullscreenButton.textContent = isFullscreen ? "戻" : "全";
      fullscreenButton.setAttribute("aria-label", isFullscreen ? "フルスクリーンを解除" : "フルスクリーンにする");
    }

    function showMobileFullscreenNotice(message) {
      if (!mobileFullscreenNoticeEl) return;
      mobileFullscreenNoticeEl.textContent = message;
      mobileFullscreenNoticeEl.classList.add("is-visible");
      if (mobileFullscreenNoticeTimer) window.clearTimeout(mobileFullscreenNoticeTimer);
      mobileFullscreenNoticeTimer = window.setTimeout(() => {
        mobileFullscreenNoticeEl.classList.remove("is-visible");
        mobileFullscreenNoticeTimer = 0;
      }, 4200);
    }

    function requestMobileFullscreen(force = false, notify = false) {
      if (!force && mobileFullscreenTried) return;
      if (!isTouchDevice()) return;
      const root = document.documentElement;
      const request = root.requestFullscreen || root.webkitRequestFullscreen;
      if (!request) {
        mobileFullscreenTried = true;
        lockMobileLandscape();
        if (notify) {
          showMobileFullscreenNotice("iPhoneのブラウザでは全画面ボタンが使えないことがあります。ホーム画面に追加して起動すると全画面に近くなります。");
        }
        return;
      }
      mobileFullscreenTried = true;
      try {
        const result = request.call(root);
        if (result?.then) {
          result
            .then(lockMobileLandscape)
            .then(updateFullscreenButton)
            .catch(() => {
              updateFullscreenButton();
              if (notify) {
                showMobileFullscreenNotice("このブラウザでは全画面化が止められました。iPhoneならホーム画面に追加して起動してみてね。");
              }
            });
        }
        else {
          lockMobileLandscape();
          updateFullscreenButton();
        }
      } catch {
        // Some mobile browsers expose the API but still reject page fullscreen.
        lockMobileLandscape();
        updateFullscreenButton();
        if (notify) {
          showMobileFullscreenNotice("このブラウザでは全画面化が止められました。iPhoneならホーム画面に追加して起動してみてね。");
        }
      }
    }

    function toggleFullscreenFromButton() {
      game.unlockSoundFromInput();
      const isFullscreen = Boolean(document.fullscreenElement || document.webkitFullscreenElement);
      if (isFullscreen) {
        const exit = document.exitFullscreen || document.webkitExitFullscreen;
        try {
          const result = exit?.call(document);
          if (result?.then) result.then(updateFullscreenButton).catch(updateFullscreenButton);
          else updateFullscreenButton();
        } catch {
          updateFullscreenButton();
        }
        return;
      }
      requestMobileFullscreen(true, true);
    }

    function keyboardFlags(event) {
      const code = event.code || "";
      const key = String(event.key || "");
      const lower = key.toLowerCase();
      const isSpace = code === "Space" || key === " " || key === "Spacebar";
      return {
        code,
        left: code === "ArrowLeft" || key === "ArrowLeft" || key === "Left",
        right: code === "ArrowRight" || key === "ArrowRight" || key === "Right",
        up: code === "ArrowUp" || key === "ArrowUp" || key === "Up",
        down: code === "ArrowDown" || key === "ArrowDown" || key === "Down",
        confirm: isSpace || code === "Enter" || code === "NumpadEnter" || key === "Enter" || code === "KeyA" || lower === "a",
        rotateForward: isSpace || code === "KeyX" || lower === "x" || code === "KeyA" || lower === "a",
        rotateBack: code === "KeyZ" || lower === "z" || code === "KeyB" || lower === "b",
        back: code === "KeyB" || lower === "b" || code === "Escape" || key === "Escape",
        pause: code === "KeyP" || lower === "p" || code === "Escape" || key === "Escape",
        mute: code === "KeyM" || lower === "m",
        restart: code === "KeyR" || lower === "r",
        quit: code === "KeyY" || lower === "y",
        preview: code === "KeyC" || lower === "c"
      };
    }

    function handleKeyDown(event) {
      const key = keyboardFlags(event);
      const code = key.code;
      if (key.left || key.right || key.up || key.down || key.confirm || key.back || key.pause || key.mute || key.restart || key.quit || key.preview) {
        event.preventDefault();
      }
      if (!event.repeat) game.unlockSoundFromInput();
      if (game.demoActive) {
        if (!event.repeat) game.returnToTitleFromDemo();
        return;
      }
      if (game.state === "storyOpening" || game.state === "storyOpeningTransition") {
        if (!event.repeat) game.skipStoryOpening();
        return;
      }
      if (game.state === "storyEnding" || game.state === "storyEndingTransition") {
        if (!event.repeat) game.skipStoryEnding();
        return;
      }
      if (game.state === "storyStage") {
        if (!event.repeat && key.pause) {
          game.togglePause();
          return;
        }
        if (!event.repeat) game.advanceStoryStage();
        return;
      }
      if (game.state === "title") {
        if (!event.repeat && game.dismissTitleDemo()) return;
        if (!event.repeat && key.preview) {
          game.previewFinalStory();
          return;
        }
        if (!event.repeat && key.left) game.cycleDifficulty(-1);
        if (!event.repeat && key.right) game.cycleDifficulty(1);
        if (!event.repeat && key.confirm) game.enterModeSelect();
        if (!event.repeat && key.back) game.backFromDifficultyToModeSelect();
        if (!event.repeat && key.mute) game.toggleBgmMute();
        if (!event.repeat && key.restart) game.primaryAction();
        return;
      }
      if (game.state === "modeSelect") {
        if (!event.repeat && key.up) game.cyclePlayMode(-1);
        if (!event.repeat && key.down) game.cyclePlayMode(1);
        if (!event.repeat && key.confirm) game.primaryAction();
        if (!event.repeat && key.back) game.backToDifficultySelect();
        if (!event.repeat && key.mute) game.toggleBgmMute();
        if (!event.repeat && key.restart) game.backToDifficultySelect();
        return;
      }
      if (game.state === "cpuLevelSelect") {
        if (!event.repeat && key.up) game.cycleCpuLevel(-1);
        if (!event.repeat && key.down) game.cycleCpuLevel(1);
        if (!event.repeat && key.confirm) game.start("cpu", game.selectedCpuLevel);
        if (!event.repeat && key.back) game.backToModeSelect();
        if (!event.repeat && key.mute) game.toggleBgmMute();
        if (!event.repeat && key.restart) game.backToModeSelect();
        return;
      }
      if (game.state === "quitConfirm") {
        if (!event.repeat && (key.left || key.up)) game.cycleQuitConfirm(-1);
        if (!event.repeat && (key.right || key.down)) game.cycleQuitConfirm(1);
        if (!event.repeat && key.confirm) game.confirmQuitChoice();
        if (!event.repeat && (key.back || key.quit)) game.cancelQuitConfirm();
        if (!event.repeat && key.mute) game.toggleBgmMute();
        return;
      }
      if (game.state === "paused") {
        if (!event.repeat && (key.left || key.up)) game.cyclePauseChoice(-1);
        if (!event.repeat && (key.right || key.down)) game.cyclePauseChoice(1);
        if (!event.repeat && key.confirm) game.confirmPauseChoice();
        if (!event.repeat && (key.back || key.pause)) game.resumeFromPause();
        if (!event.repeat && key.mute) game.toggleBgmMute();
        return;
      }
      if (game.state === "continueConfirm") {
        if (!event.repeat && (key.left || key.up)) game.cycleContinueChoice(-1);
        if (!event.repeat && (key.right || key.down)) game.cycleContinueChoice(1);
        if (!event.repeat && key.confirm) game.confirmContinueChoice();
        if (!event.repeat && key.back) game.declineContinue();
        if (!event.repeat && key.mute) game.toggleBgmMute();
        return;
      }
      if (game.state === "gameover") {
        if (!event.repeat && key.mute) game.toggleBgmMute();
        if (!event.repeat && key.restart && game.canConfirmGameOver()) {
          if (game.selectedPlayMode === "knockout") game.startKnockoutMode();
          else game.start(game.selectedPlayMode, game.selectedCpuLevel);
        } else if (!event.repeat && (key.confirm || key.back)) {
          game.confirmGameOver();
        }
        return;
      }
      if (key.left) {
        const wasPressed = game.keys.has("ArrowLeft");
        game.keys.add("ArrowLeft");
        if (!wasPressed) game.pressHorizontal(-1);
      }
      if (key.right) {
        const wasPressed = game.keys.has("ArrowRight");
        game.keys.add("ArrowRight");
        if (!wasPressed) game.pressHorizontal(1);
      }
      if (key.down) {
        if (!game.softDropInputLocked) {
          game.keys.add("ArrowDown");
          game.setSoftDrop(true);
        }
      }
      if (!event.repeat && key.rotateForward) game.rotate(1);
      if (!event.repeat && key.rotateBack) game.rotate(-1);
      if (!event.repeat && key.quit) game.requestQuitConfirm();
      if (!event.repeat && key.pause) game.togglePause();
      if (!event.repeat && key.mute) game.toggleBgmMute();
      if (!event.repeat && key.restart) {
        if (game.selectedPlayMode === "knockout") game.startKnockoutMode();
        else game.start(game.selectedPlayMode);
      }
    }

    function handleKeyUp(event) {
      const key = keyboardFlags(event);
      if (key.down) {
        game.keys.delete("ArrowDown");
        game.softDropInputLocked = false;
        game.setSoftDrop(false);
      }
      if (key.left) {
        game.keys.delete("ArrowLeft");
        game.releaseHorizontal(-1);
      }
      if (key.right) {
        game.keys.delete("ArrowRight");
        game.releaseHorizontal(1);
      }
    }

    let activeTouchMovePadAction = null;
    let activeTouchMovePadPointerId = null;
    let activeTouchMovePadStartedHorizontal = false;

    function releaseTouchAction(action) {
      if (action === "left") {
        game.keys.delete("ArrowLeft");
        game.releaseHorizontal(-1);
      } else if (action === "right") {
        game.keys.delete("ArrowRight");
        game.releaseHorizontal(1);
      } else if (action === "down") {
        game.keys.delete("ArrowDown");
        game.softDropInputLocked = false;
        game.setSoftDrop(false);
      }
    }

    function touchMovePadActionFromPoint(event) {
      if (!touchMovePadEl) return null;
      const rect = touchMovePadEl.getBoundingClientRect();
      if (!rect.width || !rect.height) return null;
      for (const button of touchMovePadEl.querySelectorAll("[data-touch]")) {
        const buttonRect = button.getBoundingClientRect();
        if (
          event.clientX >= buttonRect.left &&
          event.clientX <= buttonRect.right &&
          event.clientY >= buttonRect.top &&
          event.clientY <= buttonRect.bottom
        ) {
          return button.dataset.touch;
        }
      }
      const xRatio = (event.clientX - rect.left) / rect.width;
      const yRatio = (event.clientY - rect.top) / rect.height;
      if (yRatio > 0.76) return "down";
      if (yRatio > 0.68) return null;
      return xRatio < 0.5 ? "left" : "right";
    }

    function updateTouchMovePadHighlight(action) {
      touchMovePadEl?.querySelectorAll("[data-touch]").forEach(button => {
        button.classList.toggle("is-pressed", button.dataset.touch === action);
      });
    }

    function setTouchMovePadAction(action) {
      if (activeTouchMovePadAction && game.state !== "playing" && action !== activeTouchMovePadAction) return;
      if (action === activeTouchMovePadAction) return;
      if (activeTouchMovePadAction) releaseTouchAction(activeTouchMovePadAction);
      activeTouchMovePadAction = action;
      updateTouchMovePadHighlight(action);
      if (action) handleTouchPress(action);
    }

    function clearTouchMovePadAction() {
      if (activeTouchMovePadAction) releaseTouchAction(activeTouchMovePadAction);
      activeTouchMovePadAction = null;
      activeTouchMovePadPointerId = null;
      activeTouchMovePadStartedHorizontal = false;
      updateTouchMovePadHighlight(null);
    }

    function releaseAllTouchControls() {
      game.keys.delete("ArrowLeft");
      game.keys.delete("ArrowRight");
      game.keys.delete("ArrowDown");
      game.setSoftDrop(false);
      game.horizontalDir = 0;
      game.horizontalDelayTimer = 0;
      game.horizontalRepeatTimer = 0;
      game.lastHorizontalDir = 0;
      activeTouchMovePadAction = null;
      activeTouchMovePadPointerId = null;
      activeTouchMovePadStartedHorizontal = false;
      touchControlsEl?.querySelectorAll(".is-pressed").forEach(button => button.classList.remove("is-pressed"));
    }

    function handleTouchPress(action) {
      game.unlockSoundFromInput();
      if (action === "fullscreen") {
        toggleFullscreenFromButton();
        return;
      }
      requestMobileFullscreen();
      if (game.demoActive) {
        game.returnToTitleFromDemo();
        return;
      }
      if (game.state === "storyOpening" || game.state === "storyOpeningTransition") {
        game.skipStoryOpening();
        return;
      }
      if (game.state === "storyEnding" || game.state === "storyEndingTransition") {
        game.skipStoryEnding();
        return;
      }
      if (game.state === "title" && game.dismissTitleDemo()) return;

      if (action === "pause") {
        if (game.state === "playing" || game.state === "paused" || game.state === "storyStage") game.togglePause();
        return;
      }

      if (game.state === "storyStage") {
        game.advanceStoryStage();
        return;
      }

      if (action === "action") {
        if (game.state === "playing") game.rotate(1);
        else if (["title", "modeSelect", "cpuLevelSelect", "gameover", "continueConfirm", "quitConfirm", "paused"].includes(game.state)) {
          game.primaryAction();
        }
        return;
      }

      if (action === "back") {
        if (game.state === "playing") game.rotate(-1);
        else if (game.state === "title") game.backFromDifficultyToModeSelect();
        else if (game.state === "modeSelect") game.backToDifficultySelect();
        else if (game.state === "cpuLevelSelect") game.backToModeSelect();
        else if (game.state === "quitConfirm") game.cancelQuitConfirm();
        else if (game.state === "paused") game.resumeFromPause();
        else if (game.state === "continueConfirm") game.declineContinue();
        else if (game.state === "gameover") game.confirmGameOver();
        return;
      }

      if (action === "left") {
        if (game.state === "playing") {
          const wasPressed = game.keys.has("ArrowLeft");
          game.keys.add("ArrowLeft");
          if (!wasPressed) game.pressHorizontal(-1);
        } else if (game.state === "title") game.cycleDifficulty(-1);
        else if (game.state === "modeSelect") game.cyclePlayMode(-1);
        else if (game.state === "cpuLevelSelect") game.cycleCpuLevel(-1);
        else if (game.state === "quitConfirm") game.cycleQuitConfirm(-1);
        else if (game.state === "paused") game.cyclePauseChoice(-1);
        else if (game.state === "continueConfirm") game.cycleContinueChoice(-1);
        return;
      }

      if (action === "right") {
        if (game.state === "playing") {
          const wasPressed = game.keys.has("ArrowRight");
          game.keys.add("ArrowRight");
          if (!wasPressed) game.pressHorizontal(1);
        } else if (game.state === "title") game.cycleDifficulty(1);
        else if (game.state === "modeSelect") game.cyclePlayMode(1);
        else if (game.state === "cpuLevelSelect") game.cycleCpuLevel(1);
        else if (game.state === "quitConfirm") game.cycleQuitConfirm(1);
        else if (game.state === "paused") game.cyclePauseChoice(1);
        else if (game.state === "continueConfirm") game.cycleContinueChoice(1);
        return;
      }

      if (action === "down") {
        if (game.state === "playing") {
          if (!game.softDropInputLocked) {
            game.keys.add("ArrowDown");
            game.setSoftDrop(true);
          }
        } else if (game.state === "modeSelect") game.cyclePlayMode(1);
        else if (game.state === "cpuLevelSelect") game.cycleCpuLevel(1);
        else if (game.state === "quitConfirm") game.cycleQuitConfirm(1);
        else if (game.state === "paused") game.cyclePauseChoice(1);
        else if (game.state === "continueConfirm") game.cycleContinueChoice(1);
      }
    }

    const routedKeyEvents = new WeakSet();

    function focusGameCanvas() {
      if (document.activeElement !== canvas) canvas.focus({ preventScroll: true });
    }

    function routeKeyDown(event) {
      if (routedKeyEvents.has(event)) return;
      routedKeyEvents.add(event);
      focusGameCanvas();
      handleKeyDown(event);
    }

    function routeKeyUp(event) {
      if (routedKeyEvents.has(event)) return;
      routedKeyEvents.add(event);
      handleKeyUp(event);
    }

    window.addEventListener("keydown", routeKeyDown, { capture: true });
    window.addEventListener("keyup", routeKeyUp, { capture: true });
    document.addEventListener("keydown", routeKeyDown, { capture: true });
    document.addEventListener("keyup", routeKeyUp, { capture: true });
    document.addEventListener("pointerdown", () => {
      focusGameCanvas();
      game.unlockSoundFromInput();
    }, { capture: true });
    document.addEventListener("touchstart", () => game.unlockSoundFromInput(), { capture: true, passive: true });
    window.addEventListener("gamepadconnected", () => {
      focusGameCanvas();
      game.unlockSoundFromInput();
      game.pollGamepads();
    });
    window.addEventListener("gamepaddisconnected", () => {
      game.resetGamepadState();
    });

    touchControlsEl?.addEventListener("contextmenu", event => event.preventDefault());
    touchMovePadEl?.addEventListener("pointerdown", event => {
      event.preventDefault();
      event.stopPropagation();
      touchMovePadEl.setPointerCapture?.(event.pointerId);
      activeTouchMovePadPointerId = event.pointerId;
      const action = touchMovePadActionFromPoint(event);
      activeTouchMovePadStartedHorizontal = action === "left" || action === "right";
      setTouchMovePadAction(action);
    });
    touchMovePadEl?.addEventListener("pointermove", event => {
      if (event.pointerId !== activeTouchMovePadPointerId) return;
      event.preventDefault();
      event.stopPropagation();
      setTouchMovePadAction(touchMovePadActionFromPoint(event));
    });
    for (const type of ["pointerup", "pointercancel", "lostpointercapture"]) {
      touchMovePadEl?.addEventListener(type, event => {
        if (event.pointerId !== activeTouchMovePadPointerId && type !== "lostpointercapture") return;
        event.preventDefault();
        event.stopPropagation();
        clearTouchMovePadAction();
      });
    }

    touchControlsEl?.querySelectorAll(".touch-pad--right [data-touch]").forEach(button => {
      button.addEventListener("pointerdown", event => {
        event.preventDefault();
        event.stopPropagation();
        button.setPointerCapture?.(event.pointerId);
        button.classList.add("is-pressed");
        handleTouchPress(button.dataset.touch);
      });
      for (const type of ["pointerup", "pointercancel", "lostpointercapture"]) {
        button.addEventListener(type, event => {
          event.preventDefault();
          event.stopPropagation();
          button.classList.remove("is-pressed");
          releaseTouchAction(button.dataset.touch);
        });
      }
    });

    document.addEventListener("fullscreenchange", updateFullscreenButton);
    document.addEventListener("webkitfullscreenchange", updateFullscreenButton);
    updateFullscreenButton();

    difficultyButtons.forEach(button => {
      button.addEventListener("click", () => {
        if (game.returnToTitleFromDemo()) return;
        if (game.dismissTitleDemo()) return;
        game.setDifficulty(button.dataset.difficulty);
      });
    });

    startButton.addEventListener("click", () => {
      requestMobileFullscreen();
      if (game.advanceStoryStage()) return;
      if (game.skipStoryEnding()) return;
      if (game.skipStoryOpening()) return;
      if (game.returnToTitleFromDemo()) return;
      if (game.dismissTitleDemo()) return;
      game.primaryAction();
    });

    canvas.addEventListener("pointerdown", () => {
      requestMobileFullscreen();
      if (game.advanceStoryStage()) return;
      if (game.skipStoryEnding()) return;
      if (game.skipStoryOpening()) return;
      game.returnToTitleFromDemo();
    });

    window.addEventListener("blur", () => {
      game.keys.clear();
      releaseAllTouchControls();
      if (game.state === "playing" && !game.demoActive) game.togglePause(false);
    });

    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
