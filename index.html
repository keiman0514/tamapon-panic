<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>たまぽんパニック！</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #10131a;
      --panel: #171d28;
      --panel-2: #222b3b;
      --text: #f4f7fb;
      --muted: #a4b0c3;
      --line: #374158;
      --accent: #86d8d2;
      --danger: #ff6b6b;
      --gold: #ffd36a;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #0b1740;
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: auto;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      position: relative;
    }

    .bg-layer {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-position: center;
      background-size: cover;
      background-repeat: no-repeat;
      opacity: 0;
      transition: opacity 1300ms ease;
      will-change: opacity;
    }

    .bg-layer.active {
      opacity: 1;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(4, 9, 28, 0.24), rgba(4, 9, 28, 0.03) 28%, rgba(4, 9, 28, 0.03) 72%, rgba(4, 9, 28, 0.24)),
        linear-gradient(180deg, rgba(5, 9, 24, 0.12), rgba(5, 9, 24, 0.2));
    }

    .app {
      width: min(1490px, 100vw);
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(760px, 1000px) minmax(310px, 392px);
      gap: clamp(20px, 2.6vw, 42px);
      align-items: center;
      justify-items: center;
      padding: 16px 18px;
      position: relative;
      z-index: 2;
    }

    .stage-wrap {
      width: 100%;
      display: grid;
      place-items: center;
      position: relative;
    }

    .stage-wrap::before {
      content: "";
      position: absolute;
      width: min(1080px, 96vw);
      aspect-ratio: 1.04;
      border-radius: 36px;
      background: rgba(255, 225, 144, 0.1);
      filter: blur(16px);
      transform: translateY(8px);
      z-index: 0;
    }

    .app.story-scene {
      width: 100vw;
      min-height: 100vh;
      grid-template-columns: 1fr;
      gap: 0;
      padding: 0;
    }

    .app.story-scene .stage-wrap {
      width: 100vw;
      min-height: 100vh;
    }

    .app.story-scene .stage-wrap::before,
    .app.story-scene aside {
      display: none;
    }

    .app.story-scene canvas {
      width: min(100vw, calc(100vh * 1000 / 960));
      max-height: 100vh;
      box-shadow: none;
    }

    .app.story-scroll {
      background: #000;
    }

    canvas {
      position: relative;
      z-index: 1;
      width: min(100%, calc((100vh - 40px) * 1000 / 960), 1000px);
      height: auto;
      max-height: calc(100vh - 40px);
      border: 0;
      border-radius: 0;
      background: transparent;
      box-shadow:
        0 24px 58px rgba(12, 8, 30, 0.24),
        0 0 36px rgba(255, 221, 148, 0.12);
      touch-action: none;
      outline: none;
    }

    aside {
      width: min(392px, calc((100vh - 32px) * 506 / 1077), 96vw);
      aspect-ratio: 506 / 1077;
      align-self: center;
      position: relative;
      display: block;
      max-height: calc(100vh - 32px);
      overflow: visible;
      background: url("UI.png") center / contain no-repeat;
      filter: drop-shadow(0 22px 34px rgba(9, 6, 22, 0.24));
    }

    aside > div:first-child,
    .panel > .label,
    .stat .label,
    .controls {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0 0 0 0);
      white-space: nowrap;
    }

    .panel {
      position: absolute;
      inset: 0;
      background: transparent;
      border: 0;
      border-radius: 0;
      padding: 0;
      box-shadow: none;
      pointer-events: none;
    }

    .panel:nth-of-type(4) {
      display: none;
    }

    .stats {
      position: absolute;
      inset: 0;
      display: block;
    }

    .stat {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      min-height: 0;
      background: transparent;
      border: 0;
      border-radius: 0;
      padding: 0;
    }

    .bgm-stat {
      align-items: center;
      justify-content: flex-start;
    }

    .stats .stat:nth-child(1) {
      left: 11.2%;
      top: 25.2%;
      width: 29.8%;
      height: 3.8%;
    }

    .stats .stat:nth-child(2) {
      left: 54.7%;
      top: 25.2%;
      width: 29.8%;
      height: 3.8%;
    }

    .stats .stat:nth-child(3) {
      left: 11.2%;
      top: 32.3%;
      width: 29.8%;
      height: 3.8%;
    }

    .stats .stat:nth-child(4) {
      left: 54.7%;
      top: 32.3%;
      width: 31.8%;
      height: 3.8%;
    }

    .stats .stat:nth-child(5) {
      left: 34%;
      top: 37.1%;
      width: 25%;
      height: 3.7%;
    }

    .stats .stat:nth-child(6) {
      left: 70%;
      top: 37.1%;
      width: 18%;
      height: 3.7%;
    }

    .label {
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .value {
      font-size: clamp(15px, 4.1vw, 25px);
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      line-height: 1;
      color: #68401d;
      text-shadow:
        0 1px 0 rgba(255, 255, 255, 0.76),
        0 2px 4px rgba(129, 68, 27, 0.18);
    }

    .bgm-stat .value {
      width: clamp(15px, 3.5vw, 20px);
      height: clamp(15px, 3.5vw, 20px);
      border-radius: 50%;
      position: relative;
      font-size: 0;
      color: transparent;
      background:
        radial-gradient(circle at 34% 32%, rgba(255, 255, 255, 0.95), rgba(255, 242, 164, 0.94) 38%, rgba(255, 166, 98, 0.86) 72%, rgba(205, 93, 68, 0.82));
      box-shadow:
        0 1px 0 rgba(255, 255, 255, 0.78) inset,
        0 0 0 2px rgba(139, 75, 47, 0.18),
        0 3px 5px rgba(122, 65, 27, 0.2);
      text-shadow: none;
    }

    .bgm-stat .value::before,
    .bgm-stat .value::after {
      content: "";
      position: absolute;
      pointer-events: none;
    }

    .bgm-stat .value::before {
      left: 32%;
      top: 29%;
      width: 30%;
      height: 31%;
      border-left: 2px solid rgba(111, 62, 34, 0.82);
      border-bottom: 2px solid rgba(111, 62, 34, 0.82);
      border-radius: 0 0 0 8px;
      transform: rotate(-8deg);
    }

    .bgm-stat .value::after {
      left: 54%;
      top: 20%;
      width: 22%;
      height: 22%;
      border-top: 2px solid rgba(111, 62, 34, 0.66);
      border-right: 2px solid rgba(111, 62, 34, 0.66);
      border-radius: 50%;
      transform: rotate(34deg);
    }

    .bgm-stat .value.muted {
      opacity: 0.52;
      filter: grayscale(0.8);
    }

    .bgm-stat .value.muted::after {
      left: 22%;
      top: 49%;
      width: 58%;
      height: 2px;
      border: 0;
      border-radius: 999px;
      background: rgba(142, 52, 48, 0.9);
      transform: rotate(-38deg);
    }

    .high-score-stat .value {
      font-size: clamp(13px, 3.6vw, 21px);
    }

    .high-score-stat {
      justify-content: flex-end;
    }

    .next-list {
      position: absolute;
      left: 11%;
      top: 49.2%;
      width: 78%;
      height: 10.6%;
      display: grid;
      gap: 2%;
      align-content: center;
    }

    .next-canvas {
      width: 100%;
      height: 100%;
      display: block;
      background: transparent;
      border: 0;
      border-radius: 0;
    }

    .next-list[data-count="2"] {
      grid-template-columns: repeat(2, 1fr);
      grid-template-rows: 1fr;
      gap: 4%;
    }

    .next-list[data-count="2"] .next-canvas {
      height: 100%;
    }

    .difficulty {
      position: absolute;
      left: 8.3%;
      top: 63.2%;
      width: 75.3%;
      height: 5.9%;
      display: block;
      margin: 0;
    }

    .difficulty button {
      position: absolute;
      top: 0;
      height: 100%;
    }

    .difficulty button:nth-child(1) {
      left: 0;
      width: 29.8%;
    }

    .difficulty button:nth-child(2) {
      left: 32.8%;
      width: 32%;
    }

    .difficulty button:nth-child(3) {
      left: 68.5%;
      width: 30.4%;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 15px;
      background: rgba(255, 255, 255, 0.01);
      color: transparent;
      min-height: 0;
      padding: 0;
      font-weight: 800;
      cursor: pointer;
      pointer-events: auto;
    }

    button:hover {
      box-shadow: inset 0 0 0 3px rgba(255, 255, 255, 0.45);
    }

    button.active {
      box-shadow:
        inset 0 0 0 2px rgba(255, 255, 255, 0.82),
        inset 0 0 12px rgba(255, 234, 123, 0.5);
    }

    .start {
      position: absolute;
      left: 3.9%;
      top: 71.7%;
      width: 92.2%;
      height: 7.9%;
      margin: 0;
      border-radius: 999px;
    }

    .status-line {
      display: none;
    }

    .touch-controls {
      display: none;
    }

    .fullscreen-button {
      display: none;
    }

    .orientation-hint {
      display: none;
    }

    .mobile-fullscreen-notice {
      display: none;
    }

    @media (hover: none) and (pointer: coarse) {
      :root {
        --mobile-side-ui: clamp(104px, 14dvw, 150px);
        --mobile-left-touch: clamp(76px, 9.6dvw, 86px);
        --mobile-right-touch: clamp(40px, 5.2dvw, 48px);
        --mobile-gap: 0px;
        --mobile-frame-height: 100dvh;
        --mobile-frame-width: calc(var(--mobile-frame-height) * 1000 / 960);
      }

      html,
      body {
        width: 100%;
        height: 100vh;
        height: 100dvh;
        min-height: 100vh;
        min-height: 100dvh;
        overflow: hidden;
        overscroll-behavior: none;
        touch-action: none;
      }

      body {
        position: fixed;
        inset: 0;
        display: block;
      }

      .app {
        width: 100vw;
        height: 100vh;
        height: 100dvh;
        min-height: 100vh;
        min-height: 100dvh;
        grid-template-columns: var(--mobile-frame-width) var(--mobile-side-ui);
        gap: var(--mobile-gap);
        align-items: center;
        justify-items: center;
        justify-content: center;
        overflow: hidden;
        padding: 0;
      }

      .stage-wrap {
        width: var(--mobile-frame-width);
        height: var(--mobile-frame-height);
        min-height: 0;
        place-items: center;
      }

      .stage-wrap::before {
        width: var(--mobile-frame-width);
        height: var(--mobile-frame-height);
        border-radius: 24px;
      }

      aside {
        display: block;
        width: var(--mobile-side-ui);
        max-height: var(--mobile-frame-height);
      }

      .app.story-scene .stage-wrap::before,
      .app.story-scene aside {
        display: none;
      }

      canvas {
        width: var(--mobile-frame-width);
        height: var(--mobile-frame-height);
        max-width: none;
        max-height: none;
        box-shadow: none;
      }

      .touch-controls {
        position: fixed;
        inset: 0;
        z-index: 6;
        display: block;
        padding: 0;
        pointer-events: none;
        user-select: none;
        -webkit-user-select: none;
      }

      .fullscreen-button {
        display: none;
      }

      .mobile-fullscreen-notice {
        position: fixed;
        left: 50%;
        bottom: max(16px, env(safe-area-inset-bottom, 0px));
        z-index: 18;
        display: block;
        width: min(460px, calc(100dvw - 28px));
        padding: 12px 16px;
        border: 2px solid rgba(255, 230, 145, 0.52);
        border-radius: 16px;
        color: #fff8e5;
        background: rgba(8, 13, 31, 0.86);
        box-shadow: 0 12px 26px rgba(0, 0, 0, 0.3);
        font: 800 13px/1.45 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0;
        text-align: center;
        opacity: 0;
        transform: translate(-50%, 10px);
        transition: opacity 180ms ease, transform 180ms ease;
        pointer-events: none;
      }

      .mobile-fullscreen-notice.is-visible {
        opacity: 1;
        transform: translate(-50%, 0);
      }

      .value {
        font-size: clamp(10px, 1.55dvw, 15px);
        line-height: 0.95;
      }

      .stats .stat:nth-child(4) .value,
      .high-score-stat .value {
        font-size: clamp(9px, 1.35dvw, 13px);
      }

      .bgm-stat .value {
        width: clamp(11px, 1.65dvw, 15px);
        height: clamp(11px, 1.65dvw, 15px);
      }

      .bgm-stat .value::before {
        border-left-width: 1.5px;
        border-bottom-width: 1.5px;
      }

      .bgm-stat .value::after {
        border-top-width: 1.5px;
        border-right-width: 1.5px;
      }

      .touch-pad {
        display: grid;
        gap: 6px;
        pointer-events: auto;
      }

      .touch-pad--left {
        position: absolute;
        left: max(0px, env(safe-area-inset-left, 0px));
        bottom: 0;
        width: var(--mobile-left-touch);
        height: auto;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        grid-template-rows: 152px 18px 42px;
        column-gap: 4px;
        row-gap: 4px;
        align-items: end;
        align-content: end;
        justify-content: start;
      }

      .touch-pad--right {
        position: absolute;
        top: 0;
        right: max(0px, env(safe-area-inset-right, 0px));
        bottom: 0;
        width: var(--mobile-right-touch);
        height: 100%;
        grid-template-columns: minmax(40px, 1fr);
        grid-template-rows: 40px 40px 40px 160px;
        align-content: center;
        justify-content: end;
      }

      .touch-button {
        width: 100%;
        height: 100%;
        border: 2px solid rgba(255, 255, 255, 0.38);
        border-radius: 18px;
        color: #fff8e5;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.26), rgba(255, 255, 255, 0.08)),
          rgba(10, 17, 38, 0.62);
        box-shadow:
          0 10px 24px rgba(0, 0, 0, 0.26),
          inset 0 2px 8px rgba(255, 255, 255, 0.18);
        font: 800 23px/1 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0;
        touch-action: none;
        -webkit-tap-highlight-color: transparent;
      }

      .touch-button:active,
      .touch-button.is-pressed {
        transform: translateY(2px) scale(0.97);
        border-color: rgba(255, 230, 145, 0.82);
        background:
          linear-gradient(180deg, rgba(255, 225, 126, 0.4), rgba(255, 255, 255, 0.1)),
          rgba(23, 36, 65, 0.78);
      }

      .touch-button--left {
        grid-column: 1;
        grid-row: 1;
        border-radius: 24px;
        font-size: 36px;
      }

      .touch-button--down {
        grid-column: 1 / span 2;
        grid-row: 3;
      }

      .touch-button--right {
        grid-column: 2;
        grid-row: 1;
        border-radius: 24px;
        font-size: 36px;
      }

      .touch-button--action {
        grid-column: 1;
        grid-row: 4;
        border-radius: 999px;
        font-size: 30px;
      }

      .touch-button--fullscreen {
        grid-column: 1;
        grid-row: 1;
        border-radius: 999px;
        font-size: 19px;
      }

      .touch-button--back {
        grid-column: 1;
        grid-row: 3;
        border-radius: 999px;
      }

      .touch-button--pause {
        grid-column: 1;
        grid-row: 2;
        border-radius: 999px;
        font-size: 17px;
      }

      .app.story-scene + .touch-controls {
        padding:
          max(8px, env(safe-area-inset-top, 0px))
          max(8px, env(safe-area-inset-right, 0px))
          max(8px, env(safe-area-inset-bottom, 0px))
          max(8px, env(safe-area-inset-left, 0px));
      }

      .app.story-scene ~ .fullscreen-button {
        right: max(8px, env(safe-area-inset-right, 0px));
      }
    }

    @media (hover: none) and (pointer: coarse) and (max-width: 430px) {
      .touch-pad--left {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        grid-template-rows: 152px 18px 42px;
      }

      .touch-pad--right {
        grid-template-columns: minmax(40px, 1fr);
        grid-template-rows: 40px 40px 40px 160px;
      }

      .touch-button {
        border-radius: 16px;
        font-size: 21px;
      }

      .touch-button--action {
        font-size: 30px;
      }

      .touch-button--left,
      .touch-button--right {
        font-size: 36px;
      }

      .touch-button--pause {
        font-size: 16px;
      }
    }

    @media (max-width: 840px) {
      .app {
        grid-template-columns: 1fr;
        min-height: auto;
        padding: 14px 10px 22px;
      }

      aside {
        width: min(506px, 96vw);
        max-height: none;
      }

      canvas {
        width: min(92vw, 480px);
        max-height: none;
      }
    }

    @media (hover: none) and (pointer: coarse) {
      .app {
        width: 100vw;
        height: 100vh;
        height: 100dvh;
        min-height: 100vh;
        min-height: 100dvh;
        grid-template-columns: var(--mobile-frame-width) var(--mobile-side-ui);
        gap: var(--mobile-gap);
        justify-content: center;
        padding:
          0
          0
          0
          0;
      }

      .stage-wrap {
        width: var(--mobile-frame-width);
        height: var(--mobile-frame-height);
        min-height: 0;
        place-items: center;
      }

      .stage-wrap::before {
        width: var(--mobile-frame-width);
        height: var(--mobile-frame-height);
        border-radius: 24px;
      }

      aside {
        display: block;
        width: var(--mobile-side-ui);
        max-height: var(--mobile-frame-height);
      }

      .app.story-scene .stage-wrap::before,
      .app.story-scene aside {
        display: none;
      }

      canvas {
        width: var(--mobile-frame-width);
        height: var(--mobile-frame-height);
        max-width: none;
        max-height: none;
        box-shadow: none;
      }

      .app.story-scene {
        width: 100vw;
        height: 100vh;
        height: 100dvh;
        min-height: 100vh;
        min-height: 100dvh;
        padding: 0;
      }

      .app.story-scene .stage-wrap {
        width: 100vw;
        height: 100vh;
        height: 100dvh;
        min-height: 100vh;
        min-height: 100dvh;
      }

      .app.story-scene canvas {
        width: min(100vw, calc(100dvh * 1000 / 960));
        max-height: 100vh;
        max-height: 100dvh;
      }
    }

    @media (hover: none) and (pointer: coarse) and (orientation: portrait) {
      .touch-controls {
        visibility: hidden;
      }

      .orientation-hint {
        position: fixed;
        inset: 0;
        z-index: 20;
        display: grid;
        place-items: center;
        padding: 28px;
        color: #fff8e5;
        background:
          radial-gradient(circle at 50% 42%, rgba(255, 211, 106, 0.18), transparent 42%),
          rgba(3, 7, 18, 0.94);
        text-align: center;
        font: 800 22px/1.55 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0;
      }

      .orientation-hint span {
        display: block;
        max-width: 320px;
      }
    }
  </style>
</head>
<body>
  <div class="bg-layer bg-layer-a" id="bgLayerA"></div>
  <div class="bg-layer bg-layer-b" id="bgLayerB"></div>

  <main class="app">
    <section class="stage-wrap" aria-label="ゲーム画面">
      <canvas id="game" width="1000" height="960" tabindex="0"></canvas>
    </section>

    <aside>
      <div>
        <h1 class="title">たまぽんパニック！</h1>
        <p class="subtitle">色と顔で見分けるどうぶつたちが、4匹以上つながるとポンッとはじける落ち物パズル。</p>
      </div>

      <section class="panel">
        <div class="stats">
          <div class="stat">
            <span class="label">Score</span>
            <span class="value" id="score">0</span>
          </div>
          <div class="stat">
            <span class="label">Level</span>
            <span class="value" id="level">1</span>
          </div>
          <div class="stat">
            <span class="label">Chain</span>
            <span class="value" id="chain">0</span>
          </div>
          <div class="stat">
            <span class="label">Difficulty</span>
            <span class="value" id="difficultyLabel">Easy</span>
          </div>
          <div class="stat high-score-stat">
            <span class="label">High</span>
            <span class="value" id="highScore">0</span>
          </div>
          <div class="stat bgm-stat">
            <span class="label">BGM</span>
            <span class="value" id="bgmLabel" aria-label="BGM on"></span>
          </div>
        </div>
        <div class="status-line" id="statusLine"></div>
      </section>

      <section class="panel">
        <span class="label">Next</span>
        <div class="next-list" id="nextList"></div>

    class SoundSystem {
      constructor() {

        this.bgmPlaying = false;

      }

      isMobileAudio() {
        return typeof isTouchDevice === "function" && isTouchDevice();
      }

      mobileAudioScale(scale) {
        return this.isMobileAudio() ? scale : 1;
      }

      sfxMasterVolume() {
        return SFX_MASTER_VOLUME * this.mobileAudioScale(MOBILE_SFX_VOLUME_SCALE);
      }

      voiceVolume(volume = VOICE_VOLUME) {
        return Math.min(1, Math.max(0, volume * this.mobileAudioScale(MOBILE_VOICE_VOLUME_SCALE)));
      }

      ensure() {
        if (!this.enabled) return null;
        if (!this.ctx) {
          const AudioContext = window.AudioContext || window.webkitAudioContext;
          if (!AudioContext) {
            this.enabled = false;
            return null;
          }
          this.ctx = new AudioContext();
          this.master = this.ctx.createGain();
          this.master.gain.value = this.sfxMasterVolume();
          this.master.connect(this.ctx.destination);
          this.noiseBuffer = this.makeNoiseBuffer(0.35);
        }
        if (this.master) this.master.gain.value = this.sfxMasterVolume();
        if (this.ctx.state === "suspended") this.ctx.resume();
        this.sfxUnlocked = this.ctx.state === "running";
        return this.ctx;
      }

      unlock() {
        const ac = this.ensure();
        if (!ac) return false;
        const markReady = () => {
          this.sfxUnlocked = ac.state === "running";
        };
        if (ac.state === "suspended") {
          ac.resume().then(markReady).catch(() => {
            this.sfxUnlocked = false;
          });
        } else {
          markReady();
        }
        if (ac.state === "running") {
          const osc = ac.createOscillator();
          const amp = ac.createGain();
          osc.type = "sine";
          osc.frequency.value = 880;
          amp.gain.value = 0.0001;
          osc.connect(amp).connect(this.master || ac.destination);
          osc.start();
          osc.stop(ac.currentTime + 0.018);
        }
        return this.sfxUnlocked;
      }

      isSfxReady() {
        return !!this.ctx && this.ctx.state === "running";
      }

      makeNoiseBuffer(duration) {
        const len = Math.max(1, Math.floor(this.ctx.sampleRate * duration));
        const buffer = this.ctx.createBuffer(1, len, this.ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < len; i++) data[i] = Math.random() * 2 - 1;
        return buffer;
      }

      bgmTrackConfig(trackKey = "main") {

          if (!this.bgmSources[trackKey]) {
            const source = ac.createMediaElementSource(audio);
            const gain = ac.createGain();
            source.connect(gain).connect(ac.destination);
            this.bgmSources[trackKey] = source;
            this.bgmGains[trackKey] = gain;
          }
          const gain = this.bgmGains[trackKey];
          if (!gain) return false;
          gain.gain.setTargetAtTime(this.bgmVolume(config), ac.currentTime, 0.02);
          return true;
        } catch {
          return false;
        }
      }

      initAudioBgm(trackKey = "main") {
        const config = this.bgmTrackConfig(trackKey);
        if (!this.bgmEnabled || !config?.src || this.bgmAudios[trackKey]) return this.bgmAudios[trackKey] || null;
        const audio = new Audio(config.src);
        audio.loop = true;
        audio.preload = "auto";
        audio.volume = this.bgmVolume(config);
        audio.addEventListener("ended", () => {
          audio.currentTime = 0;
          audio.play().catch(() => {});
        });
        this.bgmAudios[trackKey] = audio;
        if (!this.bgmAudio) this.bgmAudio = audio;
        return audio;
      }

      initVoices() {
        this.voiceAudios = {};
        for (const [key, src] of Object.entries(VOICE_ASSETS)) {
          const audio = new Audio(src);
          audio.preload = "auto";
          audio.volume = this.voiceVolume();
          this.voiceAudios[key] = audio;
        }
      }

      voice(key, volume = VOICE_VOLUME) {
        if (!this.enabled) return;
        const audio = this.voiceAudios?.[key];
        if (!audio) return;
        try {
          audio.pause();
          audio.currentTime = 0;
          audio.volume = this.voiceVolume(volume);
          audio.play().catch(() => {});
        } catch (error) {
          // Browsers can reject very early audio resets before metadata is ready.
        }
      }

      tone(freq, duration, type = "sine", gain = 0.05, when = 0, slideTo = null) {
        const ac = this.ensure();
        if (!ac || ac.state !== "running") return;
        const t = ac.currentTime + when;
        const osc = ac.createOscillator();
        const amp = ac.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, t);
        if (slideTo) osc.frequency.exponentialRampToValueAtTime(slideTo, t + duration);
        amp.gain.setValueAtTime(0.0001, t);
        amp.gain.exponentialRampToValueAtTime(gain, t + 0.012);
        amp.gain.exponentialRampToValueAtTime(0.0001, t + duration);
        osc.connect(amp).connect(this.master || ac.destination);
        osc.start(t);
        osc.stop(t + duration + 0.02);
      }

      noise(duration, gain = 0.06, filterType = "highpass", frequency = 900, when = 0) {
        const ac = this.ensure();
        if (!ac || ac.state !== "running") return;
        const t = ac.currentTime + when;
        const src = ac.createBufferSource();
        const amp = ac.createGain();
        const filter = ac.createBiquadFilter();
        filter.type = filterType;
        filter.frequency.value = frequency;
        amp.gain.setValueAtTime(gain, t);
        amp.gain.exponentialRampToValueAtTime(0.0001, t + Math.max(0.01, duration));
        src.buffer = this.noiseBuffer;
        src.connect(filter).connect(amp).connect(this.master || ac.destination);
        src.start(t);
        src.stop(t + duration + 0.01);
      }

      move() {
        this.tone(260, 0.035, "square", SFX_VOLUME_MOVE, 0, 190);
      }

      rotate() {
        this.tone(360, 0.04, "triangle", SFX_VOLUME_ROTATE * 0.85);
        this.tone(560, 0.05, "sine", SFX_VOLUME_ROTATE * 0.62, 0.035);
        this.tone(780, 0.035, "triangle", SFX_VOLUME_ROTATE * 0.34, 0.068);
        this.noise(0.04, SFX_VOLUME_ROTATE * 0.32, "bandpass", 1900, 0.012);
      }

      menuMove() {
        this.tone(420, 0.035, "triangle", SFX_VOLUME_MOVE * 1.25, 0, 560);
      }

      menuConfirm() {
        this.tone(520, 0.045, "triangle", SFX_VOLUME_ROTATE * 0.38);
        this.tone(760, 0.055, "sine", SFX_VOLUME_ROTATE * 0.3, 0.04);
      }

      pauseCue() {
        this.tone(410, 0.055, "triangle", SFX_VOLUME_ROTATE * 0.42, 0, 260);
        this.noise(0.03, SFX_VOLUME_ROTATE * 0.12, "lowpass", 700, 0.01);
      }

      resumeCue() {
        this.tone(360, 0.04, "triangle", SFX_VOLUME_ROTATE * 0.32);
        this.tone(620, 0.055, "sine", SFX_VOLUME_ROTATE * 0.36, 0.035);
      }

      land() {
        this.tone(190, 0.075, "sine", SFX_VOLUME_LAND * 0.82, 0, 118);
        this.tone(350, 0.06, "triangle", SFX_VOLUME_LAND * 0.42, 0.025, 245);
        this.tone(520, 0.04, "sine", SFX_VOLUME_LAND * 0.26, 0.045);
        this.noise(0.035, SFX_VOLUME_LAND * 0.22, "lowpass", 760);
      }

      clear(chain = 1) {
        const lift = Math.min(7, chain - 1) * 82;
        const boost = Math.min(2.35, 1 + (chain - 1) * 0.26);
        this.noise(0.12, SFX_VOLUME_CLEAR * 0.62 * boost, "highpass", 1200 + lift);
        this.noise(0.065, SFX_VOLUME_CLEAR * 0.28 * boost, "bandpass", 2700 + lift, 0.022);
        this.noise(0.035, SFX_VOLUME_CLEAR * 0.22 * boost, "highpass", 4200 + lift, 0.052);
        this.tone(260 + lift * 0.45, 0.06, "sine", SFX_VOLUME_CLEAR * 0.34 * boost, 0, 170 + lift * 0.35);
        this.tone(430 + lift, 0.06, "sine", SFX_VOLUME_CLEAR * 0.46 * boost, 0.002, 830 + lift);
        this.tone(720 + lift, 0.075, "triangle", SFX_VOLUME_CLEAR * 0.68 * boost, 0.02, 1260 + lift);
        this.tone(1080 + lift, 0.085, "sine", SFX_VOLUME_CLEAR * 0.36 * boost, 0.06, 1630 + lift);
        this.tone(1540 + lift, 0.06, "sine", SFX_VOLUME_CLEAR * 0.24 * boost, 0.115);
        this.tone(2060 + lift, 0.04, "sine", SFX_VOLUME_CLEAR * 0.11 * boost, 0.155);
        if (chain > 1) {
          const base = 640 + lift;
          this.tone(base, 0.06, "triangle", SFX_VOLUME_CLEAR * 0.48 * boost, 0.13);
          this.tone(base * 1.25, 0.065, "triangle", SFX_VOLUME_CLEAR * 0.4 * boost, 0.185);
          this.tone(base * 1.5, 0.075, "sine", SFX_VOLUME_CLEAR * 0.34 * boost, 0.245);
          this.tone(base * 2, 0.07, "sine", SFX_VOLUME_CLEAR * 0.22 * boost, 0.31);
          const chainSteps = Math.min(5, chain);
          for (let i = 0; i < chainSteps; i++) {
            const start = 0.12 + i * 0.055;
            const freq = 860 + lift + i * 155;
            this.tone(freq, 0.052 + i * 0.006, "triangle", SFX_VOLUME_CLEAR * (0.16 + i * 0.035) * boost, start, freq * 1.22);
          }
        }
      }

      drop() {
        this.tone(165, 0.09, "sine", SFX_VOLUME_DROP * 0.95, 0, 92);
        this.tone(310, 0.05, "triangle", SFX_VOLUME_DROP * 0.34, 0.04, 235);
        this.tone(430, 0.035, "sine", SFX_VOLUME_DROP * 0.16, 0.075);
        this.noise(0.03, SFX_VOLUME_DROP * 0.14, "lowpass", 580);
      }

      levelUp() {
        this.tone(520, 0.07, "triangle", SFX_VOLUME_LEVEL);
        this.tone(720, 0.08, "triangle", SFX_VOLUME_LEVEL, 0.075);
        this.tone(980, 0.12, "sine", SFX_VOLUME_LEVEL * 0.8, 0.15);
      }

      warning() {
        const volume = SFX_VOLUME_GAME_OVER * 0.7;
        this.tone(760, 0.09, "square", volume, 0, 930);
        this.tone(520, 0.1, "triangle", volume * 0.75, 0.1, 430);
        this.noise(0.035, volume * 0.35, "bandpass", 1500, 0.03);
      }

      gameOver() {
        this.noise(0.16, SFX_VOLUME_GAME_OVER * 0.8, "lowpass", 520);
        this.tone(620, 0.08, "square", SFX_VOLUME_GAME_OVER * 0.9, 0, 420);
        this.tone(390, 0.11, "triangle", SFX_VOLUME_GAME_OVER * 0.85, 0.09, 250);
        this.tone(260, 0.14, "sine", SFX_VOLUME_GAME_OVER, 0.2, 150);
        this.tone(120, 0.26, "sine", SFX_VOLUME_GAME_OVER * 0.95, 0.34, 82);
      }

      startBgm(trackKey = "main", restart = true) {
        if (typeof trackKey === "boolean") {
          restart = trackKey;
          trackKey = this.currentBgmKey || "main";
        }
        if (!this.bgmEnabled || this.bgmMuted) return;
        const config = this.bgmTrackConfig(trackKey);
        const audio = this.initAudioBgm(trackKey);
        if (!audio) return;
        const sameTrack = this.bgmAudio === audio && this.currentBgmKey === trackKey;
        if (!sameTrack && this.bgmAudio) {
          this.bgmAudio.pause();
          this.bgmAudio.currentTime = 0;
        }
        this.bgmAudio = audio;
        this.currentBgmKey = trackKey;
        audio.loop = true;
        audio.volume = this.attachBgmGain(trackKey, audio, config) ? 1 : this.bgmVolume(config);
        audio.muted = false;
        audio.playbackRate = config.rate || 1;
        if (restart || !sameTrack) audio.currentTime = 0;
        this.bgmPlaying = true;
        audio.play().catch(() => {
          this.bgmPlaying = false;
        });
      }

      stopBgm(reset = true) {
        if (this.bgmAudio) {
          this.bgmAudio.pause();
          if (reset) this.bgmAudio.currentTime = 0;
        }
        this.bgmPlaying = false;
      }

      pauseBgm() {
        this.stopBgm(false);
      }

      resumeBgm() {
        if (this.bgmEnabled && !this.bgmMuted) this.startBgm(false);
      }

      toggleBgmMute() {
        if (!this.bgmEnabled) {
          this.bgmMuted = true;
          return false;
        }
        this.bgmMuted = !this.bgmMuted;
        if (this.bgmAudio) {
          this.bgmAudio.muted = this.bgmMuted;
          if (this.bgmMuted) this.bgmAudio.pause();
        }
        if (this.bgmMuted) this.stopBgm(false);
        return !this.bgmMuted;
      }

      updateBgmTempo() {
        if (this.bgmAudio) {
          const config = this.bgmTrackConfig(this.currentBgmKey);
          this.bgmAudio.playbackRate = config.rate || BGM_AUDIO_RATE;
        }
      }
    }

    function applyGravityToBoard(board, mode = "clear") {
      let moved = false;
      let maxDuration = 0;
      const now = performance.now();
      const base = mode === "lock" ? LOCK_GRAVITY_DROP_BASE_MS : CLEAR_GRAVITY_DROP_BASE_MS;
      const perCell = mode === "lock" ? LOCK_GRAVITY_DROP_PER_CELL_MS : CLEAR_GRAVITY_DROP_PER_CELL_MS;
      const max = mode === "lock" ? LOCK_GRAVITY_DROP_MAX_MS : CLEAR_GRAVITY_DROP_MAX_MS;
      for (let x = 0; x < COLS; x++) {
        let writeY = ROWS - 1;
        for (let y = ROWS - 1; y >= 0; y--) {
          const tile = board.grid[y][x];
          if (!tile) continue;
          const changed = writeY !== y;
          if (changed) {
            moved = true;
            const distance = writeY - y;
            const duration = Math.min(max, base + distance * perCell);
            tile.fallFromY = y;
            tile.fallStartedAt = now;
            tile.fallDuration = duration;
            tile.fallMode = mode;
            tile.landedAt = now + duration;
            maxDuration = Math.max(maxDuration, duration);
          }
          board.grid[writeY][x] = tile;
          if (writeY !== y) board.grid[y][x] = null;
          writeY -= 1;
        }
        for (let y = writeY; y >= 0; y--) {
          if (board.grid[y][x]) {
            moved = true;
            board.grid[y][x] = null;
          }
        }
      }
      board.lastGravityDuration = maxDuration;
      return moved;
    }

    function flattenGroups(groups) {
      const cells = [];
      for (const group of groups) {
        for (const cell of group) cells.push(cell);
      }
      return cells;
    }

    function clearGroupTypeCount(groups, grid) {
      const types = new Set();
      for (const group of groups) {
        const first = group[0];
        const type = first ? grid[first.y]?.[first.x]?.tileType : null;
        if (type) types.add(type);
      }
      return types.size;
    }

    function chainStepValue(groups, grid) {
      return 1 + Math.max(0, clearGroupTypeCount(groups, grid) - 1);
    }

    function advanceEffects(effects, dt) {
      let write = 0;
      for (let i = 0; i < effects.length; i++) {
        const effect = effects[i];
        effect.age += dt;
        if (effect.age < effect.duration) {
          effects[write] = effect;
          write += 1;
        }
      }
      effects.length = write;
    }

    class CpuBoard {
      constructor(owner, config) {
        this.owner = owner;
        this.config = config;
        this.ai = owner.cpuAiConfigForCurrentBattle();
        this.grid = Array.from({ length: ROWS }, () => Array(COLS).fill(null));
        this.pieceQueue = [];
        this.currentPiece = null;
        this.state = "playing";
        this.dropTimer = 0;
        this.lockTimer = 0;
        this.groundedLockTimer = 0;
        this.chain = 0;
        this.effects = [];
        this.clearCells = [];
        this.pendingRise = 0;
        this.riseWarningTimer = 0;
        this.riseWarningRows = 0;
        this.riseBounceTimer = 0;
        this.riseBounceRows = 0;
        this.lastGravityDuration = 0;
        this.snapTimer = 0;
        this.aiTimer = 0;
        this.aiPlan = null;
        this.rushDropTimer = 0;
        this.fillQueue();
      }

      fillQueue() {
        while (this.pieceQueue.length < QUEUE_SIZE) this.pieceQueue.push(this.createPiece());
      }

      randomTile() {
        const tiles = this.config.tiles;
        return tiles[Math.floor(Math.random() * tiles.length)];
      }

      createTileSet() {
        const r = Math.random();
        const weights = this.config.weights;
        let mode = "triple";
        if (r < weights.allDifferent) mode = "allDifferent";
        else if (r < weights.allDifferent + weights.pair) mode = "pair";

        if (mode === "allDifferent") return shuffle([...this.config.tiles]).slice(0, 3);
        if (mode === "pair") {
          const pair = this.randomTile();
          let other = this.randomTile();
          while (other === pair) other = this.randomTile();
          return shuffle([pair, pair, other]);
        }
        const tile = this.randomTile();
        return [tile, tile, tile];
      }

      createPiece() {
        const shape = Math.random() < 0.52 ? "I" : "L";
        const rotation = Math.floor(Math.random() * SHAPES[shape].length);
        return {
          id: crypto.randomUUID ? crypto.randomUUID() : String(Math.random()),
          shape,
          rotation,
          x: Math.floor(COLS / 2),
          y: 1,
          tiles: this.createTileSet()
        };
      }

      spawnPiece() {
        if (this.state === "gameover") return;
        if (this.startPendingRiseWarning()) return;
        if (this.applyPendingRise()) {
          this.owner.triggerBattleEnd("player");
          return;
        }
        this.fillQueue();
        this.currentPiece = this.pieceQueue.shift();
        this.currentPiece.x = Math.floor(COLS / 2);
        this.currentPiece.y = 1;
        this.lockTimer = 0;
        this.groundedLockTimer = 0;
        this.dropTimer = 0;
        this.aiPlan = this.planMove();
        this.fillQueue();
        if (!this.isValidPiece(this.currentPiece)) this.owner.triggerBattleEnd("player");
      }

      getCells(piece = this.currentPiece) {
        if (!piece) return [];
        return SHAPES[piece.shape][piece.rotation].map((offset, i) => ({
          x: piece.x + offset.x,
          y: piece.y + offset.y,
          tileType: piece.tiles[i]
        }));
      }

      isInside(x, y) {
        return x >= 0 && x < COLS && y < ROWS;
      }

      isValidPiece(piece) {
        return isValidPieceOnGrid(piece, this.grid);
      }

      move(dx, dy) {
        if (this.state !== "playing" || !this.currentPiece) return false;
        if (this.isGroundLockExpired()) return false;
        const next = { ...this.currentPiece, x: this.currentPiece.x + dx, y: this.currentPiece.y + dy };
        if (!this.isValidPiece(next)) return false;
        this.currentPiece = next;
        if (dx !== 0) this.lockTimer = 0;
        return true;
      }

      rotateToward(targetRotation) {
        if (this.state !== "playing" || !this.currentPiece) return false;
        if (this.currentPiece.rotation === targetRotation) return true;
        const count = SHAPES[this.currentPiece.shape].length;
        const forward = (this.currentPiece.rotation + 1) % count;
        const backward = (this.currentPiece.rotation - 1 + count) % count;
        const dir = forward === targetRotation ? 1 : backward === targetRotation ? -1 : 1;
        return this.rotate(dir);
      }

      rotate(dir = 1) {
        if (this.state !== "playing" || !this.currentPiece) return false;
        if (this.isGroundLockExpired()) return false;
        const count = SHAPES[this.currentPiece.shape].length;
        const nextRot = (this.currentPiece.rotation + dir + count) % count;
        const tests = [{ x: 0, y: 0 }, { x: -1, y: 0 }, { x: 1, y: 0 }, { x: 0, y: -1 }, { x: 0, y: 1 }];
        for (const test of tests) {
          const next = {
            ...this.currentPiece,
            rotation: nextRot,
            x: this.currentPiece.x + test.x,
            y: this.currentPiece.y + test.y
          };
          if (this.isValidPiece(next)) {
            this.currentPiece = next;
            this.lockTimer = 0;
            return true;
          }
        }
        return false;
      }

      rotateToward(targetRotation) {
        if (!this.currentPiece) return false;
        if (this.currentPiece.rotation === targetRotation) return true;
        const count = SHAPES[this.currentPiece.shape].length;
        const forward = (this.currentPiece.rotation + 1) % count;
        const backward = (this.currentPiece.rotation - 1 + count) % count;
        const dir = forward === targetRotation ? 1 : backward === targetRotation ? -1 : 1;
        return this.rotate(dir);
      }

      hasGroundContact() {
        if (!this.currentPiece) return false;
        const next = { ...this.currentPiece, y: this.currentPiece.y + 1 };
        return !this.isValidPiece(next);
      }

      isGroundLockExpired() {
        return this.groundedLockTimer >= LOCK_FORCE_MS && this.hasGroundContact();
      }

      dropInterval() {
        return dropIntervalForLevel(this.owner.level, CPU_DROP_MULTIPLIER * this.ai.dropMultiplier, 20);
      }

      hardDropStep(dt) {
        this.dropTimer += dt;
        if (this.rushDropTimer > 0) this.rushDropTimer = Math.max(0, this.rushDropTimer - dt);
        const rushChance = (this.ai.rushDropChance || 0) * dt / 1000;
        if (this.rushDropTimer <= 0 && rushChance > 0 && Math.random() < rushChance) {
          this.rushDropTimer = this.ai.rushDropMs || 260;
        }
        const rushMultiplier = this.rushDropTimer > 0 ? (this.ai.rushDropMultiplier || 0.55) : 1;
        const interval = this.dropInterval() * rushMultiplier;
        while (this.dropTimer >= interval) {
          this.dropTimer -= interval;
          if (!this.move(0, 1)) break;
        }
      }

      lockPiece() {
        if (!this.currentPiece) return;
        const now = performance.now();
        for (const cell of this.getCells()) {
          if (cell.y >= 0 && cell.y < ROWS && cell.x >= 0 && cell.x < COLS) {
            this.grid[cell.y][cell.x] = { tileType: cell.tileType, landedAt: now };
          }
        }
        this.currentPiece = null;
        this.snapTimer = 120;
        this.resolveBoard();
      }

      async resolveBoard() {
        this.state = "resolving";
        let chain = 0;
        const settledAfterLock = this.applyGravity("lock");
        if (settledAfterLock) await wait(this.lastGravityDuration + GRAVITY_SETTLE_WAIT_MS);
        while (this.owner.isCpuBattleActive()) {
          const groups = this.findClearGroups();
          if (groups.length === 0) break;
          chain += chainStepValue(groups, this.grid);
          const cells = flattenGroups(groups);
          this.chain = chain;
          this.clearCells = cells;
          this.addClearEffects(cells, chain);
          this.owner.queueBattleChainEnergy("cpu", cells, chain);
          if (chain >= 2) this.owner.sound.clear(chain);
          await wait(CLEAR_FLASH_MS);
          for (const cell of cells) this.grid[cell.y][cell.x] = null;
          this.clearCells = [];
          const moved = this.applyGravity("clear");
          if (moved) await wait(this.lastGravityDuration + GRAVITY_SETTLE_WAIT_MS);
        }
        if (chain > 0) this.owner.addBattleCharge("cpu", chain);
        this.chain = 0;
        if (!this.owner.isCpuBattleActive()) return;
        this.state = "playing";
        this.spawnPiece();
      }

      findClearGroups() {
        const visited = Array.from({ length: ROWS }, () => Array(COLS).fill(false));
        const groups = [];
        for (let y = 0; y < ROWS; y++) {
          for (let x = 0; x < COLS; x++) {
            const tile = this.grid[y][x];
            if (!tile || visited[y][x]) continue;
            const stack = [{ x, y }];
            const group = [];
            visited[y][x] = true;
            while (stack.length) {
              const cell = stack.pop();
              group.push(cell);
              for (const dir of DIRS4) {
                const nx = cell.x + dir[0];
                const ny = cell.y + dir[1];
                if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS || visited[ny][nx]) continue;
                if (this.grid[ny][nx]?.tileType === tile.tileType) {
                  visited[ny][nx] = true;
                  stack.push({ x: nx, y: ny });
                }
              }
            }
            if (group.length >= 4) groups.push(group);
          }
        }
        return groups;
      }

      applyGravity(mode = "clear") {
        return applyGravityToBoard(this, mode);
      }

      addClearEffects(cells, chain = 1) {
        const now = performance.now();
        const cx = cells.reduce((sum, cell) => sum + cell.x, 0) / cells.length;
        const cy = cells.reduce((sum, cell) => sum + cell.y, 0) / cells.length;
        this.effects.push({ type: "clearRing", x: cx, y: cy, age: 0, duration: CLEAR_RING_MS, radius: 18 + chain * 4, chain });
        if (chain > 1) this.effects.push({ type: "chainText", x: cx, y: Math.max(1.2, cy - 1.2), age: 0, duration: CHAIN_TEXT_MS, chain });
        for (const cell of cells) {
          this.effects.push({ type: "clearPulse", x: cell.x, y: cell.y, age: 0, duration: 230, hue: 42 + Math.random() * 40, chain });
          this.effects.push({ type: "clear", x: cell.x, y: cell.y, age: 0, duration: CLEAR_FLASH_MS, born: now });
          for (let i = 0; i < 4 + chain; i++) {
            const angle = Math.random() * Math.PI * 2;
            this.effects.push({
              type: i % 2 ? "popStar" : "popDot",
              x: cell.x,
              y: cell.y,
              vx: Math.cos(angle) * (14 + Math.random() * 18),
              vy: Math.sin(angle) * (14 + Math.random() * 18) - 8,
              size: 2.8 + Math.random() * 3,
              hue: 42 + Math.random() * 58,
              age: 0,
              duration: CLEAR_FLASH_MS + 80,
              born: now
            });
          }
        }
      }

      receiveGarbage(rows) {
        this.pendingRise += rows;
        this.riseWarningRows = Math.min(this.pendingRise, ATTACK_RISE_MAX_ROWS);
      }

      startPendingRiseWarning() {
        const rows = Math.min(this.pendingRise, ATTACK_RISE_MAX_ROWS);
        if (rows <= 0 || this.riseWarningTimer > 0) return false;
        this.state = "riseWarning";
        this.currentPiece = null;
        this.riseWarningRows = rows;
        this.riseWarningTimer = RISE_WARNING_MS;
        this.snapTimer = Math.max(this.snapTimer, RISE_WARNING_MS);
        this.effects.push({ type: "riseCharge", age: 0, duration: RISE_WARNING_MS, rows });
        this.owner.sound.warning();
        return true;
      }

      applyPendingRise() {
        const rows = Math.min(this.pendingRise, ATTACK_RISE_MAX_ROWS);
        if (rows <= 0) return false;
        this.pendingRise -= rows;
        let overflow = false;
        const now = performance.now();
        for (let i = 0; i < rows; i++) {
          if (this.grid[0].some(Boolean)) overflow = true;
          for (let y = 0; y < ROWS - 1; y++) this.grid[y] = this.grid[y + 1];
          this.grid[ROWS - 1] = createGarbageRow(this.grid, this.config, now);
        }
        this.snapTimer = 150;
        this.riseBounceTimer = RISE_BOUNCE_MS;
        this.riseBounceRows = rows;
        this.owner.shakeTimer = Math.max(this.owner.shakeTimer || 0, RISE_IMPACT_SHAKE_MS);
        this.owner.shakePower = Math.max(this.owner.shakePower || 0, RISE_IMPACT_SHAKE_PX + Math.min(2, rows * 0.18));
        this.effects.push({ type: "riseImpact", age: 0, duration: RISE_IMPACT_MS, rows });
        this.effects.push({ type: "riseWarning", age: 0, duration: 520, rows });
        return overflow;
      }

      planMove() {
        if (!this.currentPiece) return null;
        const placements = [];
        let best = null;
        for (let rotation = 0; rotation < SHAPES[this.currentPiece.shape].length; rotation++) {
          for (let x = -2; x < COLS + 2; x++) {
            const trial = { ...this.currentPiece, rotation, x, y: 1 };
            if (!this.isValidPiece(trial)) continue;
            while (this.isValidPiece({ ...trial, y: trial.y + 1 })) trial.y += 1;
            const result = this.scorePlacement(trial);
            const score = result.score + Math.random() * this.ai.randomness;
            placements.push({ rotation, x, score, maxChain: result.maxChain });
          }
        }
        let choices = placements;
        if (choices.length && this.ai.chainAvoidChance && Math.random() < this.ai.chainAvoidChance) {
          const chainAvoidAbove = this.ai.chainAvoidAbove || 2;
          const safer = choices.filter(choice => (choice.maxChain || 0) < chainAvoidAbove);
          if (safer.length) choices = safer;
        }
        best = choices.reduce((currentBest, choice) => (
          !currentBest || choice.score > currentBest.score ? choice : currentBest
        ), null);
        if (choices.length && Math.random() < this.ai.mistakeChance) {
          const mistakePoolRatio = this.ai.mistakePoolRatio ?? 0.42;
          const loose = choices
            .sort((a, b) => a.score - b.score)
            .slice(0, Math.max(1, Math.ceil(choices.length * mistakePoolRatio)));
          return loose[Math.floor(Math.random() * loose.length)];
        }
        return best || { rotation: this.currentPiece.rotation, x: this.currentPiece.x, score: 0 };
      }

      scorePlacement(piece) {
        const result = evaluateAiPlacement(this.grid, piece, this.ai);
        if (result.score <= -9999) return result;
        const followUp = bestFollowUpScore(result.grid, this.pieceQueue[0], this.ai);
        return { ...result, score: result.score + followUp * (this.ai.lookaheadWeight || 0) };
      }

      update(now, dt) {
        advanceEffects(this.effects, dt);
        if (this.snapTimer > 0) this.snapTimer = Math.max(0, this.snapTimer - dt);
        if (this.riseWarningTimer > 0) {
          this.riseWarningTimer = Math.max(0, this.riseWarningTimer - dt);
          if (this.riseWarningTimer === 0 && this.state === "riseWarning") {
            const overflow = this.applyPendingRise();
            if (overflow) this.owner.triggerBattleEnd("player");
            else {
              this.state = "playing";
              this.spawnPiece();
            }
          }
          return;
        }
        if (this.riseBounceTimer > 0) this.riseBounceTimer = Math.max(0, this.riseBounceTimer - dt);
        if (this.owner.isCpuBattleAttackAnimationActive()) return;
        if (this.state !== "playing") return;
        if (!this.currentPiece) return;
        this.aiTimer -= dt;
        if (this.aiTimer <= 0) {
          this.aiTimer = this.ai.actionMs;
          if (Math.random() >= (this.ai.stallChance || 0)) {
            if (!this.aiPlan) this.aiPlan = this.planMove();
            if (this.currentPiece.rotation !== this.aiPlan.rotation) this.rotateToward(this.aiPlan.rotation);
            else if (this.currentPiece.x < this.aiPlan.x) this.move(1, 0);
            else if (this.currentPiece.x > this.aiPlan.x) this.move(-1, 0);
          }
        }
        this.hardDropStep(dt);
        if (this.hasGroundContact()) {
          this.lockTimer += dt;
          this.groundedLockTimer += dt;
          if (this.lockTimer >= LOCK_DELAY_MS || this.groundedLockTimer >= LOCK_FORCE_MS) this.lockPiece();
        } else {
          this.lockTimer = 0;
          this.groundedLockTimer = 0;
        }
      }
    }

    class Game {

      setDifficulty(key) {
        if (this.state === "playing" || this.state === "resolving" || this.state === "quitConfirm") return;
        this.storyDifficulty = key;
        this.reset(key, false, this.selectedPlayMode, this.selectedCpuLevel);
        this.state = "title";
        this.message = "";
        this.updateUI();
      }

      resetTitleDemo() {
        this.titleDemoTimer = 0;
        this.titleDemoPageTimer = 0;
        this.titleDemoPage = 0;
        this.titleDemoActive = false;
      }

      dismissTitleDemo() {
        if (!this.titleDemoActive) return false;
        this.resetTitleDemo();
        return true;
      }

      enterModeSelect() {
        if (this.state === "playing" || this.state === "resolving") return;
        this.state = "modeSelect";
        this.message = "";
        this.sound.menuConfirm();
        this.updateUI();
      }

      cyclePlayMode(dir) {
        if (this.state !== "modeSelect") return;
        this.playModeIndex = (this.playModeIndex + dir + PLAY_MODES.length) % PLAY_MODES.length;
        this.selectedPlayMode = PLAY_MODES[this.playModeIndex].key;
        if (this.selectedPlayMode === "knockout") {
          const round = KNOCKOUT_ROUNDS[0];
          this.highScore = loadHighScore(round.difficulty, "knockout", round.cpuLevel);
          setBackgroundForStoryStage(0);
        } else {
          if (this.selectedPlayMode === "cpu" && !isSelectableCpuLevel(this.selectedCpuLevel)) {
            this.selectedCpuLevel = "normal";
            this.cpuLevelIndex = 1;
          }
          this.highScore = loadHighScore(this.selectedDifficulty, this.selectedPlayMode, this.selectedCpuLevel);
          setBackgroundForLevel(this.level);
        }
        this.sound.menuMove();
        this.updateUI();
      }

      enterCpuLevelSelect() {
        if (this.state !== "modeSelect") return;
        if (!isSelectableCpuLevel(this.selectedCpuLevel)) this.selectedCpuLevel = "normal";
        this.cpuLevelIndex = Math.max(0, CPU_STRENGTHS.findIndex(level => level.key === this.selectedCpuLevel));
        this.highScore = loadHighScore(this.selectedDifficulty, "cpu", this.selectedCpuLevel);
        this.state = "cpuLevelSelect";
        this.sound.menuConfirm();
        this.updateUI();
      }

      cycleCpuLevel(dir) {
        if (this.state !== "cpuLevelSelect") return;
        this.cpuLevelIndex = (this.cpuLevelIndex + dir + CPU_STRENGTHS.length) % CPU_STRENGTHS.length;
        this.selectedCpuLevel = CPU_STRENGTHS[this.cpuLevelIndex].key;
        this.highScore = loadHighScore(this.selectedDifficulty, "cpu", this.selectedCpuLevel);
        this.sound.menuMove();
        this.updateUI();
      }

      backToDifficultySelect() {
        if (this.state !== "modeSelect") return;
        this.state = "title";
        this.selectedPlayMode = "solo";
        this.playModeIndex = 0;
        this.highScore = loadHighScore(this.selectedDifficulty, this.selectedPlayMode, this.selectedCpuLevel);
        setBackgroundForLevel(this.level);
        this.message = "";
        this.updateUI();
      }

      backToModeSelect() {
        if (this.state !== "cpuLevelSelect") return;
        this.state = "modeSelect";
        this.highScore = loadHighScore(this.selectedDifficulty, this.selectedPlayMode, this.selectedCpuLevel);
        this.updateUI();
      }

      backFromDifficultyToModeSelect() {
        if (this.state !== "title") return;
        this.resetTitleDemo();
        this.state = "modeSelect";
        this.message = "";
        this.highScore = loadHighScore(this.selectedDifficulty, this.selectedPlayMode, this.selectedCpuLevel);
        this.updateUI();
      }

      primaryAction() {
        if (this.demoActive) {
          this.returnToTitleFromDemo();
          return;
        }
        if (this.state === "title") {
          this.enterModeSelect();
          return;
        }
        if (this.state === "modeSelect") {
          if (this.selectedPlayMode === "cpu") this.enterCpuLevelSelect();
          else if (this.selectedPlayMode === "knockout") this.startKnockoutMode();
          else this.start("solo");
          return;
        }
        if (this.state === "cpuLevelSelect") {
          this.start("cpu", this.selectedCpuLevel);
          return;
        }
        if (this.state === "gameover") {
          this.confirmGameOver();
          return;
        }
        if (this.state === "continueConfirm") {
          this.confirmContinueChoice();
          return;
        }
        if (this.state === "quitConfirm") {
          this.confirmQuitChoice();
          return;
        }
        if (this.state === "paused") {
          this.confirmPauseChoice();
          return;
        }
        this.start(this.selectedPlayMode);
      }

      start(playMode = this.selectedPlayMode, cpuLevel = this.selectedCpuLevel, difficultyKey = this.selectedDifficulty, playStartCue = true) {
        this.sound.ensure();
        if (playStartCue) {
          this.sound.menuConfirm();
          this.sound.voice("st");
        }
        this.reset(difficultyKey, true, playMode, cpuLevel);
        this.sound.updateBgmTempo(this.level);
        this.playCurrentBgm(playMode !== "knockout");
        canvas.focus({ preventScroll: true });
      }

      currentKnockoutRound() {
        return KNOCKOUT_ROUNDS[this.knockoutRoundIndex] || KNOCKOUT_ROUNDS[0];
      }

      cpuAiConfigForCurrentBattle() {
        const base = cpuStrengthConfig(this.selectedCpuLevel);
        if (this.selectedPlayMode !== "knockout") return base;
        return storyCpuDifficultyConfig(base, this.storyDifficulty, this.knockoutRoundIndex);
      }

      storyPreClearBgmKey(roundIndex = this.knockoutRoundIndex) {
        const stageNumber = Math.max(1, roundIndex + 1);
        if (stageNumber >= 9) return "storyBoss";
        if (stageNumber >= 5) return "storyMiddle";
        return "storyEarly";
      }

      playCurrentBgm(restart = true) {
        if (this.selectedPlayMode === "knockout") {
          const isEnding = this.knockoutCleared
            || this.state === "storyEnding"
            || this.state === "storyEndingTransition"
            || this.storyStageMode === "endingDialog"
            || this.storyStageMode === "endingFade";
          const isClearScene = !isEnding
            && (this.storyStageMode === "clearDialog"
              || this.storyStageMode === "clearFade"
              || this.storyStageMode === "clear");
          this.sound.startBgm(isEnding ? "storyEnding" : isClearScene ? "storyClear" : this.storyPreClearBgmKey(), restart);
          return;
        }
        this.sound.startBgm("main", restart);
      }

      playStoryPreClearBgm(restart = true) {
        this.sound.startBgm(this.storyPreClearBgmKey(), restart);
      }

      playStoryClearBgm(restart = true) {
        this.sound.startBgm("storyClear", restart);
      }

      playStoryEndingBgm(restart = true) {
        this.sound.startBgm("storyEnding", restart);
      }

      resetKnockoutProgress() {
        this.knockoutRoundIndex = 0;
        this.knockoutPlayerWins = 0;
        this.knockoutCpuWins = 0;
        this.knockoutCleared = false;
        this.knockoutTransitionType = "";
        this.knockoutSetTransitionTimer = 0;

      startKnockoutMode() {
        if (this.state === "title" || this.state === "modeSelect") this.storyDifficulty = this.selectedDifficulty;
        this.startStoryOpening();
      }

      startStoryOpening() {
        this.sound.ensure();
        this.sound.menuConfirm();
        this.sound.voice("st");
        this.resetKnockoutProgress();
        const round = this.currentKnockoutRound();
        this.reset(round.difficulty, false, "knockout", round.cpuLevel);
        this.state = "storyOpening";
        this.storyOpeningTimer = 0;
        this.storyOpeningTransitionTimer = 0;
        this.storyOpeningTransitionDuration = STORY_OPENING_TRANSITION_MS;
        this.storyOpeningInputGuardTimer = 360;
        this.message = "";
        this.messageTimer = 0;
        this.sound.stopBgm();
        canvas.focus({ preventScroll: true });

      finishStoryOpening(transitionMs = STORY_OPENING_TRANSITION_MS) {
        if (this.state !== "storyOpening") return;

        if (this.state === "storyOpening") {

          this.storyOpeningTransitionTimer = 0;

      finishStoryOpeningTransition() {
        if (this.state !== "storyOpeningTransition") return;
        this.startStoryStageIntro();

      startStoryEnding() {
        if (this.selectedPlayMode !== "knockout") return;
        setEndingStoryBackground();
        this.state = "storyEnding";
        this.storyEndingTimer = 0;
        this.storyEndingTransitionTimer = 0;
        this.storyEndingTransitionDuration = STORY_ENDING_TRANSITION_MS;
        this.storyEndingInputGuardTimer = 360;
        this.message = "";
        this.messageTimer = 0;
        this.playStoryEndingBgm(false);
        this.updateUI();

      finishStoryEnding(transitionMs = STORY_ENDING_TRANSITION_MS) {

        if (this.state === "storyEnding") {
          this.finishStoryEnding(STORY_ENDING_SKIP_TRANSITION_MS);

      storyDialogueForMode(mode = this.storyStageMode) {
        const stage = this.storyStage();
        if (mode === "introDialog" || mode === "introFade") return stage.introDialogue || [];
        if (mode === "clearDialog" || mode === "clearFade") return stage.clearDialogue || [];
        if (mode === "endingDialog" || mode === "endingFade") return STORY_ENDING_DIALOGUE;

        this.storyStageTimer = 0;

        this.horizontalDelayTimer = 0;
        this.horizontalRepeatTimer = 0;
        this.lastHorizontalDir = 0;
        this.keys.delete("ArrowLeft");
        this.keys.delete("ArrowRight");
        this.keys.delete("ArrowDown");
        this.dangerActive = false;
        this.dangerAlarmTimer = 0;
        this.shakeTimer = 0;
        this.shakePower = 0;
        if (this.knockoutRoundIndex >= STORY_STAGES.length - 1) this.playStoryEndingBgm(true);
        else this.playStoryClearBgm(true);
        this.sound.levelUp();
        this.sound.voice("win");
        this.updateUI();
      }

      startStoryStageFade(nextAction) {
        this.storyStageMode = nextAction === "battle" ? "introFade" : nextAction === "ending" ? "endingFade" : "clearFade";
        this.storyStageTimer = 0;
        this.storyDialogTimer = 0;
        this.storyStageFadeTimer = STORY_DIALOG_FADE_MS;
        this.storyStageInputGuardTimer = 0;
      }

      finishStoryStageFade() {
        if (this.storyStageMode === "introFade") {
          this.storyStageMode = "";
          const round = this.currentKnockoutRound();
          this.start("knockout", round.cpuLevel, round.difficulty, false);
          return;
        }
        if (this.storyStageMode === "clearFade") {
          this.storyStageMode = "";
          const lastRoundIndex = KNOCKOUT_ROUNDS.length - 1;
          if (this.knockoutRoundIndex >= lastRoundIndex) {
            this.startStoryEnding();
            return;
          }
          this.knockoutRoundIndex = Math.min(this.knockoutRoundIndex + 1, lastRoundIndex);
          this.knockoutPlayerWins = 0;
          this.knockoutCpuWins = 0;
          this.startStoryStageIntro();
          return;
        }
        if (this.storyStageMode === "endingFade") {
          this.storyStageMode = "";
          this.finishKnockoutClear();
        }
      }

      advanceStoryStage(auto = false) {
        if (this.state !== "storyStage" || this.storyStageInputGuardTimer > 0) return false;
        if (this.storyStageMode === "introFade" || this.storyStageMode === "clearFade" || this.storyStageMode === "endingFade") {
          this.storyStageFadeTimer = 0;
          this.finishStoryStageFade();
          return true;
        }
        const dialogue = this.storyDialogueForMode();
        if (dialogue.length) {
          if (this.storyDialogIndex < dialogue.length - 1) {
            this.storyDialogIndex += 1;
            this.storyDialogTimer = 0;
            if (!auto) this.sound.menuMove();
            return true;
          }
          if (!auto) this.sound.menuConfirm();
          this.startStoryStageFade(this.storyStageMode === "introDialog" ? "battle" : this.storyStageMode === "endingDialog" ? "ending" : "next");
          return true;
        }
        if (!auto) this.sound.menuConfirm();
        if (this.storyStageMode === "intro") {
          this.storyStageMode = "";
          const round = this.currentKnockoutRound();
          this.start("knockout", round.cpuLevel, round.difficulty, false);
          return true;
        }
        if (this.storyStageMode === "clear") {
          const lastRoundIndex = KNOCKOUT_ROUNDS.length - 1;
          this.storyStageMode = "";
          if (this.knockoutRoundIndex >= lastRoundIndex) {
            this.startStoryEnding();
            return true;
          }
          this.knockoutRoundIndex = Math.min(this.knockoutRoundIndex + 1, lastRoundIndex);
          this.knockoutPlayerWins = 0;
          this.knockoutCpuWins = 0;
          this.startStoryStageIntro();
          return true;
        }
        return false;
      }

      startDemoPlay() {
        const difficulty = this.selectedDifficulty;
        this.sound.ensure();
        this.sound.stopBgm();
        this.reset(DEMO_DIFFICULTY, true, "solo", this.selectedCpuLevel);
        this.demoActive = true;
        this.demoReturnDifficulty = difficulty;
        this.demoAi = cpuStrengthConfig(DEMO_CPU_LEVEL);
        this.demoAiTimer = 0;
        this.demoAiPlan = null;
        this.demoTimer = DEMO_PLAY_MS;
        this.startLogoTimer = 0;
        this.message = "";
        this.messageTimer = 0;
        this.seedDemoShowcase();
        this.sound.stopBgm();
        this.updateUI();
      }

      returnToTitleFromDemo() {
        if (!this.demoActive) return false;
        const difficulty = this.demoReturnDifficulty || this.selectedDifficulty;
        this.sound.stopBgm();
        this.reset(difficulty, false, "solo", this.selectedCpuLevel);
        this.state = "title";
        this.resetTitleDemo();
        this.updateUI();
        return true;
      }

      seedDemoShowcase() {
        const tiles = DIFFICULTIES[DEMO_DIFFICULTY].tiles;
        this.grid = DEMO_SHOWCASE_GRID.map(row => [...row].map(mark => {
          const index = Number.parseInt(mark, 10);
          return Number.isFinite(index) ? { tileType: tiles[index], landedAt: performance.now() } : null;
        }));
        this.currentPiece = null;
        this.dropTimer = 0;
        this.lockTimer = 0;
        this.softDrop = false;
        this.demoAiPlan = null;
        this.chain = 0;
        this.state = "resolving";
        this.resolveBoard();
      }

      isCpuBattleActive() {
        return isCpuPlayMode(this.selectedPlayMode)
          && this.cpu
          && (this.state === "playing" || this.state === "resolving" || this.state === "riseWarning");
      }

      isBattleAttackAnimationActive() {
        return isCpuPlayMode(this.selectedPlayMode) && (
          this.isBattleAttackTransferActive()
          || this.riseWarningTimer > 0
        );
      }

      isCpuBattleAttackAnimationActive() {
        return isCpuPlayMode(this.selectedPlayMode) && (
          this.isBattleAttackTransferActive()
          || (this.cpu?.riseWarningTimer || 0) > 0
        );
      }

      isBattleAttackTransferActive() {
        return isCpuPlayMode(this.selectedPlayMode) && !!this.battleAttackTransfers?.some(transfer => (
          (transfer.payloadRows || 0) > 0 && transfer.age < transfer.sendDuration + ATTACK_SEND_FREEZE_TAIL_MS
        ));
      }

      updateBattleAttackTransfers(dt) {
        if (!this.battleAttackTransfers?.length) return;
        let write = 0;
        for (let i = 0; i < this.battleAttackTransfers.length; i++) {
          const transfer = this.battleAttackTransfers[i];
          transfer.age += dt;
          if (!transfer.delivered && (transfer.payloadRows || 0) > 0 && transfer.age >= transfer.sendDuration) {
            transfer.delivered = true;
            this.deliverBattleCharge(transfer);
          }
          const duration = transfer.sendDuration + ((transfer.payloadRows || 0) > 0 ? transfer.impactDuration : ATTACK_PAYLOAD_GRACE_MS);
          if (transfer.age < duration) {
            this.battleAttackTransfers[write] = transfer;
            write += 1;
          }
        }
        this.battleAttackTransfers.length = write;
      }

      deliverBattleCharge(transfer) {
        if (!this.isCpuBattleActive()) return;
        const target = transfer.source === "player" ? this.cpu : this;
        const rows = transfer.payloadRows || transfer.rows || 0;
        if (rows <= 0) return;
        if (!target) return;
        target.receiveGarbage(rows);
        if (target === this && rows >= 3) this.sound.voice("no");
        const startedWarning = this.tryStartBattleRiseWarning(target);
        if (!startedWarning) this.cueBattleChargeArrival(target, rows, transfer.chain);
        target.effects.push({
          type: "attackNotice",
          x: 2.5,
          y: 1.1,
          age: 0,
          duration: 500,
          rows,
          chain: transfer.chain
        });
        this.updateUI();
      }

      tryStartBattleRiseWarning(target) {
        if (!target || target.riseWarningTimer > 0 || target.currentPiece) return false;
        if (target.state !== "playing") return false;
        return target.startPendingRiseWarning();
      }

      cueBattleChargeArrival(target, rows, chain) {
        const cueRows = Math.min(ATTACK_RISE_MAX_ROWS, Math.max(1, target.pendingRise || rows));
        target.riseWarningRows = cueRows;
        target.snapTimer = Math.max(target.snapTimer || 0, ATTACK_ARRIVAL_CUE_MS);
        target.effects.push({
          type: "riseCharge",
          age: 0,
          duration: ATTACK_ARRIVAL_CUE_MS,
          rows: cueRows,
          chain,
          arrivalOnly: true
        });
      }

      isBattleWarningActive() {
        return isCpuPlayMode(this.selectedPlayMode) && (
          this.riseWarningTimer > 0 || (this.cpu?.riseWarningTimer || 0) > 0
        );
      }

      fillQueue() {
        while (this.pieceQueue.length < QUEUE_SIZE) this.pieceQueue.push(this.createPiece());
      }

      randomTile() {
        const tiles = this.config.tiles;
        return tiles[Math.floor(Math.random() * tiles.length)];
      }

      createTileSet() {
        const r = Math.random();
        const weights = this.config.weights;
        let mode = "triple";
        if (r < weights.allDifferent) mode = "allDifferent";
        else if (r < weights.allDifferent + weights.pair) mode = "pair";

        if (mode === "allDifferent") {
          return shuffle([...this.config.tiles]).slice(0, 3);
        }
        if (mode === "pair") {
          const pair = this.randomTile();
          let other = this.randomTile();
          while (other === pair) other = this.randomTile();
          return shuffle([pair, pair, other]);
        }
        const tile = this.randomTile();
        return [tile, tile, tile];
      }

      createPiece() {
        const shape = Math.random() < 0.52 ? "I" : "L";
        const rotation = Math.floor(Math.random() * SHAPES[shape].length);
        return {
          id: crypto.randomUUID ? crypto.randomUUID() : String(Math.random()),
          shape,
          rotation,
          x: Math.floor(COLS / 2),
          y: 1,
          tiles: this.createTileSet()
        };
      }

      spawnPiece() {
        if (this.startPendingRiseWarning()) return;
        if (this.applyPendingRise()) {
          this.triggerBattleEnd("cpu");
          return;
        }
        this.demoAiPlan = null;
        this.fillQueue();
        this.currentPiece = this.pieceQueue.shift();
        this.currentPiece.x = Math.floor(COLS / 2);
        this.currentPiece.y = 1;
        this.lockTimer = 0;
        this.groundedLockTimer = 0;
        this.dropTimer = 0;
        this.fillQueue();
        if (!this.isValidPiece(this.currentPiece)) {
          this.triggerGameOver();
        }
        this.updateUI();
      }

      receiveGarbage(rows) {
        this.pendingRise += rows;
        this.riseWarningRows = Math.min(this.pendingRise, ATTACK_RISE_MAX_ROWS);
      }

      startPendingRiseWarning() {
        const rows = Math.min(this.pendingRise, ATTACK_RISE_MAX_ROWS);
        if (rows <= 0 || this.riseWarningTimer > 0) return false;
        this.state = "riseWarning";
        this.currentPiece = null;
        this.riseWarningRows = rows;
        this.riseWarningTimer = RISE_WARNING_MS;
        this.snapTimer = Math.max(this.snapTimer, RISE_WARNING_MS);
        this.effects.push({ type: "riseCharge", age: 0, duration: RISE_WARNING_MS, rows });
        this.sound.warning();
        this.updateUI();
        return true;
      }

      applyPendingRise() {
        const rows = Math.min(this.pendingRise, ATTACK_RISE_MAX_ROWS);
        if (rows <= 0) return false;
        this.pendingRise -= rows;
        let overflow = false;
        const now = performance.now();
        for (let i = 0; i < rows; i++) {
          if (this.grid[0].some(Boolean)) overflow = true;
          for (let y = 0; y < ROWS - 1; y++) this.grid[y] = this.grid[y + 1];
          this.grid[ROWS - 1] = createGarbageRow(this.grid, this.config, now);
        }
        this.snapTimer = 150;
        this.riseBounceTimer = RISE_BOUNCE_MS;
        this.riseBounceRows = rows;
        if (isCpuPlayMode(this.selectedPlayMode)) {
          this.shakeTimer = Math.max(this.shakeTimer, RISE_IMPACT_SHAKE_MS);
          this.shakePower = Math.max(this.shakePower, RISE_IMPACT_SHAKE_PX + Math.min(2, rows * 0.18));
          this.effects.push({ type: "riseImpact", age: 0, duration: RISE_IMPACT_MS, rows });
        }
        this.sound.drop();
        this.effects.push({ type: "riseWarning", age: 0, duration: 520, rows });
        this.updateUI();
        return overflow;
      }

      triggerGameOver() {
        if (this.demoActive) {
          this.startDemoPlay();
          return;
        }
        if (this.selectedPlayMode === "knockout") {
          this.handleKnockoutSetEnd("cpu");
          return;
        }
        this.finishBattleLoss();
      }

      triggerBattleEnd(winner) {
        if (this.demoActive) {
          this.startDemoPlay();
          return;
        }
        if (this.state === "gameover") return;
        if (this.selectedPlayMode === "knockout") {
          this.handleKnockoutSetEnd(winner);
          return;
        }
        this.battleWinner = winner;
        if (winner === "cpu") {
          this.finishBattleLoss();
          return;
        }
        this.finishBattleWin();
      }

      handleKnockoutSetEnd(winner) {
        if (this.state === "gameover" || this.state === "knockoutSetEnd") return;
        this.battleWinner = winner;
        if (winner === "player") this.knockoutPlayerWins += 1;
        else this.knockoutCpuWins += 1;
        if (this.knockoutPlayerWins >= KNOCKOUT_MATCH_WINS) {
          this.handleKnockoutMatchWin();
          return;
        }
        if (this.knockoutCpuWins >= KNOCKOUT_MATCH_WINS) {
          this.finishKnockoutLoss();
          return;
        }
        this.startKnockoutTransition(winner === "player" ? "1本取った!" : "1本取られた!", KNOCKOUT_NEXT_SET_MS, "set", winner);
      }

      startKnockoutTransition(message, duration, type, winner = "player") {
        this.currentPiece = null;
        if (this.cpu) this.cpu.state = "gameover";
        this.state = "knockoutSetEnd";
        this.message = message;
        this.messageTimer = duration;
        this.knockoutSetTransitionTimer = duration;
        this.knockoutTransitionType = type;
        this.pendingRise = 0;
        if (this.cpu) this.cpu.pendingRise = 0;
        this.battleAttackTransfers = [];
        this.setSoftDrop(false);
        this.horizontalDir = 0;
        this.horizontalDelayTimer = 0;
        this.horizontalRepeatTimer = 0;
        this.lastHorizontalDir = 0;
        this.keys.delete("ArrowLeft");
        this.keys.delete("ArrowRight");
        this.keys.delete("ArrowDown");
        this.dangerActive = false;
        this.dangerAlarmTimer = 0;
        this.shakeTimer = winner === "player" ? 360 : 560;
        this.shakePower = winner === "player" ? 2.8 : 5.2;
        if (winner === "player") this.sound.levelUp();
        else this.sound.warning();
        if (this.selectedPlayMode === "knockout") {
          if (type === "set") this.sound.voice(winner === "player" ? "ya" : "to");
          else if (type === "round" && winner === "player") this.sound.voice("win");
        }
        this.updateUI();
      }

      handleKnockoutMatchWin() {
        this.startStoryStageClear();
      }

      continueKnockoutTransition() {
        if (this.selectedPlayMode !== "knockout") return;
        if (this.knockoutTransitionType === "round") this.startNextKnockoutRound();
        else this.startNextKnockoutSet();
      }

      startNextKnockoutRound() {
        if (this.selectedPlayMode !== "knockout") return;
        this.knockoutRoundIndex = Math.min(this.knockoutRoundIndex + 1, KNOCKOUT_ROUNDS.length - 1);
        this.knockoutPlayerWins = 0;
        this.knockoutCpuWins = 0;
        this.startNextKnockoutSet();
      }

      startNextKnockoutSet() {
        if (this.selectedPlayMode !== "knockout") return;
        const round = this.currentKnockoutRound();
        this.reset(round.difficulty, true, "knockout", round.cpuLevel);
        this.message = "";
        this.messageTimer = 0;
        this.knockoutSetTransitionTimer = 0;
        this.knockoutTransitionType = "";
        this.battleWinner = null;
        this.sound.updateBgmTempo(this.level);
        this.playStoryPreClearBgm(false);
        this.updateUI();
      }

      finishKnockoutLoss() {
        this.battleWinner = "cpu";
        this.currentPiece = null;
        if (this.cpu) this.cpu.state = "gameover";
        this.state = "continueConfirm";
        this.message = "";
        this.messageTimer = 0;
        this.dangerActive = false;
        this.dangerAlarmTimer = 0;
        this.overLogoTimer = 0;
        this.gameOverInputGuardTimer = 0;
        this.startLogoTimer = 0;
        this.knockoutSetTransitionTimer = 0;
        this.knockoutTransitionType = "";
        this.continueChoiceIndex = 0;
        this.continueTimer = CONTINUE_COUNTDOWN_MS;
        this.shakeTimer = GAME_OVER_PANIC_SHAKE_MS;
        this.shakePower = GAME_OVER_PANIC_SHAKE_PX;
        this.setSoftDrop(false);
        this.horizontalDir = 0;
        this.horizontalDelayTimer = 0;
        this.horizontalRepeatTimer = 0;
        this.lastHorizontalDir = 0;
        this.keys.delete("ArrowLeft");
        this.keys.delete("ArrowRight");
        this.keys.delete("ArrowDown");
        this.sound.stopBgm();
        this.sound.gameOver();
        this.sound.voice("lose");
        this.effects.push({
          type: "clearShock",
          x: Math.floor(COLS / 2),
          y: 3.8,
          age: 0,
          duration: 620,
          radius: 46,
          chain: 4
        });
        this.updateUI();
      }

      finishKnockoutClear() {
        this.knockoutCleared = true;
        this.battleWinner = "player";
        setEndingStoryBackground();
        this.currentPiece = null;
        if (this.cpu) this.cpu.state = "gameover";
        this.state = "gameover";
        this.message = "ゲームクリア!";
        this.messageTimer = 0;
        this.overLogoTimer = OVER_LOGO_DROP_MS;
        this.gameOverInputGuardTimer = GAME_OVER_INPUT_GUARD_MS;
        this.startLogoTimer = 0;
